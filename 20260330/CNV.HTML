<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNV Bridge Map - P4ACV5R01</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0e17; color:#e0e0e0; font-family:'JetBrains Mono',monospace; overflow:hidden; }
#toolbar {
  position:fixed; top:0; left:0; right:0; height:48px; z-index:100;
  background:rgba(10,14,23,0.95); border-bottom:1px solid #1e293b;
  display:flex; align-items:center; padding:0 16px; gap:10px;
}
#toolbar h1 { font-size:14px; color:#a78bfa; font-weight:700; margin-right:8px; }
.toggle-btn, .file-btn {
  padding:4px 10px; border-radius:4px; border:1px solid #334155;
  background:transparent; color:#94a3b8; cursor:pointer; font-size:11px;
  font-family:'JetBrains Mono',monospace; transition:all .15s;
}
.toggle-btn.active { background:#2e1065; color:#a78bfa; border-color:#a78bfa; }
.toggle-btn:hover, .file-btn:hover { border-color:#64748b; }
.file-btn { background:#2e1065; color:#a78bfa; border-color:#a78bfa; }
#file-input { display:none; }
#info { margin-left:auto; font-size:11px; color:#64748b; }
#canvas { position:fixed; top:48px; left:0; right:0; bottom:0; }
#tooltip {
  position:fixed; display:none; background:rgba(15,23,42,0.95);
  border:1px solid #a78bfa; border-radius:6px; padding:8px 12px;
  font-size:11px; color:#e2e8f0; pointer-events:none; z-index:200;
  max-width:360px; line-height:1.6;
}
#legend {
  position:fixed; bottom:16px; left:16px; background:rgba(10,14,23,0.9);
  border:1px solid #1e293b; border-radius:8px; padding:12px 16px;
  font-size:11px; z-index:100; display:none;
}
.leg-row { display:flex; align-items:center; gap:8px; margin:4px 0; }
.leg-dot { width:10px; height:10px; border-radius:50%; }
#coords {
  position:fixed; bottom:16px; right:16px; background:rgba(10,14,23,0.9);
  border:1px solid #1e293b; border-radius:8px; padding:8px 12px;
  font-size:11px; z-index:100; color:#64748b; display:none;
}
#stats {
  position:fixed; top:56px; right:16px; background:rgba(10,14,23,0.9);
  border:1px solid #1e293b; border-radius:8px; padding:8px 12px;
  font-size:11px; z-index:100; color:#64748b; display:none;
}
#drop-zone {
  position:fixed; top:48px; left:0; right:0; bottom:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
}
.drop-box {
  border:2px dashed #334155; border-radius:16px; padding:60px 80px;
  text-align:center; cursor:pointer; transition:all .2s;
}
.drop-box:hover { border-color:#a78bfa; background:rgba(167,139,250,0.05); }
.drop-box h2 { font-size:18px; color:#a78bfa; margin-bottom:8px; }
.drop-box p { font-size:12px; color:#64748b; }
.drop-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0; z-index:999;
  background:rgba(167,139,250,0.08); border:3px dashed #a78bfa;
  display:none; align-items:center; justify-content:center;
  font-size:20px; color:#a78bfa; font-weight:700;
}
</style>
</head>
<body>
<div id="toolbar">
  <h1>CNV MAP — P4ACV5R01</h1>
  <button class="file-btn" onclick="document.getElementById('file-input').click()">📂 JSON 열기</button>
  <input type="file" id="file-input" accept=".json">
  <div id="layer-btns" style="display:none;">
    <button class="toggle-btn active" data-layer="link">연결선</button>
    <button class="toggle-btn active" data-layer="cnv">CNV 구간</button>
    <button class="toggle-btn active" data-layer="port">포트 (이름)</button>
    <button class="toggle-btn active" data-layer="carrier">캐리어</button>
    <button class="toggle-btn" onclick="resetView()">Reset</button>
  </div>
  <div id="info">scroll: zoom | drag: pan</div>
</div>

<div id="drop-zone">
  <div class="drop-box" onclick="document.getElementById('file-input').click()">
    <h2>📂 cnv_map_data.json</h2>
    <p>클릭하거나 드래그 앤 드롭하세요</p>
    <p style="margin-top:8px;color:#475569;">cnv (amp.cnvinformation) + port (config_bridge.conveyor)</p>
  </div>
</div>
<div class="drop-overlay" id="drop-overlay">여기에 JSON 파일을 놓으세요</div>

<canvas id="canvas"></canvas>
<div id="tooltip"></div>
<div id="legend">
  <div style="font-weight:700;margin-bottom:6px;color:#a78bfa;">범례</div>
  <div class="leg-row"><div class="leg-dot" style="background:#475569"></div>연결선</div>
  <div class="leg-row"><div class="leg-dot" style="background:#a78bfa"></div>CNV 구간</div>
  <div class="leg-row"><div class="leg-dot" style="background:#f59e0b"></div>포트 (이름)</div>
  <div class="leg-row"><div class="leg-dot" style="background:#10b981"></div>캐리어 적재</div>
</div>
<div id="coords">X: - Y: -</div>
<div id="stats"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const coordsEl = document.getElementById('coords');
const statsEl = document.getElementById('stats');
const dropZone = document.getElementById('drop-zone');
const dropOverlay = document.getElementById('drop-overlay');
const layerBtns = document.getElementById('layer-btns');

let DATA = null;
let W, H;
let ox=0, oy=0, scale=1;
let dragging=false, dragX=0, dragY=0;
let minX, maxX, minY, maxY, dataW, dataH;

const layers = { link:true, cnv:true, port:true, carrier:true };

// File input
document.getElementById('file-input').addEventListener('change', e => {
  if(e.target.files[0]) loadFile(e.target.files[0]);
});

// Drag & drop
document.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.style.display='flex'; });
document.addEventListener('dragleave', e => { if(e.relatedTarget===null) dropOverlay.style.display='none'; });
document.addEventListener('drop', e => {
  e.preventDefault(); dropOverlay.style.display='none';
  if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const raw = JSON.parse(e.target.result);
      processData(raw);
    } catch(err) {
      alert('JSON 파싱 오류: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function processData(raw) {
  DATA = { cnv:[], port:[], cnvMap:{}, portMap:{} };

  // cnv - amp.cnvinformation
  DATA.cnv = (raw.cnv||[]).map(r => ({
    eqp: r.EqpID||'',
    loc: r.LocationID||'',
    hid: r.HostID||'',
    x: parseFloat(r.XPos)||0,
    y: parseFloat(r.YPos)||0,
    w: parseFloat(r.Width)||50,
    h: parseFloat(r.Height)||50,
    dir: r.Direction||'',
    inList: (r.ObjectInList||'').split(',').filter(s=>s),
    outList: (r.ObjectOutList||'').split(',').filter(s=>s),
    carrier: r.CurrentCarrier||'',
    zone: r.ZoneName||'',
    kind: r.Kind,
    state: r.ObjectState,
    mstate: r.MachineState
  }));

  // port - config_bridge.conveyor (named ports)
  DATA.port = (raw.port||[]).map(r => ({
    uid: r.CnvUnitID||'',
    hid: r.CnvHostID||'',
    zone: r.ZoneName||'',
    x: r.PositionX||0,
    y: r.PositionY||0,
    w: r.Width||50,
    h: r.Height||50,
    dir: r.Direction,
    linkIn: (r.LinkInner||'').split(',').filter(s=>s),
    linkOut: (r.LinkOuter||'').split(',').filter(s=>s),
    carrier: r.CurrentCarrier||'',
    kind: r.ObjectKind,
    ip: r.IPAddress||'',
    line: r.LineType||''
  }));

  // build lookup maps
  DATA.cnv.forEach(c => { DATA.cnvMap[c.loc] = c; });
  DATA.port.forEach(p => { DATA.portMap[p.uid] = p; });

  // bounds
  minX=Infinity; maxX=-Infinity; minY=Infinity; maxY=-Infinity;
  DATA.cnv.forEach(c => {
    if(c.x<minX)minX=c.x; if(c.x>maxX)maxX=c.x;
    if(c.y<minY)minY=c.y; if(c.y>maxY)maxY=c.y;
  });
  DATA.port.forEach(p => {
    if(p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x;
    if(p.y<minY)minY=p.y; if(p.y>maxY)maxY=p.y;
  });
  const padX=(maxX-minX)*0.05||100, padY=(maxY-minY)*0.05||100;
  minX-=padX; maxX+=padX; minY-=padY; maxY+=padY;
  dataW=maxX-minX; dataH=maxY-minY;

  // show UI
  dropZone.style.display='none';
  layerBtns.style.display='flex';
  document.getElementById('legend').style.display='block';
  coordsEl.style.display='block';
  statsEl.style.display='block';

  const carriers = DATA.cnv.filter(c=>c.carrier).length + DATA.port.filter(p=>p.carrier).length;
  statsEl.innerHTML = `CNV: ${DATA.cnv.length} | Port: ${DATA.port.length} | 캐리어: ${carriers}`;

  resetView();
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight - 48;
}

function resetView() {
  if(!DATA) return;
  const sx=W/dataW, sy=H/dataH;
  scale = Math.min(sx,sy)*0.95;
  ox = (W-dataW*scale)/2 - minX*scale;
  oy = (H-dataH*scale)/2 - minY*scale;
  draw();
}

function tx(x) { return x*scale+ox; }
function ty(y) { return y*scale+oy; }

function draw() {
  if(!DATA) return;
  ctx.clearRect(0,0,W,H);

  // connection lines
  if(layers.link) {
    ctx.lineWidth = Math.max(0.5, scale*3);
    ctx.strokeStyle = 'rgba(71,85,105,0.5)';
    DATA.cnv.forEach(c => {
      c.outList.forEach(outId => {
        const target = DATA.cnvMap[outId];
        if(target) {
          ctx.beginPath();
          ctx.moveTo(tx(c.x), ty(c.y));
          ctx.lineTo(tx(target.x), ty(target.y));
          ctx.stroke();
        }
      });
    });
  }

  // cnv segments
  if(layers.cnv) {
    const r = Math.max(2, scale*8);
    DATA.cnv.forEach(c => {
      ctx.fillStyle = 'rgba(167,139,250,0.5)';
      ctx.beginPath();
      ctx.arc(tx(c.x), ty(c.y), r, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // carrier on cnv
  if(layers.carrier) {
    const r = Math.max(3, scale*10);
    DATA.cnv.forEach(c => {
      if(!c.carrier) return;
      ctx.fillStyle = 'rgba(16,185,129,0.9)';
      ctx.beginPath();
      ctx.arc(tx(c.x), ty(c.y), r, 0, Math.PI*2);
      ctx.fill();
    });
    DATA.port.forEach(p => {
      if(!p.carrier) return;
      ctx.fillStyle = 'rgba(16,185,129,0.9)';
      ctx.beginPath();
      ctx.arc(tx(p.x), ty(p.y), r, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // ports (named)
  if(layers.port) {
    const r = Math.max(4, scale*12);
    DATA.port.forEach(p => {
      ctx.fillStyle = 'rgba(245,158,11,0.8)';
      ctx.beginPath();
      ctx.arc(tx(p.x), ty(p.y), r, 0, Math.PI*2);
      ctx.fill();
      // port name label
      if(scale > 0.3) {
        const name = p.hid.replace('P4ACV5R01_','');
        ctx.font = Math.max(9, scale*20)+'px JetBrains Mono';
        ctx.fillStyle = 'rgba(245,158,11,0.9)';
        ctx.textAlign = 'center';
        ctx.fillText(name, tx(p.x), ty(p.y)-r-4);
      }
    });
  }
}

// layer toggle
document.querySelectorAll('[data-layer]').forEach(btn => {
  btn.addEventListener('click', () => {
    const name=btn.dataset.layer;
    layers[name]=!layers[name];
    btn.classList.toggle('active',layers[name]);
    draw();
  });
});

// tooltip
function findNearest(mx, my, radius) {
  if(!DATA) return null;
  const wx=(mx-ox)/scale, wy=(my-oy)/scale;
  let best=null, bestD=radius/scale;

  if(layers.port) DATA.port.forEach(p => {
    const d=Math.hypot(p.x-wx,p.y-wy);
    if(d<bestD){bestD=d;best={type:'port',...p};}
  });
  if(layers.cnv) DATA.cnv.forEach(c => {
    const d=Math.hypot(c.x-wx,c.y-wy);
    if(d<bestD){bestD=d;best={type:'cnv',...c};}
  });
  return best;
}

canvas.addEventListener('mousemove', e => {
  const mx=e.clientX, my=e.clientY-48;
  if(DATA) {
    const wx=((mx-ox)/scale).toFixed(1), wy=((my-oy)/scale).toFixed(1);
    coordsEl.textContent=`X: ${wx}  Y: ${wy}  zoom: ${scale.toFixed(2)}`;
  }
  if(dragging) {
    ox+=e.clientX-dragX; oy+=e.clientY-dragY;
    dragX=e.clientX; dragY=e.clientY;
    draw(); return;
  }
  const hit=findNearest(mx,my,20);
  if(hit) {
    let html='';
    if(hit.type==='port') {
      html=`<b>포트</b><br>이름: ${hit.hid}<br>UnitID: ${hit.uid}<br>위치: (${hit.x}, ${hit.y})<br>방향: ${hit.dir}<br>LinkIn: ${hit.linkIn.join(',')}<br>LinkOut: ${hit.linkOut.join(',')}<br>캐리어: ${hit.carrier||'없음'}<br>IP: ${hit.ip}<br>라인: ${hit.line}`;
    } else {
      html=`<b>CNV 구간</b><br>LocationID: ${hit.loc}<br>HostID: ${hit.hid}<br>위치: (${hit.x}, ${hit.y})<br>방향: ${hit.dir}<br>In: ${hit.inList.join(',')}<br>Out: ${hit.outList.join(',')}<br>캐리어: ${hit.carrier||'없음'}<br>Zone: ${hit.zone}<br>Kind: ${hit.kind} State: ${hit.state}`;
    }
    tooltip.innerHTML=html; tooltip.style.display='block';
    tooltip.style.left=(e.clientX+12)+'px'; tooltip.style.top=(e.clientY+12)+'px';
  } else tooltip.style.display='none';
});

canvas.addEventListener('mousedown', e => { dragging=true; dragX=e.clientX; dragY=e.clientY; canvas.style.cursor='grabbing'; });
canvas.addEventListener('mouseup', () => { dragging=false; canvas.style.cursor='default'; });
canvas.addEventListener('mouseleave', () => { dragging=false; tooltip.style.display='none'; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if(!DATA) return;
  const mx=e.clientX, my=e.clientY-48;
  const factor=e.deltaY<0?1.15:1/1.15;
  ox=mx-(mx-ox)*factor; oy=my-(my-oy)*factor;
  scale*=factor; draw();
}, {passive:false});

window.addEventListener('resize', () => { resize(); draw(); });
resize();
</script>
</body>
</html>
