<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMP Map - 실시간</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0e17; color:#e0e0e0; font-family:'JetBrains Mono',monospace; overflow:hidden; }
#toolbar {
  position:fixed; top:0; left:0; right:0; height:48px; z-index:100;
  background:rgba(10,14,23,0.95); border-bottom:1px solid #1e293b;
  display:flex; align-items:center; padding:0 16px; gap:10px;
}
#toolbar h1 { font-size:14px; color:#38bdf8; font-weight:700; margin-right:8px; }
.toggle-btn {
  padding:4px 10px; border-radius:4px; border:1px solid #334155;
  background:transparent; color:#94a3b8; cursor:pointer; font-size:11px;
  font-family:'JetBrains Mono',monospace; transition:all .15s;
}
.toggle-btn.active { background:#1e3a5f; color:#38bdf8; border-color:#38bdf8; }
.toggle-btn:hover { border-color:#64748b; }
#live-dot { width:8px; height:8px; border-radius:50%; background:#10b981; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
#status { font-size:11px; color:#64748b; margin-left:auto; }
#canvas { position:fixed; top:48px; left:0; right:0; bottom:0; }
#tooltip {
  position:fixed; display:none; background:rgba(15,23,42,0.95);
  border:1px solid #38bdf8; border-radius:6px; padding:8px 12px;
  font-size:11px; color:#e2e8f0; pointer-events:none; z-index:200;
  max-width:360px; line-height:1.6;
}
#legend {
  position:fixed; bottom:16px; left:16px; background:rgba(10,14,23,0.9);
  border:1px solid #1e293b; border-radius:8px; padding:12px 16px;
  font-size:11px; z-index:100;
}
.leg-row { display:flex; align-items:center; gap:8px; margin:4px 0; }
.leg-dot { width:10px; height:10px; border-radius:50%; }
#coords {
  position:fixed; bottom:16px; right:16px; background:rgba(10,14,23,0.9);
  border:1px solid #1e293b; border-radius:8px; padding:8px 12px;
  font-size:11px; z-index:100; color:#64748b;
}
#stats {
  position:fixed; top:56px; right:16px; background:rgba(10,14,23,0.9);
  border:1px solid #1e293b; border-radius:8px; padding:8px 12px;
  font-size:11px; z-index:100; color:#64748b;
}
#interval-ctrl {
  display:flex; align-items:center; gap:4px;
}
#interval-ctrl input {
  width:40px; background:#1e293b; border:1px solid #334155; color:#e0e0e0;
  border-radius:3px; padding:2px 4px; font-size:11px; text-align:center;
  font-family:'JetBrains Mono',monospace;
}
#interval-ctrl span { font-size:11px; color:#64748b; }
</style>
</head>
<body>
<div id="toolbar">
  <h1>AMP MAP</h1>
  <div id="live-dot"></div>
  <span style="font-size:11px;color:#10b981;font-weight:700;">LIVE</span>
  <div id="interval-ctrl">
    <input type="number" id="interval-input" value="1" min="1" max="60">
    <span>초</span>
  </div>
  <button class="toggle-btn active" data-layer="node">Node</button>
  <button class="toggle-btn active" data-layer="loc">Location</button>
  <button class="toggle-btn" data-layer="host">Host</button>
  <button class="toggle-btn active" data-layer="buf">Buffer</button>
  <button class="toggle-btn active" data-layer="transfer">Transfer</button>
  <button class="toggle-btn active" data-layer="vehicle">Vehicle</button>
  <button class="toggle-btn" data-layer="disabled">Disabled</button>
  <button class="toggle-btn" onclick="resetView()">Reset</button>
  <div id="status">로딩 중...</div>
</div>

<canvas id="canvas"></canvas>
<div id="tooltip"></div>
<div id="legend">
  <div style="font-weight:700;margin-bottom:6px;color:#38bdf8;">범례</div>
  <div class="leg-row"><div class="leg-dot" style="background:#334155"></div>Node (레인)</div>
  <div class="leg-row"><div class="leg-dot" style="background:#38bdf8"></div>Location</div>
  <div class="leg-row"><div class="leg-dot" style="background:#f59e0b"></div>Host (설비포트)</div>
  <div class="leg-row"><div class="leg-dot" style="background:#10b981"></div>Buffer</div>
  <div class="leg-row"><div class="leg-dot" style="background:#e879f9;width:20px;height:3px;border-radius:2px"></div>Transfer (이동)</div>
  <div class="leg-row"><div class="leg-dot" style="background:#f43f5e"></div>Vehicle (AGV)</div>
</div>
<div id="coords">X: - Y: -</div>
<div id="stats"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const coordsEl = document.getElementById('coords');
const statsEl = document.getElementById('stats');
const statusEl = document.getElementById('status');
const intervalInput = document.getElementById('interval-input');

let DATA = { loc:[], node:[], host:[], buf:[], transfer:[], vehicle:[] };
let locMap = {};
let W, H;
let ox=0, oy=0, scale=1;
let dragging=false, dragX=0, dragY=0;
let minX, maxX, minY, maxY, dataW, dataH;
let layoutLoaded = false;
let refreshTimer = null;

const layers = { node:true, loc:true, host:false, buf:true, transfer:true, vehicle:true, disabled:false };

// ===== DATA LOADING =====

async function loadLayout() {
  try {
    const res = await fetch('/api/layout');
    const raw = await res.json();
    DATA.loc = (raw.location||[]).map(r => ({id:r.UnitID,x:r.PositionX,y:r.PositionY,en:r.Enabled,a:r.Angle,eqp:r.EQPID||''}));
    DATA.node = (raw.node||[]).map(r => ({sid:r.SegmentID,fx:r.FromXPos,fy:r.FromYPos,tx:r.ToXPos,ty:r.ToYPos,en:r.Enabled,d:r.Distance,eqp:r.EQPID||''}));
    DATA.host = (raw.hostlocation||[]).map(r => ({id:r.UnitID,hid:r.HostID,x:r.PositionX,y:r.PositionY,en:r.Enabled,eqp:r.EQPID||''}));
    DATA.buf = (raw.bufferlocation||[]).map(r => ({id:r.UnitID,hid:r.HostID,x:r.PositionX,y:r.PositionY,en:r.Enabled,cid:r.CarrierID||'',bay:r.BayID||'',grp:r.GroupID||'',eqp:r.EQPID||''}));

    locMap = {};
    DATA.loc.forEach(p => { locMap[p.id] = p; });

    // bounds
    minX=Infinity; maxX=-Infinity; minY=Infinity; maxY=-Infinity;
    DATA.loc.forEach(p => { if(p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x; if(p.y<minY)minY=p.y; if(p.y>maxY)maxY=p.y; });
    DATA.node.forEach(n => {
      [n.fx,n.tx].forEach(x => { if(x<minX)minX=x; if(x>maxX)maxX=x; });
      [n.fy,n.ty].forEach(y => { if(y<minY)minY=y; if(y>maxY)maxY=y; });
    });
    const padX=(maxX-minX)*0.05, padY=(maxY-minY)*0.05;
    minX-=padX; maxX+=padX; minY-=padY; maxY+=padY;
    dataW=maxX-minX; dataH=maxY-minY;

    layoutLoaded = true;
    resetView();
    statusEl.textContent = '레이아웃 로드 완료';
  } catch(e) {
    statusEl.textContent = '레이아웃 로드 실패: ' + e.message;
  }
}

async function loadRealtime() {
  try {
    const res = await fetch('/api/realtime');
    const raw = await res.json();

    DATA.transfer = (raw.transfer||[]).map(r => ({
      cmd:r.CommandID||'', cid:r.CarrierID||'', src:r.SourceID||'', dst:r.DestID||'',
      hsrc:r.HostSourceID||'', hdst:r.HostDestID||'', state:r.TransferState,
      vid:r.VehicleID||'', hvid:r.HostVehicleID||'', lot:r.LotID||'',
      create:r.CreateTime||'', ctype:r.CarrierType||''
    }));

    DATA.vehicle = (raw.vehicle||[]).map(r => ({
      vid:r.VehicleID||'', hvid:r.HostVehicleID||'',
      cd1:r.CarrierDetect1, cd2:r.CarrierDetect2,
      cid1:r.CarrierID1||'', cid2:r.CarrierID2||'',
      state:r.VehicleState, job:r.VehicleJob,
      ip:r.IPAddress||'', bay:r.BayID||'', grp:r.GroupID||'',
      assign:r.AssignEnable, pm:r.PMMode
    }));

    // resolve coordinates
    DATA.transfer.forEach(t => {
      const s=locMap[t.src], d=locMap[t.dst];
      if(s){t.sx=s.x;t.sy=s.y;} if(d){t.dx=d.x;t.dy=d.y;}
    });

    const vehLocMap = {};
    DATA.transfer.forEach(t => {
      if(t.vid && t.sx!==undefined) vehLocMap[t.vid]={x:t.sx,y:t.sy};
    });
    DATA.vehicle.forEach(v => {
      const pos=vehLocMap[v.vid];
      if(pos){v.x=pos.x;v.y=pos.y;v.hasPos=true;} else{v.hasPos=false;}
    });

    const ft = raw.fetch_time || new Date().toLocaleTimeString();
    const activeV = DATA.vehicle.filter(v=>v.state===1).length;
    statsEl.innerHTML = `Transfer: ${DATA.transfer.length} | AGV: ${activeV}/${DATA.vehicle.length} 가동 | ${ft}`;
    statusEl.textContent = `갱신: ${ft}`;

    draw();
  } catch(e) {
    statusEl.textContent = '실시간 오류: ' + e.message;
  }
}

function startRefresh() {
  if(refreshTimer) clearInterval(refreshTimer);
  const sec = parseInt(intervalInput.value) || 5;
  refreshTimer = setInterval(loadRealtime, sec * 1000);
}

intervalInput.addEventListener('change', startRefresh);

// ===== DRAWING =====

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight - 48;
}

function resetView() {
  if(!layoutLoaded) return;
  const sx=W/dataW, sy=H/dataH;
  scale = Math.min(sx,sy)*0.95;
  ox = (W-dataW*scale)/2 - minX*scale;
  oy = (H-dataH*scale)/2 - minY*scale;
  draw();
}

function tx(x) { return x*scale+ox; }
function ty(y) { return y*scale+oy; }

function draw() {
  ctx.clearRect(0,0,W,H);

  if(layers.node) {
    ctx.lineWidth = Math.max(0.5, scale*80);
    DATA.node.forEach(n => {
      if(!n.en && !layers.disabled) return;
      ctx.strokeStyle = n.en ? 'rgba(51,65,85,0.6)' : 'rgba(239,68,68,0.3)';
      ctx.beginPath();
      ctx.moveTo(tx(n.fx), ty(n.fy));
      ctx.lineTo(tx(n.tx), ty(n.ty));
      ctx.stroke();
    });
  }

  if(layers.loc) {
    const r = Math.max(1.5, scale*120);
    DATA.loc.forEach(p => {
      if(!p.en && !layers.disabled) return;
      ctx.fillStyle = p.en ? 'rgba(56,189,248,0.4)' : 'rgba(239,68,68,0.3)';
      ctx.beginPath();
      ctx.arc(tx(p.x), ty(p.y), r, 0, Math.PI*2);
      ctx.fill();
    });
  }

  if(layers.host) {
    const r = Math.max(2.5, scale*200);
    DATA.host.forEach(p => {
      if(!p.en && !layers.disabled) return;
      ctx.fillStyle = p.en ? 'rgba(245,158,11,0.7)' : 'rgba(239,68,68,0.5)';
      ctx.beginPath();
      ctx.arc(tx(p.x), ty(p.y), r, 0, Math.PI*2);
      ctx.fill();
    });
    if(scale > 0.008) {
      ctx.font = Math.max(8, scale*600)+'px JetBrains Mono';
      ctx.fillStyle = 'rgba(245,158,11,0.8)';
      ctx.textAlign = 'center';
      DATA.host.forEach(p => {
        if(!p.en && !layers.disabled) return;
        if(p.hid) ctx.fillText(p.hid, tx(p.x), ty(p.y)-r-2);
      });
    }
  }

  if(layers.buf) {
    const r = Math.max(2, scale*150);
    DATA.buf.forEach(p => {
      if(!p.en && !layers.disabled) return;
      ctx.fillStyle = p.cid ? 'rgba(16,185,129,0.9)' : 'rgba(16,185,129,0.4)';
      ctx.beginPath();
      ctx.rect(tx(p.x)-r, ty(p.y)-r, r*2, r*2);
      ctx.fill();
    });
  }

  if(layers.transfer) {
    ctx.lineWidth = Math.max(1.5, scale*150);
    DATA.transfer.forEach(t => {
      if(t.sx===undefined || t.dx===undefined) return;
      const x1=tx(t.sx),y1=ty(t.sy),x2=tx(t.dx),y2=ty(t.dy);
      ctx.strokeStyle = 'rgba(232,121,249,0.7)';
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      const ang=Math.atan2(y2-y1,x2-x1), asz=Math.max(6,scale*400);
      ctx.fillStyle='rgba(232,121,249,0.9)';
      ctx.beginPath(); ctx.moveTo(x2,y2);
      ctx.lineTo(x2-asz*Math.cos(ang-0.4),y2-asz*Math.sin(ang-0.4));
      ctx.lineTo(x2-asz*Math.cos(ang+0.4),y2-asz*Math.sin(ang+0.4));
      ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.arc(x1,y1,Math.max(3,scale*200),0,Math.PI*2); ctx.fill();
    });
  }

  if(layers.vehicle) {
    const r = Math.max(5, scale*350);
    DATA.vehicle.forEach(v => {
      if(!v.hasPos) return;
      const cx=tx(v.x), cy=ty(v.y);
      ctx.fillStyle = v.state===1 ? 'rgba(244,63,94,0.9)' : 'rgba(244,63,94,0.4)';
      ctx.beginPath();
      ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r,cy); ctx.lineTo(cx,cy+r); ctx.lineTo(cx-r,cy);
      ctx.closePath(); ctx.fill();
      if(scale > 0.005) {
        ctx.font=Math.max(9,scale*500)+'px JetBrains Mono';
        ctx.fillStyle='#f43f5e'; ctx.textAlign='center';
        ctx.fillText(v.hvid||('V'+v.vid), cx, cy-r-4);
      }
    });
  }
}

// ===== LAYER TOGGLE =====

document.querySelectorAll('[data-layer]').forEach(btn => {
  btn.addEventListener('click', () => {
    const name=btn.dataset.layer;
    layers[name]=!layers[name];
    btn.classList.toggle('active',layers[name]);
    draw();
  });
});

// ===== TOOLTIP =====

function findNearest(mx,my,radius) {
  const wx=(mx-ox)/scale, wy=(my-oy)/scale;
  let best=null, bestD=radius/scale;
  if(layers.vehicle) DATA.vehicle.forEach(p => { if(!p.hasPos) return; const d=Math.hypot(p.x-wx,p.y-wy); if(d<bestD){bestD=d;best={type:'vehicle',...p};} });
  if(layers.transfer) DATA.transfer.forEach(t => {
    if(t.sx===undefined) return;
    const d1=Math.hypot(t.sx-wx,t.sy-wy);
    if(d1<bestD){bestD=d1;best={type:'transfer',...t};}
    if(t.dx!==undefined){const d2=Math.hypot(t.dx-wx,t.dy-wy);if(d2<bestD){bestD=d2;best={type:'transfer',...t};}}
  });
  if(layers.host) DATA.host.forEach(p => { const d=Math.hypot(p.x-wx,p.y-wy); if(d<bestD){bestD=d;best={type:'host',...p};} });
  if(layers.buf) DATA.buf.forEach(p => { const d=Math.hypot(p.x-wx,p.y-wy); if(d<bestD){bestD=d;best={type:'buf',...p};} });
  if(layers.loc) DATA.loc.forEach(p => { const d=Math.hypot(p.x-wx,p.y-wy); if(d<bestD){bestD=d;best={type:'loc',...p};} });
  return best;
}

canvas.addEventListener('mousemove', e => {
  const mx=e.clientX, my=e.clientY-48;
  const wx=((mx-ox)/scale).toFixed(0), wy=((my-oy)/scale).toFixed(0);
  coordsEl.textContent=`X: ${wx}  Y: ${wy}  zoom: ${(scale*1000).toFixed(1)}`;
  if(dragging) {
    ox+=e.clientX-dragX; oy+=e.clientY-dragY;
    dragX=e.clientX; dragY=e.clientY;
    draw(); return;
  }
  const hit=findNearest(mx,my,20);
  if(hit) {
    let html='';
    if(hit.type==='host') html=`<b>설비포트</b><br>ID: ${hit.id}<br>HostID: ${hit.hid}<br>위치: (${hit.x}, ${hit.y})<br>Enabled: ${hit.en}`;
    else if(hit.type==='buf') html=`<b>버퍼</b><br>ID: ${hit.id}<br>HostID: ${hit.hid}<br>위치: (${hit.x}, ${hit.y})<br>Carrier: ${hit.cid||'없음'}<br>Bay: ${hit.bay} Group: ${hit.grp}`;
    else if(hit.type==='transfer') html=`<b>이동명령</b><br>CMD: ${hit.cmd}<br>Carrier: ${hit.cid}<br>출발: ${hit.hsrc} (${hit.src})<br>도착: ${hit.hdst} (${hit.dst})<br>AGV: ${hit.hvid} (${hit.vid})<br>상태: ${hit.state}<br>LOT: ${hit.lot}<br>생성: ${hit.create}`;
    else if(hit.type==='vehicle') html=`<b>AGV</b><br>${hit.hvid} (ID:${hit.vid})<br>상태: ${['','가동','대기','PM'][hit.state]||hit.state}<br>작업: ${hit.job}<br>Bay: ${hit.bay}<br>IP: ${hit.ip}<br>캐리어1: ${hit.cid1||'없음'}<br>캐리어2: ${hit.cid2||'없음'}<br>할당: ${hit.assign?'ON':'OFF'} PM: ${hit.pm?'ON':'OFF'}`;
    else html=`<b>Location</b><br>ID: ${hit.id}<br>위치: (${hit.x}, ${hit.y})<br>Enabled: ${hit.en}`;
    tooltip.innerHTML=html; tooltip.style.display='block';
    tooltip.style.left=(e.clientX+12)+'px'; tooltip.style.top=(e.clientY+12)+'px';
  } else tooltip.style.display='none';
});

canvas.addEventListener('mousedown', e => { dragging=true; dragX=e.clientX; dragY=e.clientY; canvas.style.cursor='grabbing'; });
canvas.addEventListener('mouseup', () => { dragging=false; canvas.style.cursor='default'; });
canvas.addEventListener('mouseleave', () => { dragging=false; tooltip.style.display='none'; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const mx=e.clientX, my=e.clientY-48;
  const factor=e.deltaY<0?1.15:1/1.15;
  ox=mx-(mx-ox)*factor; oy=my-(my-oy)*factor;
  scale*=factor; draw();
}, {passive:false});

window.addEventListener('resize', () => { resize(); draw(); });

// ===== INIT =====

resize();
(async () => {
  await loadLayout();
  await loadRealtime();
  startRefresh();
})();
</script>
</body>
</html>
