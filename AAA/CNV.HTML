const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

// 상태
let offsetX = 0, offsetY = 0, scale = 0.12;
let dragging = false, lastX, lastY;
let showEdges = true, showLabels = true, portsOnly = false;
let selectedId = null, highlightIds = new Set();

// 색상 맵
const TYPE_COLOR = {
  0: '#4a9eff', 1: '#ffd700', 2: '#00ff88',
  3: '#ff6644', 4: '#aa66ff', 5: '#ff44aa'

// ID → 데이터 맵
const zoneMap = {};
RAW.forEach(z => zoneMap[z.id] = z);

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 44 - 30;
  draw();
}

function worldToScreen(wx, wy) {
  return [wx * scale + offsetX, wy * scale + offsetY];
}
function screenToWorld(sx, sy) {
  return [(sx - offsetX) / scale, (sy - offsetY) / scale];
}

function fitAll() {
  const xs = RAW.map(d => d.x), ys = RAW.map(d => d.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const W = canvas.width - 60, H = canvas.height - 60;
  const rangeX = maxX - minX, rangeY = maxY - minY;
  scale = Math.min(W / rangeX, H / rangeY) * 0.9;
  offsetX = (canvas.width - rangeX * scale) / 2 - minX * scale;
  offsetY = (canvas.height - rangeY * scale) / 2 - minY * scale;
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#0d0d1e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let x = sx0; x < canvas.width; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      const sy0 = offsetY % gridSize;
      for (let y = sy0; y < canvas.height; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
    }
  }

  const visible = portsOnly ? RAW.filter(d => d.t === 2 || d.t === 3 || d.t === 5) : RAW;
  const visSet = new Set(visible.map(d => d.id));

  // 엣지 그리기
  if (showEdges) {
    ctx.lineWidth = Math.max(0.5, scale * 6);

      if (!visSet.has(z.id)) return;
      const [sx, sy] = worldToScreen(z.x, z.y);

        const nz = zoneMap[z.next];
        const [nx, ny] = worldToScreen(nz.x, nz.y);
        const isHl = highlightIds.has(z.id) && highlightIds.has(z.next);
        ctx.strokeStyle = isHl ? '#ffff00' : 'rgba(100,180,255,0.25)';
        ctx.lineWidth = isHl ? Math.max(2, scale * 12) : Math.max(0.5, scale * 5);
        ctx.beginPath();
        ctx.moveTo(sx, sy); ctx.lineTo(nx, ny);
        ctx.stroke();
      }
    });
  }

  // 노드 그리기
  visible.forEach(z => {
    const [sx, sy] = worldToScreen(z.x, z.y);
    if (sx < -20 || sx > canvas.width + 20 || sy < -20 || sy > canvas.height + 20) return;

    const r = Math.max(1.5, TYPE_SIZE[z.t] * scale * 5);
    const isSelected = z.id === selectedId;
    const isHl = highlightIds.has(z.id);
    const color = TYPE_COLOR[z.t] || '#aaa';

    // 글로우 효과
    if (isSelected || isHl || z.t === 5) {
      ctx.beginPath();
      ctx.arc(sx, sy, r * 2.2, 0, Math.PI * 2);
      const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 2.2);
      g.addColorStop(0, isSelected ? 'rgba(255,255,0,0.5)' : isHl ? 'rgba(255,200,0,0.3)' : 'rgba(255,68,170,0.3)');
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = isSelected ? '#ffff00' : color;
    ctx.fill();
    if (isSelected || z.t >= 2) {
      ctx.strokeStyle = isSelected ? '#fff' : '#fff3';
      ctx.lineWidth = isSelected ? 2 : 0.5;
      ctx.stroke();
    }

    // 라벨
    if (showLabels && scale > 0.08 && (z.t >= 2 || scale > 0.25)) {
      const label = z.t >= 2 ? z.name : (scale > 0.4 ? z.name : String(z.id));
      ctx.font = `${Math.max(8, scale * 55)}px monospace`;
      ctx.fillStyle = isSelected ? '#ffff00' : (z.t >= 2 ? '#fff' : '#aaa');
      ctx.textAlign = 'center';
      ctx.fillText(label, sx, sy - r - 3);
    }
  });

  // 줌 표시
  document.getElementById('zoom-info').textContent = `줌: ${(scale * 100 / 0.12).toFixed(0)}%`;
}

// 마우스 이벤트
canvas.addEventListener('mousedown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY - 44;
});
canvas.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY - 44;
  if (dragging) {
    offsetX += mx - lastX; offsetY += my - lastY;
    lastX = mx; lastY = my; draw(); return;
  }
  // 툴팁
  const [wx, wy] = screenToWorld(mx, my);
  let closest = null, minDist = 20 / scale;
  RAW.forEach(z => {
    const d = Math.hypot(z.x - wx, z.y - wy);
    if (d < minDist) { minDist = d; closest = z; }
  });
  if (closest) {
    tooltip.style.display = 'block';
    tooltip.style.left = (mx + 15) + 'px';
    tooltip.style.top = (my + 44 + 5) + 'px';
    const tname = ['일반Zone','Branch/Merge','IN Port','OUT Port','Transfer','Lifter'];
    tooltip.innerHTML = `
      <div class="t-name">${closest.name}</div>
      <div class="t-row"><span>ZoneID</span><span class="t-val">${closest.id}</span></div>
      <div class="t-row"><span>Type</span><span class="t-val">${tname[closest.t]||closest.t}</span></div>
      <div class="t-row"><span>좌표</span><span class="t-val">(${closest.x}, ${closest.y})</span></div>
      <div class="t-row"><span>Next</span><span class="t-val">${closest.next === -1 ? '없음' : closest.next}</span></div>
      <div class="t-row"><span>Prev</span><span class="t-val">${closest.prev === -1 ? '없음' : closest.prev}</span></div>
    `;
  } else {
    tooltip.style.display = 'none';
  }
});
canvas.addEventListener('mouseup', e => {
  if (!dragging) return;
  dragging = false;
  // 클릭 (이동 없으면)
  const dx = Math.abs(e.clientX - lastX), dy = Math.abs(e.clientY - 44 - lastY);
  if (dx < 3 && dy < 3) {
    const [wx, wy] = screenToWorld(e.clientX, e.clientY - 44);
    let closest = null, minDist = 25 / scale;
    RAW.forEach(z => {
      const d = Math.hypot(z.x - wx, z.y - wy);
      if (d < minDist) { minDist = d; closest = z; }
    });
    if (closest) {
      selectedId = closest.id;
      document.getElementById('sel-info').innerHTML =
        `선택: <b style="color:#00d4ff">${closest.name}</b> (ID:${closest.id})`;
    } else {
      selectedId = null;
      document.getElementById('sel-info').textContent = '선택: 없음';
    }
    draw();
  }
  dragging = false;
});
canvas.addEventListener('mouseleave', () => { dragging = false; tooltip.style.display = 'none'; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const mx = e.clientX, my = e.clientY - 44;
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  const [wx, wy] = screenToWorld(mx, my);
  scale *= factor;
  scale = Math.max(0.02, Math.min(2, scale));
  offsetX = mx - wx * scale;
  offsetY = my - wy * scale;
  draw();
}, { passive: false });

// 버튼 기능
function toggleEdges() {
  showEdges = !showEdges;
  document.getElementById('btn-edges').classList.toggle('active', showEdges);
  draw();
}
function toggleLabels() {
  showLabels = !showLabels;
  document.getElementById('btn-labels').classList.toggle('active', showLabels);
  draw();
}
function filterPorts() {
  portsOnly = !portsOnly;
  document.getElementById('btn-ports').classList.toggle('active', portsOnly);
  draw();
}
function showAll() {
  portsOnly = false; highlightIds.clear(); selectedId = null;
  document.getElementById('btn-ports').classList.remove('active');
  document.getElementById('sel-info').textContent = '선택: 없음';
  fitAll();
}

function searchZone(val) {
  if (!val.trim()) { highlightIds.clear(); draw(); return; }
  highlightIds.clear();
  const q = val.toLowerCase();
  RAW.forEach(z => {
    if (String(z.id).includes(q) || z.name.toLowerCase().includes(q)) {
      highlightIds.add(z.id);
    }
  });
  // 첫번째 검색결과로 이동
  if (highlightIds.size > 0) {
    const first = RAW.find(z => highlightIds.has(z.id));
    if (first) {
      offsetX = canvas.width / 2 - first.x * scale;
      offsetY = canvas.height / 2 - first.y * scale;
    }
  }
  draw();
}

window.addEventListener('resize', resize);
resize();
fitAll();
</script>
