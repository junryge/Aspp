<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB 3D Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        canvas { display: block; }

        /* 로딩 */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 0.5s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid #333;
            border-top: 4px solid #00d2ff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { color: #ccc; margin-top: 16px; font-size: 14px; }
        #progress { color: #00d2ff; font-size: 18px; margin-top: 8px; }

        /* 컨트롤 패널 */
        #controls {
            position: fixed; top: 16px; left: 16px; background: rgba(0,0,0,0.7);
            padding: 16px; border-radius: 10px; color: #fff; font-size: 13px;
            backdrop-filter: blur(10px); min-width: 220px; max-height: calc(100vh - 32px);
            overflow-y: auto;
        }
        #controls h3 { margin-bottom: 10px; color: #00d2ff; font-size: 15px; }
        .ctrl-row { margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .ctrl-row label { color: #aaa; }
        .ctrl-row input[type="range"] { width: 100px; }
        .btn {
            background: #00d2ff22; border: 1px solid #00d2ff; color: #00d2ff;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
            margin: 2px;
        }
        .btn:hover { background: #00d2ff44; }
        .btn.primary { background: #00d2ff33; font-size: 13px; padding: 8px 14px; }
        #btn-row { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }

        /* 파일 목록 */
        #file-list {
            margin-top: 10px; max-height: 250px; overflow-y: auto;
            border: 1px solid #333; border-radius: 6px; display: none;
        }
        .file-item {
            padding: 6px 10px; cursor: pointer; font-size: 12px;
            color: #aaa; border-bottom: 1px solid #222;
            transition: all 0.15s;
        }
        .file-item:hover { background: #00d2ff22; color: #fff; }
        .file-item.active { background: #00d2ff33; color: #00d2ff; }
        .file-item:last-child { border-bottom: none; }
        #file-count { color: #666; font-size: 11px; margin-top: 4px; }

        /* 파일 드롭 */
        #drop-zone {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,210,255,0.1); border: 3px dashed #00d2ff;
            display: none; justify-content: center; align-items: center;
            z-index: 200; font-size: 24px; color: #00d2ff;
        }

        /* 시작 화면 */
        #welcome {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #555; z-index: 50;
        }
        #welcome .icon { font-size: 60px; margin-bottom: 16px; }
        #welcome p { font-size: 16px; margin-bottom: 8px; }
        #welcome .sub { font-size: 13px; color: #444; }

        /* 정보 */
        #info {
            position: fixed; bottom: 16px; left: 16px; color: #666;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>모델 로딩 중...</p>
        <div id="progress">0%</div>
    </div>

    <div id="welcome">
        <div class="icon">📦</div>
        <p>GLB 파일을 선택하거나 드래그하세요</p>
        <div class="sub">좌측 "📂 폴더 선택" 또는 "📄 파일 열기"로 시작</div>
    </div>

    <div id="drop-zone">📦 GLB 파일을 여기에 드롭하세요</div>

    <div id="controls">
        <h3>🎮 3D Viewer</h3>

        <!-- 파일 열기 -->
        <button class="btn primary" onclick="document.getElementById('file-input').click()" style="width:100%;margin-bottom:4px;">📄 파일 열기</button>
        <button class="btn primary" onclick="document.getElementById('folder-input').click()" style="width:100%;margin-bottom:4px;">📂 폴더 선택</button>
        <input type="file" id="file-input" accept=".glb,.gltf" style="display:none">
        <input type="file" id="folder-input" webkitdirectory multiple style="display:none">

        <div id="file-count"></div>
        <div id="file-list"></div>

        <hr style="border-color:#333; margin:10px 0;">

        <div class="ctrl-row">
            <label>배경</label>
            <input type="color" id="bg-color" value="#1a1a2e">
        </div>
        <div class="ctrl-row">
            <label>밝기</label>
            <input type="range" id="light-intensity" min="0" max="5" step="0.1" value="1.5">
        </div>
        <div class="ctrl-row">
            <label>와이어프레임</label>
            <input type="checkbox" id="wireframe">
        </div>
        <div id="btn-row">
            <button class="btn" onclick="resetCamera()">리셋</button>
            <button class="btn" onclick="toggleAutoRotate()">자동회전</button>
            <button class="btn" onclick="fitToScreen()">화면맞춤</button>
        </div>
        <div id="model-info" style="margin-top:10px; color:#888; font-size:11px;"></div>
    </div>

    <div id="info">마우스: 회전 | 스크롤: 줌 | 우클릭: 이동 | ↑↓: 파일 전환 | 드래그앤드롭 가능</div>

    <div id="canvas-container"></div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

    <script>
        // === 기본 설정 ===
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(5, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // === 조명 ===
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight1.position.set(5, 10, 5);
        dirLight1.castShadow = true;
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight2.position.set(-5, 5, -5);
        scene.add(dirLight2);

        const hemiLight = new THREE.HemisphereLight(0xddeeff, 0x0f0e0d, 0.5);
        scene.add(hemiLight);

        // === 컨트롤 ===
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.autoRotateSpeed = 2.0;

        // === GLB 로더 (Draco 지원) ===
        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);

        let currentModel = null;
        let folderFiles = [];

        // === 파일 로드 ===
        function loadGLB(source, fileName) {
            const loadingEl = document.getElementById('loading');
            const progressEl = document.getElementById('progress');
            loadingEl.classList.remove('hidden');
            loadingEl.style.display = 'flex';
            progressEl.textContent = '0%';
            progressEl.style.color = '#00d2ff';

            document.getElementById('welcome').style.display = 'none';

            // 기존 모델 정리
            if (currentModel) {
                scene.remove(currentModel);
                currentModel.traverse((child) => {
                    if (child.isMesh) {
                        if (child.geometry) child.geometry.dispose();
                        if (child.material) {
                            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                            else child.material.dispose();
                        }
                    }
                });
                currentModel = null;
            }

            const onLoad = (gltf) => {
                currentModel = gltf.scene;
                scene.add(currentModel);
                fitToScreen();

                let meshCount = 0, vertexCount = 0, faceCount = 0;
                currentModel.traverse((child) => {
                    if (child.isMesh) {
                        meshCount++;
                        if (child.geometry) {
                            const pos = child.geometry.attributes.position;
                            if (pos) vertexCount += pos.count;
                            if (child.geometry.index) faceCount += child.geometry.index.count / 3;
                            else if (pos) faceCount += pos.count / 3;
                        }
                    }
                });

                let infoHTML = '';
                if (fileName) infoHTML += `📄 ${fileName}<br>`;
                infoHTML += `메쉬: ${meshCount}개<br>`;
                infoHTML += `정점: ${(vertexCount/1000).toFixed(1)}K<br>`;
                infoHTML += `면: ${(faceCount/1000).toFixed(1)}K`;
                document.getElementById('model-info').innerHTML = infoHTML;

                loadingEl.classList.add('hidden');
                setTimeout(() => { loadingEl.style.display = 'none'; }, 500);
            };

            const onProgress = (xhr) => {
                if (xhr.lengthComputable) {
                    progressEl.textContent = (xhr.loaded / xhr.total * 100).toFixed(0) + '%';
                } else {
                    progressEl.textContent = (xhr.loaded / 1024 / 1024).toFixed(1) + ' MB';
                }
            };

            const onError = (error) => {
                console.error('로딩 에러:', error);
                progressEl.textContent = '❌ 로딩 실패';
                progressEl.style.color = '#ff4444';
            };

            if (source instanceof ArrayBuffer) {
                loader.parse(source, '', onLoad, onError);
            } else if (typeof source === 'string') {
                loader.load(source, onLoad, onProgress, onError);
            }
        }

        function loadFromFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => loadGLB(e.target.result, file.name);
            reader.readAsArrayBuffer(file);
        }

        // === 폴더 선택 ===
        document.getElementById('folder-input').addEventListener('change', (e) => {
            const allFiles = Array.from(e.target.files);
            folderFiles = allFiles.filter(f => /\.(glb|gltf)$/i.test(f.name));

            if (folderFiles.length === 0) {
                alert('선택한 폴더에 GLB/GLTF 파일이 없습니다.');
                return;
            }

            folderFiles.sort((a, b) => a.name.localeCompare(b.name));

            const listEl = document.getElementById('file-list');
            listEl.style.display = 'block';
            listEl.innerHTML = '';

            folderFiles.forEach((file, idx) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                const sizeMB = (file.size / 1024 / 1024).toFixed(1);
                item.innerHTML = `${file.name} <span style="color:#555;font-size:10px;">(${sizeMB}MB)</span>`;
                item.onclick = () => {
                    listEl.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    loadFromFile(file);
                };
                listEl.appendChild(item);
            });

            document.getElementById('file-count').textContent = `GLB 파일 ${folderFiles.length}개 발견`;

            // 첫번째 자동 로드
            listEl.querySelector('.file-item').classList.add('active');
            loadFromFile(folderFiles[0]);
        });

        // === 단일 파일 열기 ===
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) loadFromFile(file);
        });

        // === 카메라 기능 ===
        function fitToScreen() {
            if (!currentModel) return;
            const box = new THREE.Box3().setFromObject(currentModel);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const distance = maxDim * 1.5;

            camera.position.set(center.x + distance, center.y + distance * 0.5, center.z + distance);
            controls.target.copy(center);
            controls.update();

            camera.near = maxDim * 0.001;
            camera.far = maxDim * 100;
            camera.updateProjectionMatrix();
        }

        function resetCamera() {
            camera.position.set(5, 3, 5);
            controls.target.set(0, 0, 0);
            controls.update();
        }

        function toggleAutoRotate() {
            controls.autoRotate = !controls.autoRotate;
        }

        // === UI 컨트롤 ===
        document.getElementById('bg-color').addEventListener('input', (e) => {
            scene.background = new THREE.Color(e.target.value);
        });

        document.getElementById('light-intensity').addEventListener('input', (e) => {
            dirLight1.intensity = parseFloat(e.target.value);
        });

        document.getElementById('wireframe').addEventListener('change', (e) => {
            if (!currentModel) return;
            currentModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.wireframe = e.target.checked);
                    } else {
                        child.material.wireframe = e.target.checked;
                    }
                }
            });
        });

        // === 드래그 앤 드롭 ===
        const dropZone = document.getElementById('drop-zone');
        window.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.display = 'flex'; });
        window.addEventListener('dragleave', (e) => { if (e.relatedTarget === null) dropZone.style.display = 'none'; });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.display = 'none';
            const file = e.dataTransfer.files[0];
            if (file && /\.(glb|gltf)$/i.test(file.name)) loadFromFile(file);
        });

        // === 키보드: ↑↓ 파일 전환 ===
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (folderFiles.length === 0) return;

            const listEl = document.getElementById('file-list');
            const items = listEl.querySelectorAll('.file-item');
            let currentIdx = -1;
            items.forEach((item, idx) => { if (item.classList.contains('active')) currentIdx = idx; });

            if (e.key === 'ArrowUp' && currentIdx > 0) {
                e.preventDefault();
                items[currentIdx].classList.remove('active');
                items[currentIdx - 1].classList.add('active');
                items[currentIdx - 1].scrollIntoView({ block: 'nearest' });
                loadFromFile(folderFiles[currentIdx - 1]);
            }
            if (e.key === 'ArrowDown' && currentIdx < folderFiles.length - 1) {
                e.preventDefault();
                items[currentIdx].classList.remove('active');
                items[currentIdx + 1].classList.add('active');
                items[currentIdx + 1].scrollIntoView({ block: 'nearest' });
                loadFromFile(folderFiles[currentIdx + 1]);
            }
        });

        // === 리사이즈 ===
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // === 애니메이션 루프 ===
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
