<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG → 3D 회전 뷰어</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eef5ff 0%, #dbe8fb 100%);
      color: #183153;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      width: 100%;
      height: 100%;
    }

    .panel {
      padding: 18px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      border-right: 1px solid rgba(24,49,83,0.12);
      overflow: auto;
    }

    .panel h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .panel p {
      margin: 0 0 14px;
      line-height: 1.45;
      font-size: 14px;
      color: #3a5477;
    }

    .section {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.78);
      box-shadow: 0 10px 30px rgba(26, 53, 92, 0.08);
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .btn, .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 42px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #4b95ff, #256fe8);
      color: white;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      padding: 10px 12px;
    }

    .btn.secondary {
      background: linear-gradient(135deg, #89b8ff, #5d93f3);
      margin-top: 8px;
    }

    .btn:active, .file-label:active {
      transform: translateY(1px);
    }

    input[type="file"] {
      display: none;
    }

    textarea {
      width: 100%;
      min-height: 230px;
      resize: vertical;
      border: 1px solid rgba(24,49,83,0.16);
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      color: #183153;
      background: rgba(248, 251, 255, 0.95);
      outline: none;
    }

    .control {
      margin-top: 12px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 13px;
      color: #2d4668;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .viewer {
      position: relative;
      overflow: hidden;
    }

    #stage {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: grab;
    }

    #stage.dragging {
      cursor: grabbing;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.78);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      color: #2e4e76;
      box-shadow: 0 10px 30px rgba(26, 53, 92, 0.10);
      pointer-events: none;
      backdrop-filter: blur(8px);
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #47617f;
      word-break: break-word;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .panel {
        max-height: 48vh;
        border-right: 0;
        border-bottom: 1px solid rgba(24,49,83,0.12);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>SVG → 3D 회전 뷰어</h1>
      <p>SVG를 붙여넣거나 파일로 불러오면, 앞면 텍스처처럼 입혀서 마우스로 3D 회전할 수 있게 보여줘.</p>

      <div class="section">
        <h2>SVG 넣기</h2>
        <label class="file-label" for="svgFile">SVG 파일 불러오기</label>
        <input id="svgFile" type="file" accept=".svg,image/svg+xml" />
        <button class="btn secondary" id="loadSampleBtn">샘플 SVG 넣기</button>
        <div class="status" id="fileStatus">파일 없음</div>
      </div>

      <div class="section">
        <h2>직접 붙여넣기</h2>
        <textarea id="svgInput"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dff0ff"/>
      <stop offset="100%" stop-color="#6fb1ff"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="260" height="260" rx="28" fill="url(#g1)" stroke="#2b5fb8" stroke-width="8"/>
  <circle cx="150" cy="110" r="46" fill="#ffffff" fill-opacity="0.9"/>
  <path d="M75 210 L150 145 L225 210" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg></textarea>
        <button class="btn" id="applyBtn">뷰어에 적용</button>
      </div>

      <div class="section">
        <h2>두께 / 확대</h2>
        <div class="control">
          <label><span>두께</span><span id="depthValue">70</span></label>
          <input id="depthRange" type="range" min="10" max="180" value="70" />
        </div>
        <div class="control">
          <label><span>확대</span><span id="scaleValue">1.00</span></label>
          <input id="scaleRange" type="range" min="60" max="180" value="100" />
        </div>
      </div>

      <div class="section">
        <h2>설명</h2>
        <p>이건 SVG를 진짜 메쉬로 변환하는 건 아니고, SVG를 앞면/뒷면 질감처럼 사용해서 3D 박스에 입혀 보여주는 방식이야.</p>
      </div>
    </aside>

    <main class="viewer">
      <canvas id="stage"></canvas>
      <div class="hint">드래그 회전 · 휠 확대</div>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");

    const svgInput = document.getElementById("svgInput");
    const applyBtn = document.getElementById("applyBtn");
    const svgFile = document.getElementById("svgFile");
    const fileStatus = document.getElementById("fileStatus");
    const loadSampleBtn = document.getElementById("loadSampleBtn");
    const depthRange = document.getElementById("depthRange");
    const depthValue = document.getElementById("depthValue");
    const scaleRange = document.getElementById("scaleRange");
    const scaleValue = document.getElementById("scaleValue");

    let w = 0;
    let h = 0;
    let dpr = Math.max(1, window.devicePixelRatio || 1);

    let rotationX = -0.45;
    let rotationY = 0.65;
    let zoom = 1.0;
    let drag = false;
    let lastX = 0;
    let lastY = 0;
    let velocityX = 0;
    let velocityY = 0;
    let raf = null;

    let depth = Number(depthRange.value);
    let scale = Number(scaleRange.value) / 100;

    let texture = null;
    let textureReady = false;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      w = rect.width;
      h = rect.height;
      dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function project(point) {
      const fov = 700;
      const z = point.z + 700;
      const s = fov / z;
      return {
        x: point.x * s + w / 2,
        y: point.y * s + h / 2,
        scale: s
      };
    }

    function rotate(point, ax, ay) {
      let {x, y, z} = point;

      const cosY = Math.cos(ay);
      const sinY = Math.sin(ay);
      let x1 = x * cosY + z * sinY;
      let z1 = -x * sinY + z * cosY;

      const cosX = Math.cos(ax);
      const sinX = Math.sin(ax);
      let y2 = y * cosX - z1 * sinX;
      let z2 = y * sinX + z1 * cosX;

      return { x: x1, y: y2, z: z2 };
    }

    function buildCube(size, depthValue) {
      const s = size / 2;
      const zf = depthValue / 2;
      const zb = -depthValue / 2;
      return {
        front: [
          {x:-s,y:-s,z:zf},{x:s,y:-s,z:zf},{x:s,y:s,z:zf},{x:-s,y:s,z:zf}
        ],
        back: [
          {x:-s,y:-s,z:zb},{x:s,y:-s,z:zb},{x:s,y:s,z:zb},{x:-s,y:s,z:zb}
        ]
      };
    }

    function quadDepth(quad) {
      return quad.reduce((sum, p) => sum + p.z, 0) / quad.length;
    }

    function drawTexturedQuad(image, quad) {
      const p0 = project(quad[0]);
      const p1 = project(quad[1]);
      const p2 = project(quad[2]);
      const p3 = project(quad[3]);

      const minX = Math.min(p0.x, p1.x, p2.x, p3.x);
      const maxX = Math.max(p0.x, p1.x, p2.x, p3.x);
      const minY = Math.min(p0.y, p1.y, p2.y, p3.y);
      const maxY = Math.max(p0.y, p1.y, p2.y, p3.y);

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.lineTo(p3.x, p3.y);
      ctx.closePath();
      ctx.clip();

      const width = maxX - minX;
      const height = maxY - minY;
      ctx.drawImage(image, minX, minY, width, height);
      ctx.restore();

      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.lineTo(p3.x, p3.y);
      ctx.closePath();
      ctx.strokeStyle = "rgba(27, 74, 150, 0.45)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    function drawFace(quad, fill) {
      const p = quad.map(project);
      ctx.beginPath();
      ctx.moveTo(p[0].x, p[0].y);
      for (let i = 1; i < p.length; i++) ctx.lineTo(p[i].x, p[i].y);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = "rgba(27, 74, 150, 0.35)";
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);

      const baseSize = Math.min(w, h) * 0.34 * scale * zoom;
      const cube = buildCube(baseSize, depth);

      const faces = [
        { name: "front", pts: cube.front },
        { name: "back", pts: cube.back },
        { name: "left", pts: [cube.back[0], cube.front[0], cube.front[3], cube.back[3]] },
        { name: "right", pts: [cube.front[1], cube.back[1], cube.back[2], cube.front[2]] },
        { name: "top", pts: [cube.back[0], cube.back[1], cube.front[1], cube.front[0]] },
        { name: "bottom", pts: [cube.front[3], cube.front[2], cube.back[2], cube.back[3]] }
      ].map(face => ({
        name: face.name,
        pts: face.pts.map(p => rotate(p, rotationX, rotationY))
      }));

      faces.sort((a, b) => quadDepth(a.pts) - quadDepth(b.pts));

      const shadowCenter = project(rotate({x:0,y:baseSize * 0.65,z:-120}, rotationX, rotationY));
      const shadowRadius = baseSize * 0.55;
      const grad = ctx.createRadialGradient(shadowCenter.x, shadowCenter.y + 100, 10, shadowCenter.x, shadowCenter.y + 100, shadowRadius * 1.4);
      grad.addColorStop(0, "rgba(25, 52, 92, 0.22)");
      grad.addColorStop(1, "rgba(25, 52, 92, 0)");
      ctx.beginPath();
      ctx.ellipse(shadowCenter.x, shadowCenter.y + 100, shadowRadius * 1.2, shadowRadius * 0.45, 0, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      for (const face of faces) {
        if (face.name === "front" && textureReady) {
          drawTexturedQuad(texture, face.pts);
        } else if (face.name === "back" && textureReady) {
          drawTexturedQuad(texture, [face.pts[1], face.pts[0], face.pts[3], face.pts[2]]);
          ctx.fillStyle = "rgba(15, 40, 84, 0.18)";
          const p = face.pts.map(project);
          ctx.beginPath();
          ctx.moveTo(p[0].x, p[0].y);
          p.slice(1).forEach(pt => ctx.lineTo(pt.x, pt.y));
          ctx.closePath();
          ctx.fill();
        } else {
          const fills = {
            left: "#5b95f1",
            right: "#2d78ee",
            top: "#dbeeff",
            bottom: "#245ab4",
            front: "#7fb7ff",
            back: "#4878c6"
          };
          drawFace(face.pts, fills[face.name] || "#7fb7ff");
        }
      }
    }

    function loadSVG(svgText) {
      textureReady = false;

      const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const img = new Image();

      img.onload = () => {
        texture = img;
        textureReady = true;
        URL.revokeObjectURL(url);
        draw();
      };

      img.onerror = () => {
        fileStatus.textContent = "SVG 로드 실패";
      };

      img.src = url;
    }

    function applySVG() {
      const text = svgInput.value.trim();
      if (!text) return;
      loadSVG(text);
      fileStatus.textContent = "텍스트 SVG 적용됨";
    }

    applyBtn.addEventListener("click", applySVG);

    loadSampleBtn.addEventListener("click", () => {
      svgInput.value = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5fbff"/>
      <stop offset="100%" stop-color="#69a9ff"/>
    </linearGradient>
  </defs>
  <rect x="24" y="24" width="272" height="272" rx="32" fill="url(#g2)" stroke="#2b5fb8" stroke-width="10"/>
  <rect x="74" y="74" width="172" height="64" rx="18" fill="#ffffff" fill-opacity="0.85"/>
  <circle cx="160" cy="210" r="42" fill="#ffffff" fill-opacity="0.92"/>
</svg>`;
      applySVG();
    });

    svgFile.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      fileStatus.textContent = `불러온 파일: ${file.name}`;
      const reader = new FileReader();
      reader.onload = () => {
        svgInput.value = String(reader.result || "");
        applySVG();
      };
      reader.readAsText(file, "utf-8");
    });

    depthRange.addEventListener("input", () => {
      depth = Number(depthRange.value);
      depthValue.textContent = String(depth);
      draw();
    });

    scaleRange.addEventListener("input", () => {
      scale = Number(scaleRange.value) / 100;
      scaleValue.textContent = scale.toFixed(2);
      draw();
    });

    canvas.addEventListener("pointerdown", (e) => {
      drag = true;
      lastX = e.clientX;
      lastY = e.clientY;
      canvas.classList.add("dragging");
      velocityX = 0;
      velocityY = 0;
      if (canvas.setPointerCapture) canvas.setPointerCapture(e.pointerId);
    });

    window.addEventListener("pointermove", (e) => {
      if (!drag) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      velocityX = dx * 0.005;
      velocityY = dy * 0.005;
      rotationY += velocityX;
      rotationX += velocityY;
      rotationX = Math.max(-1.35, Math.min(1.35, rotationX));
      draw();
    });

    function endDrag(e) {
      if (!drag) return;
      drag = false;
      canvas.classList.remove("dragging");
      try {
        if (canvas.releasePointerCapture) canvas.releasePointerCapture(e.pointerId);
      } catch (_) {}
      inertia();
    }

    window.addEventListener("pointerup", endDrag);
    window.addEventListener("pointercancel", endDrag);

    function inertia() {
      cancelAnimationFrame(raf);
      function tick() {
        velocityX *= 0.95;
        velocityY *= 0.95;

        if (Math.abs(velocityX) < 0.0005 && Math.abs(velocityY) < 0.0005) return;

        rotationY += velocityX;
        rotationX += velocityY;
        rotationX = Math.max(-1.35, Math.min(1.35, rotationX));
        draw();
        raf = requestAnimationFrame(tick);
      }
      raf = requestAnimationFrame(tick);
    }

    canvas.addEventListener("wheel", (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.06 : 0.06;
      zoom = Math.max(0.55, Math.min(2.2, zoom + delta));
      draw();
    }, { passive: false });

    window.addEventListener("resize", resize);

    resize();
    applySVG();
  </script>
</body>
</html>
