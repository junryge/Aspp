<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#dfe9f7"/>
    </linearGradient>

    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dceeff"/>
      <stop offset="100%" stop-color="#9ecbff"/>
    </linearGradient>

    <linearGradient id="leftFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7db7ff"/>
      <stop offset="100%" stop-color="#3f8cff"/>
    </linearGradient>

    <linearGradient id="rightFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ca3ff"/>
      <stop offset="100%" stop-color="#256fe8"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#6b7c93" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <ellipse cx="400" cy="430" rx="180" ry="48" fill="#9aa9bf" opacity="0.22"/>

  <g filter="url(#shadow)">
    <polygon points="400,150 560,240 400,330 240,240"
      fill="url(#topFace)" stroke="#2b5fb8" stroke-width="3" stroke-linejoin="round"/>

    <polygon points="240,240 400,330 400,500 240,410"
      fill="url(#leftFace)" stroke="#2b5fb8" stroke-width="3" stroke-linejoin="round"/>

    <polygon points="560,240 400,330 400,500 560,410"
      fill="url(#rightFace)" stroke="#2b5fb8" stroke-width="3" stroke-linejoin="round"/>

    <polyline points="400,150 400,330 400,500"
      fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2"/>
  </g>
</svg>
