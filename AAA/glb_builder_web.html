<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLB Builder - 건물 3D 모델 생성</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #ddd; font-family: 'Segoe UI', sans-serif; }
.header { background: #16213e; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 20px; color: #fff; }
.header .btn-build { background: #0078d4; color: #fff; border: none; padding: 10px 30px; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: bold; }
.header .btn-build:hover { background: #005fa3; }
.header .btn-build:disabled { background: #555; cursor: not-allowed; }

.main { display: flex; gap: 15px; padding: 15px; height: calc(100vh - 60px); }
.faces-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.controls-panel { width: 280px; background: #16213e; border-radius: 10px; padding: 15px; overflow-y: auto; }

.face-row { display: flex; gap: 10px; flex: 1; }
.face-row.top-row { justify-content: center; }

.face-card {
  background: #0f3460; border-radius: 10px; flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; position: relative; overflow: hidden;
  border: 2px dashed #335; cursor: pointer; transition: border-color 0.2s; min-height: 120px;
}
.face-card:hover { border-color: #0078d4; }
.face-card.has-image { border-style: solid; border-color: #0078d4; }
.face-card .label { position: absolute; top: 8px; left: 10px; font-size: 13px; font-weight: bold; color: #fff; z-index: 2; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
.face-card .size-info { position: absolute; top: 24px; left: 10px; font-size: 11px; color: #aaa; z-index: 2; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
.face-card .placeholder { color: #667; font-size: 13px; text-align: center; }
.face-card img { max-width: 100%; max-height: 100%; object-fit: contain; }
.face-card canvas { max-width: 100%; max-height: 100%; }

/* 버튼들 기본 숨김, hover시 표시 */
.face-card .btn-remove,
.face-card .btn-bg,
.face-card .btn-bgcolor {
  display: none;
}
.face-card:hover .btn-remove,
.face-card:hover .btn-bg,
.face-card:hover .btn-bgcolor { display: block; }

.face-card .btn-remove {
  position: absolute; top: 5px; right: 8px;
  background: rgba(255,0,0,0.7); color: #fff; border: none;
  border-radius: 50%; width: 22px; height: 22px;
  cursor: pointer; font-size: 14px; z-index: 3;
}

/* BG 버튼 */
.face-card .btn-bg {
  position: absolute; bottom: 5px; right: 8px;
  color: #fff; border: none; border-radius: 4px;
  padding: 2px 6px; cursor: pointer; font-size: 10px; z-index: 3;
}

/* BG 색상 피커 버튼 - BG 버튼 왼쪽에 위치 */
.face-card .btn-bgcolor {
  position: absolute; bottom: 5px; right: 46px;
  border: 2px solid rgba(255,255,255,0.4); border-radius: 4px;
  width: 22px; height: 22px; cursor: pointer;
  z-index: 3; padding: 0; outline: none;
  /* -webkit-appearance: none; */
}
/* 색상 피커 활성 표시 링 */
.face-card .btn-bgcolor.active {
  border-color: #fff;
  box-shadow: 0 0 0 2px rgba(0,120,212,0.8);
}

.face-card input[type="file"] { display: none; }

/* 툴팁 */
.face-card .btn-bg::after,
.face-card .btn-bgcolor::after {
  content: attr(title);
  position: absolute; bottom: 28px; right: 0;
  background: rgba(0,0,0,0.85); color: #fff;
  font-size: 10px; padding: 2px 6px; border-radius: 3px;
  white-space: nowrap; pointer-events: none; opacity: 0;
  transition: opacity 0.15s;
}
.face-card .btn-bg:hover::after,
.face-card .btn-bgcolor:hover::after { opacity: 1; }

.ctrl-group { margin-bottom: 15px; }
.ctrl-group h3 { font-size: 14px; color: #0078d4; margin-bottom: 8px; border-bottom: 1px solid #335; padding-bottom: 5px; }
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ctrl-row label { font-size: 12px; min-width: 60px; }
.ctrl-row input[type="number"] { background: #0a1628; border: 1px solid #335; color: #ddd; padding: 4px 6px; border-radius: 4px; width: 70px; font-size: 12px; }
.ctrl-row input[type="range"] { flex: 1; }
.ctrl-row .val { font-size: 11px; color: #888; min-width: 35px; text-align: right; }

.checkbox-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.checkbox-row input { accent-color: #0078d4; }
.checkbox-row label { font-size: 12px; }

/* 배경제거 색상 프리셋 */
.bg-presets { display: flex; gap: 5px; flex-wrap: wrap; margin: 5px 0; }
.bg-preset-btn {
  width: 22px; height: 22px; border-radius: 4px; border: 2px solid #335;
  cursor: pointer; transition: border-color 0.15s; flex-shrink: 0;
}
.bg-preset-btn:hover { border-color: #0078d4; transform: scale(1.1); }
.bg-preset-btn.selected { border-color: #fff; box-shadow: 0 0 0 1px #0078d4; }

/* 글로벌 배경 색상 피커 */
.global-bgcolor-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.global-bgcolor-row label { font-size: 12px; min-width: 60px; }
.global-bgcolor-row input[type="color"] { width: 40px; height: 25px; border: 1px solid #335; border-radius: 4px; cursor: pointer; padding: 0; }
.global-bgcolor-row .btn-apply-all {
  background: #0f3460; border: 1px solid #335; color: #ddd;
  padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
}
.global-bgcolor-row .btn-apply-all:hover { background: #0078d4; border-color: #0078d4; color: #fff; }

.status { padding: 8px 15px; background: #0a1628; font-size: 12px; color: #888; text-align: center; }

.progress-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.progress-overlay.show { display: flex; }
.progress-box { background: #16213e; padding: 30px 50px; border-radius: 12px; text-align: center; }
.progress-box .spinner { border: 4px solid #335; border-top: 4px solid #0078d4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* tolerance 표시 */
.tolerance-label { font-size: 10px; color: #888; margin-left: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>GLB Builder</h1>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="btn-build" id="btnBuild">GLB 생성</button>
  </div>
</div>

<div class="main">
  <div class="faces-panel">
    <div class="face-row top-row">
      <div class="face-card" id="face-top" data-face="top" style="max-width:300px;">
        <span class="label">윗면</span>
        <span class="size-info" id="size-top"></span>
        <span class="placeholder">클릭하여 이미지 로드</span>
        <button class="btn-remove" data-remove="top">x</button>
        <button class="btn-bg" id="bgbtn-top" data-bg="top" style="background:rgba(100,100,100,0.7);" title="배경 제거 OFF">BG</button>
        <input type="color" class="btn-bgcolor" id="bgcolorbtn-top" data-bgcolor="top" value="#ffffff" title="배경 색상 선택">
        <input type="file" id="file-top" accept="image/*">
      </div>
    </div>
    <div class="face-row">
      <div class="face-card" id="face-left" data-face="left">
        <span class="label">왼쪽</span>
        <span class="size-info" id="size-left"></span>
        <span class="placeholder">클릭하여 이미지 로드</span>
        <button class="btn-remove" data-remove="left">x</button>
        <button class="btn-bg" id="bgbtn-left" data-bg="left" style="background:rgba(0,120,212,0.8);" title="배경 제거 ON">BG</button>
        <input type="color" class="btn-bgcolor" id="bgcolorbtn-left" data-bgcolor="left" value="#ffffff" title="배경 색상 선택">
        <input type="file" id="file-left" accept="image/*">
      </div>
      <div class="face-card" id="face-front" data-face="front">
        <span class="label">정면</span>
        <span class="size-info" id="size-front"></span>
        <span class="placeholder">클릭하여 이미지 로드</span>
        <button class="btn-remove" data-remove="front">x</button>
        <button class="btn-bg" id="bgbtn-front" data-bg="front" style="background:rgba(0,120,212,0.8);" title="배경 제거 ON">BG</button>
        <input type="color" class="btn-bgcolor" id="bgcolorbtn-front" data-bgcolor="front" value="#ffffff" title="배경 색상 선택">
        <input type="file" id="file-front" accept="image/*">
      </div>
      <div class="face-card" id="face-right" data-face="right">
        <span class="label">오른쪽</span>
        <span class="size-info" id="size-right"></span>
        <span class="placeholder">클릭하여 이미지 로드</span>
        <button class="btn-remove" data-remove="right">x</button>
        <button class="btn-bg" id="bgbtn-right" data-bg="right" style="background:rgba(0,120,212,0.8);" title="배경 제거 ON">BG</button>
        <input type="color" class="btn-bgcolor" id="bgcolorbtn-right" data-bgcolor="right" value="#ffffff" title="배경 색상 선택">
        <input type="file" id="file-right" accept="image/*">
      </div>
      <div class="face-card" id="face-back" data-face="back">
        <span class="label">후문</span>
        <span class="size-info" id="size-back"></span>
        <span class="placeholder">클릭하여 이미지 로드</span>
        <button class="btn-remove" data-remove="back">x</button>
        <button class="btn-bg" id="bgbtn-back" data-bg="back" style="background:rgba(0,120,212,0.8);" title="배경 제거 ON">BG</button>
        <input type="color" class="btn-bgcolor" id="bgcolorbtn-back" data-bgcolor="back" value="#ffffff" title="배경 색상 선택">
        <input type="file" id="file-back" accept="image/*">
      </div>
    </div>
  </div>

  <div class="controls-panel">
    <div class="ctrl-group">
      <h3>건물 크기</h3>
      <div class="checkbox-row">
        <input type="checkbox" id="autoSize" checked>
        <label for="autoSize">자동 계산</label>
      </div>
      <div class="ctrl-row">
        <label>너비(W):</label>
        <input type="number" id="sizeW" value="1.0" step="0.05" min="0.1" max="10">
      </div>
      <div class="ctrl-row">
        <label>높이(H):</label>
        <input type="number" id="sizeH" value="1.0" step="0.05" min="0.1" max="10">
      </div>
      <div class="ctrl-row">
        <label>깊이(D):</label>
        <input type="number" id="sizeD" value="1.0" step="0.05" min="0.1" max="10">
      </div>
    </div>

    <!-- 배경 제거 설정 -->
    <div class="ctrl-group">
      <h3>배경 제거 설정</h3>

      <!-- 허용 오차 슬라이더 -->
      <div class="ctrl-row">
        <label>허용 오차:</label>
        <input type="range" id="bgTolerance" min="5" max="120" step="1" value="30"
          oninput="document.getElementById('valTolerance').textContent=this.value">
        <span class="val" id="valTolerance">30</span>
      </div>
      <div style="font-size:10px;color:#668;margin-bottom:8px;padding-left:2px;">
        낮을수록 정확한 색상만 제거 / 높을수록 유사 색상도 제거
      </div>

      <!-- 전체 적용 색상 -->
      <div class="global-bgcolor-row">
        <label>전체 색상:</label>
        <input type="color" id="globalBgColor" value="#ffffff">
        <button class="btn-apply-all" id="btnApplyAll">전체 적용</button>
      </div>

      <!-- 색상 프리셋 -->
      <div style="font-size:11px;color:#888;margin-bottom:4px;">빠른 선택 (전체 적용)</div>
      <div class="bg-presets" id="bgPresets">
        <div class="bg-preset-btn selected" data-color="#ffffff" style="background:#ffffff;" title="흰색"></div>
        <div class="bg-preset-btn" data-color="#000000" style="background:#000000;" title="검정"></div>
        <div class="bg-preset-btn" data-color="#c8c8c8" style="background:#c8c8c8;" title="회색"></div>
        <div class="bg-preset-btn" data-color="#0078d4" style="background:#0078d4;" title="파랑"></div>
        <div class="bg-preset-btn" data-color="#00b140" style="background:#00b140;" title="초록(크로마)"></div>
        <div class="bg-preset-btn" data-color="#ff00ff" style="background:#ff00ff;" title="마젠타(크로마)"></div>
        <div class="bg-preset-btn" data-color="#00ffff" style="background:#00ffff;" title="시안"></div>
        <div class="bg-preset-btn" data-color="#1a1a2e" style="background:#1a1a2e;" title="다크 네이비"></div>
      </div>

      <!-- 면별 색상 표시 -->
      <div style="font-size:11px;color:#888;margin-top:8px;margin-bottom:4px;">면별 현재 색상</div>
      <div id="faceColorDisplay" style="display:flex;flex-direction:column;gap:3px;font-size:11px;"></div>
    </div>

    <div class="ctrl-group">
      <h3>면 인셋 (%)</h3>
      <div class="ctrl-row">
        <label>정면:</label>
        <input type="range" id="insetFront" min="0" max="30" step="0.5" value="0" oninput="document.getElementById('valFront').textContent=this.value+'%'">
        <span class="val" id="valFront">0%</span>
      </div>
      <div class="ctrl-row">
        <label>후면:</label>
        <input type="range" id="insetBack" min="0" max="30" step="0.5" value="0" oninput="document.getElementById('valBack').textContent=this.value+'%'">
        <span class="val" id="valBack">0%</span>
      </div>
      <div class="ctrl-row">
        <label>왼쪽:</label>
        <input type="range" id="insetLeft" min="0" max="30" step="0.5" value="0" oninput="document.getElementById('valLeft').textContent=this.value+'%'">
        <span class="val" id="valLeft">0%</span>
      </div>
      <div class="ctrl-row">
        <label>오른쪽:</label>
        <input type="range" id="insetRight" min="0" max="30" step="0.5" value="0" oninput="document.getElementById('valRight').textContent=this.value+'%'">
        <span class="val" id="valRight">0%</span>
      </div>
      <div class="ctrl-row">
        <label>윗면내림:</label>
        <input type="range" id="topInset" min="0" max="30" step="0.5" value="8" oninput="document.getElementById('valTop').textContent=this.value+'%'">
        <span class="val" id="valTop">8%</span>
      </div>
    </div>

    <div class="ctrl-group">
      <h3>텍스처</h3>
      <div class="ctrl-row">
        <label>해상도:</label>
        <select id="atlasRes" style="background:#0a1628;border:1px solid #335;color:#ddd;padding:4px;border-radius:4px;">
          <option value="256">256px</option>
          <option value="512" selected>512px</option>
          <option value="1024">1024px</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>알파모드:</label>
        <select id="alphaMode" style="background:#0a1628;border:1px solid #335;color:#ddd;padding:4px;border-radius:4px;">
          <option value="MASK" selected>MASK</option>
          <option value="BLEND">BLEND</option>
          <option value="OPAQUE">OPAQUE</option>
        </select>
      </div>
    </div>

    <div class="ctrl-group">
      <h3>바닥</h3>
      <div class="ctrl-row">
        <label>색상:</label>
        <input type="color" id="bottomColor" value="#808080" style="width:40px;height:25px;border:none;cursor:pointer;">
      </div>
    </div>
  </div>
</div>

<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <div class="spinner"></div>
    <div id="progressText">GLB 생성 중...</div>
  </div>
</div>

<div class="status" id="statusBar">준비됨 | 각 면을 클릭하여 이미지를 로드하세요</div>

<script>
// ============ 상태 ============
const faceImages = {};
const faceOriginals = {};
const faceBgRemoved = {};
const faceRemoveBg = { front: true, back: true, left: true, right: true, top: false };

// 면별 배경색 (기본: 흰색)
const faceBgColor = { front: '#ffffff', back: '#ffffff', left: '#ffffff', right: '#ffffff', top: '#ffffff' };

const faceNames = ['front', 'back', 'left', 'right', 'top'];
const faceLabels = { front: '정면', back: '후문', left: '왼쪽', right: '오른쪽', top: '윗면' };

// ============ hex → [r,g,b] ============
function hexToRGBArr(hex) {
  hex = hex.replace('#', '');
  return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
}

// ============ 배경 제거 (색상 + 허용오차 지정) ============
function removeBackgroundColor(img, hexColor, tolerance) {
  const canvas = document.createElement('canvas');
  const w = img.naturalWidth || img.width;
  const h = img.naturalHeight || img.height;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const imageData = ctx.getImageData(0, 0, w, h);
  const data = imageData.data;

  const [tr, tg, tb] = hexToRGBArr(hexColor);
  const visited = new Uint8Array(w * h);
  const queue = [];

  // 가장자리 픽셀 시드
  for (let x = 0; x < w; x++) { queue.push(x, 0); queue.push(x, h - 1); }
  for (let y = 1; y < h - 1; y++) { queue.push(0, y); queue.push(w - 1, y); }

  let qi = 0;
  while (qi < queue.length) {
    const x = queue[qi++], y = queue[qi++];
    if (x < 0 || x >= w || y < 0 || y >= h) continue;
    const idx = y * w + x;
    if (visited[idx]) continue;
    const pi = idx * 4;
    const r = data[pi], g = data[pi+1], b = data[pi+2];
    // 색상 거리 (Chebyshev - 채널별 최대 차이)
    const dist = Math.max(Math.abs(r - tr), Math.abs(g - tg), Math.abs(b - tb));
    if (dist > tolerance) continue;
    visited[idx] = 1;
    data[pi + 3] = 0; // 투명화
    queue.push(x-1, y, x+1, y, x, y-1, x, y+1);
  }

  ctx.putImageData(imageData, 0, 0);
  return cropToContent(canvas);
}

function cropToContent(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const imageData = ctx.getImageData(0, 0, w, h);
  const data = imageData.data;
  let top = h, bottom = 0, left = w, right = 0;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (data[(y * w + x) * 4 + 3] > 0) {
        if (y < top) top = y; if (y > bottom) bottom = y;
        if (x < left) left = x; if (x > right) right = x;
      }
    }
  }
  if (top > bottom || left > right) return canvas;
  const cw = right - left + 1, ch = bottom - top + 1;
  const cropped = document.createElement('canvas');
  cropped.width = cw; cropped.height = ch;
  cropped.getContext('2d').drawImage(canvas, left, top, cw, ch, 0, 0, cw, ch);
  return cropped;
}

// 윗면용: 흰색 테두리만 잘라내기
function simpleCrop(img) {
  const canvas = document.createElement('canvas');
  const w = img.naturalWidth || img.width;
  const h = img.naturalHeight || img.height;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const data = ctx.getImageData(0, 0, w, h).data;
  const threshold = 245;
  let top = h, bottom = 0, left = w, right = 0;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const pi = (y * w + x) * 4;
      if (data[pi] < threshold || data[pi+1] < threshold || data[pi+2] < threshold) {
        if (y < top) top = y; if (y > bottom) bottom = y;
        if (x < left) left = x; if (x > right) right = x;
      }
    }
  }
  if (top > bottom || left > right) return canvas;
  const cw = right - left + 1, ch = bottom - top + 1;
  const cropped = document.createElement('canvas');
  cropped.width = cw; cropped.height = ch;
  cropped.getContext('2d').drawImage(canvas, left, top, cw, ch, 0, 0, cw, ch);
  return cropped;
}

// ============ DOM 이벤트 연결 ============
document.getElementById('btnBuild').addEventListener('click', () => buildGLB());
document.querySelectorAll('.face-card[data-face]').forEach(card => {
  card.addEventListener('click', (e) => {
    if (e.target.closest('.btn-remove') || e.target.closest('.btn-bg') || e.target.closest('.btn-bgcolor')) return;
    loadImage(card.dataset.face);
  });
});
document.querySelectorAll('[data-remove]').forEach(btn => {
  btn.addEventListener('click', (e) => { e.stopPropagation(); removeImage(btn.dataset.remove); });
});
document.querySelectorAll('[data-bg]').forEach(btn => {
  btn.addEventListener('click', (e) => { e.stopPropagation(); toggleBgRemove(btn.dataset.bg); });
});

// 면별 색상 피커 변경 이벤트
document.querySelectorAll('[data-bgcolor]').forEach(input => {
  input.addEventListener('change', (e) => {
    e.stopPropagation();
    const face = input.dataset.bgcolor;
    faceBgColor[face] = input.value;
    delete faceBgRemoved[face]; // 캐시 무효화
    updateFaceColorDisplay();
    // BG ON인 경우 즉시 재처리
    if (faceRemoveBg[face] && faceOriginals[face]) {
      const img = new Image();
      img.onload = () => processWithBgRemoval(face, img);
      img.src = faceOriginals[face];
    }
  });
  // 클릭 이벤트 버블링 차단 (face card click 방지)
  input.addEventListener('click', (e) => e.stopPropagation());
});

// 전체 적용 버튼
document.getElementById('btnApplyAll').addEventListener('click', () => {
  const color = document.getElementById('globalBgColor').value;
  for (const face of faceNames) {
    faceBgColor[face] = color;
    document.getElementById('bgcolorbtn-' + face).value = color;
    delete faceBgRemoved[face];
  }
  updateFaceColorDisplay();
  updatePresetSelection(color);
  // 활성화된 면들 재처리
  for (const face of faceNames) {
    if (faceRemoveBg[face] && faceOriginals[face]) {
      const img = new Image();
      const _face = face;
      img.onload = () => processWithBgRemoval(_face, img);
      img.src = faceOriginals[face];
    }
  }
  setStatus('전체 배경색 적용: ' + color);
});

// 프리셋 버튼
document.querySelectorAll('.bg-preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const color = btn.dataset.color;
    document.getElementById('globalBgColor').value = color;
    updatePresetSelection(color);
    // 전체 적용 트리거
    document.getElementById('btnApplyAll').click();
  });
});

function updatePresetSelection(color) {
  document.querySelectorAll('.bg-preset-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.color.toLowerCase() === color.toLowerCase());
  });
}

function updateFaceColorDisplay() {
  const container = document.getElementById('faceColorDisplay');
  container.innerHTML = '';
  for (const face of faceNames) {
    if (!faceRemoveBg[face]) continue;
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:6px;';
    row.innerHTML = `
      <div style="width:14px;height:14px;border-radius:2px;border:1px solid #446;background:${faceBgColor[face]};flex-shrink:0;"></div>
      <span style="color:#aaa;min-width:36px;">${faceLabels[face]}</span>
      <span style="color:#666;">${faceBgColor[face]}</span>
    `;
    container.appendChild(row);
  }
}

function loadImage(face) {
  document.getElementById('file-' + face).click();
}

function onFileSelected(face, input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    faceOriginals[face] = e.target.result;
    delete faceBgRemoved[face];
    const img = new Image();
    img.onload = function() {
      if (faceRemoveBg[face]) {
        processWithBgRemoval(face, img);
      } else if (face === 'top') {
        const cropped = simpleCrop(img);
        const resultImg = new Image();
        resultImg.onload = () => setFaceImage(face, resultImg);
        resultImg.src = cropped.toDataURL('image/png');
      } else {
        setFaceImage(face, img);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function processWithBgRemoval(face, originalImg) {
  if (faceBgRemoved[face]) {
    const img = new Image();
    img.onload = () => setFaceImage(face, img);
    img.src = faceBgRemoved[face];
    return;
  }
  const tolerance = parseInt(document.getElementById('bgTolerance').value);
  setStatus(faceLabels[face] + ' 배경 제거 중... (색상: ' + faceBgColor[face] + ', 허용오차: ' + tolerance + ')');
  try {
    const resultCanvas = removeBackgroundColor(originalImg, faceBgColor[face], tolerance);
    const resultUrl = resultCanvas.toDataURL('image/png');
    faceBgRemoved[face] = resultUrl;
    const resultImg = new Image();
    resultImg.onload = () => {
      setFaceImage(face, resultImg);
      setStatus(faceLabels[face] + ' 배경 제거 완료! (' + resultImg.width + 'x' + resultImg.height + ')');
    };
    resultImg.src = resultUrl;
  } catch (err) {
    console.error('배경 제거 실패:', err);
    setStatus(faceLabels[face] + ' 배경 제거 실패 - 원본 사용');
    setFaceImage(face, originalImg);
  }
}

function setFaceImage(face, img) {
  faceImages[face] = { img, w: img.naturalWidth || img.width, h: img.naturalHeight || img.height };
  displayFace(face, img);
  document.getElementById('size-' + face).textContent = (img.naturalWidth||img.width) + 'x' + (img.naturalHeight||img.height);
  document.getElementById('face-' + face).classList.add('has-image');
  if (document.getElementById('autoSize').checked) autoCalcSize();
}

async function toggleBgRemove(face) {
  faceRemoveBg[face] = !faceRemoveBg[face];
  const btn = document.getElementById('bgbtn-' + face);
  if (btn) {
    btn.style.background = faceRemoveBg[face] ? 'rgba(0,120,212,0.8)' : 'rgba(100,100,100,0.7)';
    btn.title = faceRemoveBg[face] ? '배경 제거 ON' : '배경 제거 OFF';
  }
  // 색상 피커 활성 표시
  const colorBtn = document.getElementById('bgcolorbtn-' + face);
  if (colorBtn) colorBtn.classList.toggle('active', faceRemoveBg[face]);

  updateFaceColorDisplay();
  if (!faceOriginals[face]) return;

  if (faceRemoveBg[face]) {
    delete faceBgRemoved[face];
    const img = new Image();
    img.onload = () => processWithBgRemoval(face, img);
    img.src = faceOriginals[face];
  } else {
    delete faceBgRemoved[face];
    const img = new Image();
    img.onload = () => setFaceImage(face, img);
    img.src = faceOriginals[face];
  }
}

function displayFace(face, img) {
  const card = document.getElementById('face-' + face);
  const placeholder = card.querySelector('.placeholder');
  if (placeholder) placeholder.style.display = 'none';
  let existing = card.querySelector('img.preview');
  if (existing) existing.remove();
  const el = document.createElement('img');
  el.className = 'preview';
  el.src = img.src;
  card.appendChild(el);
}

function removeImage(face) {
  delete faceImages[face]; delete faceOriginals[face]; delete faceBgRemoved[face];
  const card = document.getElementById('face-' + face);
  card.classList.remove('has-image');
  const img = card.querySelector('img.preview');
  if (img) img.remove();
  const placeholder = card.querySelector('.placeholder');
  if (placeholder) placeholder.style.display = '';
  document.getElementById('size-' + face).textContent = '';
  document.getElementById('file-' + face).value = '';
}

for (const face of faceNames) {
  document.getElementById('file-' + face).addEventListener('change', function() { onFileSelected(face, this); });
}

// 허용 오차 변경 시 캐시 초기화 → 재처리
document.getElementById('bgTolerance').addEventListener('change', () => {
  for (const face of faceNames) {
    if (!faceRemoveBg[face] || !faceOriginals[face]) continue;
    delete faceBgRemoved[face];
    const img = new Image();
    const _face = face;
    img.onload = () => processWithBgRemoval(_face, img);
    img.src = faceOriginals[face];
  }
});

function autoCalcSize() {
  const front = faceImages['front'];
  if (!front) return;
  const W = front.w, H = front.h;
  let D = H;
  if (faceImages['left']) D = faceImages['left'].w;
  else if (faceImages['right']) D = faceImages['right'].w;
  const maxDim = Math.max(W, H, D);
  document.getElementById('sizeW').value = (W / maxDim).toFixed(3);
  document.getElementById('sizeH').value = (H / maxDim).toFixed(3);
  document.getElementById('sizeD').value = (D / maxDim).toFixed(3);
}

function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }

// ============ GLB 생성 ============
function buildGLB() {
  if (!faceImages['front']) { alert('최소 정면 이미지가 필요합니다.'); return; }
  document.getElementById('progressOverlay').classList.add('show');
  document.getElementById('btnBuild').disabled = true;
  setTimeout(() => {
    try {
      if (document.getElementById('autoSize').checked) autoCalcSize();
      const w = parseFloat(document.getElementById('sizeW').value);
      const h = parseFloat(document.getElementById('sizeH').value);
      const d = parseFloat(document.getElementById('sizeD').value);
      const hw = w/2, hh = h/2, hd = d/2;
      const topInsetPct = parseFloat(document.getElementById('topInset').value) / 100;
      const topY = hh - h * topInsetPct;
      const insets = {
        front: d * parseFloat(document.getElementById('insetFront').value) / 100,
        back:  d * parseFloat(document.getElementById('insetBack').value) / 100,
        left:  w * parseFloat(document.getElementById('insetLeft').value) / 100,
        right: w * parseFloat(document.getElementById('insetRight').value) / 100,
      };
      const atlasCell = parseInt(document.getElementById('atlasRes').value);
      const alphaMode = document.getElementById('alphaMode').value;
      const bottomHex = document.getElementById('bottomColor').value;

      const atlasW = atlasCell * 3, atlasH = atlasCell * 2;
      const atlasCanvas = document.createElement('canvas');
      atlasCanvas.width = atlasW; atlasCanvas.height = atlasH;
      const ctx = atlasCanvas.getContext('2d');
      ctx.clearRect(0, 0, atlasW, atlasH);

      const facePositions = { front:[0,0], back:[1,0], top:[2,0], left:[0,1], right:[1,1], bottom:[2,1] };
      for (const [face, [col, row]] of Object.entries(facePositions)) {
        const x = col * atlasCell, y = row * atlasCell;
        if (face === 'bottom') {
          ctx.fillStyle = bottomHex; ctx.fillRect(x, y, atlasCell, atlasCell);
        } else if (faceImages[face]) {
          ctx.drawImage(faceImages[face].img, x, y, atlasCell, atlasCell);
        } else {
          ctx.fillStyle = '#c8c8c8'; ctx.fillRect(x, y, atlasCell, atlasCell);
        }
      }

      const atlasPNG = atlasCanvas.toDataURL('image/png');
      const atlasBytes = dataURLToBytes(atlasPNG);
      const e = 0.005, margin = 0.002;
      const { front:fi, back:bi, left:li, right:ri } = insets;
      const allVerts = [], allUVs = [], allFaces = [];
      let vertOff = 0;

      function addFace(verts, col, row) {
        for (const v of verts) allVerts.push(v);
        const u0 = col/3+margin, u1 = (col+1)/3-margin;
        const vTop = row/2+margin, vBot = (row+1)/2-margin;
        allUVs.push([u0,vBot],[u1,vBot],[u1,vTop],[u0,vTop]);
        allFaces.push([vertOff,vertOff+1,vertOff+2],[vertOff,vertOff+2,vertOff+3]);
        vertOff += 4;
      }

      if (faceImages['front']) {
        const z = hd-fi; addFace([[-hw-e,-hh-e,z],[hw+e,-hh-e,z],[hw+e,hh+e,z],[-hw-e,hh+e,z]],0,0);
      }
      if (faceImages['back']) {
        const z = -hd+bi; addFace([[hw+e,-hh-e,z],[-hw-e,-hh-e,z],[-hw-e,hh+e,z],[hw+e,hh+e,z]],1,0);
      }
      if (faceImages['left']) {
        const x = -hw+li; addFace([[x,-hh-e,-hd-e],[x,-hh-e,hd+e],[x,hh+e,hd+e],[x,hh+e,-hd-e]],0,1);
      }
      if (faceImages['right']) {
        const x = hw-ri; addFace([[x,-hh-e,hd+e],[x,-hh-e,-hd-e],[x,hh+e,-hd-e],[x,hh+e,hd+e]],1,1);
      }
      if (faceImages['top']) {
        addFace([[-hw-e,topY,hd+e],[hw+e,topY,hd+e],[hw+e,topY,-hd-e],[-hw-e,topY,-hd-e]],2,0);
      }
      addFace([[-hw-e,-hh,-hd-e],[hw+e,-hh,-hd-e],[hw+e,-hh,hd+e],[-hw-e,-hh,hd+e]],2,1);

      const glbData = createGLB(allVerts, allFaces, allUVs, atlasBytes, alphaMode);
      const blob = new Blob([glbData], { type: 'model/gltf-binary' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'building.glb'; a.click();
      URL.revokeObjectURL(url);
      setStatus('GLB 생성 완료! (' + (glbData.byteLength/1024).toFixed(1) + ' KB)');
    } catch (err) {
      alert('오류: ' + err.message);
      setStatus('오류: ' + err.message);
      console.error(err);
    } finally {
      document.getElementById('progressOverlay').classList.remove('show');
      document.getElementById('btnBuild').disabled = false;
    }
  }, 100);
}

function dataURLToBytes(dataURL) {
  const b64 = dataURL.split(',')[1];
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

function createGLB(vertices, faces, uvs, imageBytes, alphaMode) {
  const numVerts = vertices.length, numFaces = faces.length;
  let minX=Infinity,minY=Infinity,minZ=Infinity,maxX=-Infinity,maxY=-Infinity,maxZ=-Infinity;
  for (const [x,y,z] of vertices) {
    if(x<minX)minX=x; if(y<minY)minY=y; if(z<minZ)minZ=z;
    if(x>maxX)maxX=x; if(y>maxY)maxY=y; if(z>maxZ)maxZ=z;
  }
  const posData = new Float32Array(numVerts * 3);
  for (let i = 0; i < numVerts; i++) { posData[i*3]=vertices[i][0]; posData[i*3+1]=vertices[i][1]; posData[i*3+2]=vertices[i][2]; }
  const uvData = new Float32Array(numVerts * 2);
  for (let i = 0; i < numVerts; i++) { uvData[i*2]=uvs[i][0]; uvData[i*2+1]=uvs[i][1]; }
  const indexData = new Uint16Array(numFaces * 3);
  for (let i = 0; i < numFaces; i++) { indexData[i*3]=faces[i][0]; indexData[i*3+1]=faces[i][1]; indexData[i*3+2]=faces[i][2]; }

  const posBytes = new Uint8Array(posData.buffer);
  const uvBytes = new Uint8Array(uvData.buffer);
  const idxBytes = new Uint8Array(indexData.buffer);
  function pad4(n) { return (4-(n%4))%4; }

  const posByteLen=posBytes.length, uvByteLen=uvBytes.length, idxByteLen=idxBytes.length, imgByteLen=imageBytes.length;
  const posPad=pad4(posByteLen);
  const uvPad=pad4(posByteLen+posPad+uvByteLen);
  const idxPad=pad4(posByteLen+posPad+uvByteLen+uvPad+idxByteLen);
  const imgPad=pad4(posByteLen+posPad+uvByteLen+uvPad+idxByteLen+idxPad+imgByteLen);
  const bufferLen=posByteLen+posPad+uvByteLen+uvPad+idxByteLen+idxPad+imgByteLen+imgPad;

  const posOffset=0, uvOffset=posByteLen+posPad, idxOffset=uvOffset+uvByteLen+uvPad, imgOffset=idxOffset+idxByteLen+idxPad;

  const gltf = {
    asset:{version:"2.0",generator:"GLB Builder Web"},
    scene:0, scenes:[{nodes:[0]}], nodes:[{mesh:0,name:"building"}],
    meshes:[{primitives:[{attributes:{POSITION:0,TEXCOORD_0:1},indices:2,material:0}]}],
    materials:[{pbrMetallicRoughness:{baseColorTexture:{index:0},metallicFactor:0,roughnessFactor:1},
      alphaMode,doubleSided:true,name:"building",...(alphaMode==='MASK'?{alphaCutoff:0.5}:{})}],
    textures:[{source:0,sampler:0}],
    samplers:[{magFilter:9729,minFilter:9987,wrapS:33071,wrapT:33071}],
    images:[{bufferView:3,mimeType:"image/png"}],
    accessors:[
      {bufferView:0,componentType:5126,count:numVerts,type:"VEC3",max:[maxX,maxY,maxZ],min:[minX,minY,minZ]},
      {bufferView:1,componentType:5126,count:numVerts,type:"VEC2"},
      {bufferView:2,componentType:5123,count:numFaces*3,type:"SCALAR"}
    ],
    bufferViews:[
      {buffer:0,byteOffset:posOffset,byteLength:posByteLen,target:34962},
      {buffer:0,byteOffset:uvOffset,byteLength:uvByteLen,target:34962},
      {buffer:0,byteOffset:idxOffset,byteLength:idxByteLen,target:34963},
      {buffer:0,byteOffset:imgOffset,byteLength:imgByteLen}
    ],
    buffers:[{byteLength:bufferLen}]
  };

  const jsonStr = JSON.stringify(gltf);
  const jsonBytes = new TextEncoder().encode(jsonStr);
  const jsonPad = pad4(jsonBytes.length);
  const jsonChunkLen = jsonBytes.length + jsonPad;
  const totalLen = 12 + 8 + jsonChunkLen + 8 + bufferLen;
  const glb = new ArrayBuffer(totalLen);
  const view = new DataView(glb);
  const bytes = new Uint8Array(glb);

  view.setUint32(0, 0x46546C67, true); view.setUint32(4, 2, true); view.setUint32(8, totalLen, true);
  let offset = 12;
  view.setUint32(offset, jsonChunkLen, true); offset+=4;
  view.setUint32(offset, 0x4E4F534A, true); offset+=4;
  bytes.set(jsonBytes, offset); offset+=jsonBytes.length;
  for (let i=0;i<jsonPad;i++) bytes[offset++]=0x20;

  view.setUint32(offset, bufferLen, true); offset+=4;
  view.setUint32(offset, 0x004E4942, true); offset+=4;
  bytes.set(posBytes, offset+posOffset);
  bytes.set(uvBytes, offset+uvOffset);
  bytes.set(idxBytes, offset+idxOffset);
  bytes.set(imageBytes, offset+imgOffset);

  return glb;
}

// 초기 면 색상 표시
updateFaceColorDisplay();
</script>
