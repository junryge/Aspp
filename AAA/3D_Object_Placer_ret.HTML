<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Object Placer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
            height: 100vh;
        }

        /* Top toolbar */
        #toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            background: rgba(16, 16, 40, 0.95);
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            z-index: 100;
            overflow-x: auto;
        }
        #toolbar .title {
            font-size: 16px;
            font-weight: 600;
            color: #7ecfff;
            margin-right: 12px;
            white-space: nowrap;
        }
        .tool-btn {
            padding: 6px 12px;
            background: #2a2a4a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tool-btn:hover { background: #3a3a6a; color: #fff; border-color: #7ecfff; }
        .tool-btn.active { background: #1a5a8a; color: #7ecfff; border-color: #7ecfff; }
        .tool-btn.danger { border-color: #f55; }
        .tool-btn.danger:hover { background: #5a2a2a; color: #f88; }
        .tool-btn.save-btn { background: #1a5a3a; border-color: #5fa; }
        .tool-btn.save-btn:hover { background: #2a7a4a; }
        .tool-btn.load-btn { background: #3a3a1a; border-color: #aa5; }
        .tool-btn.load-btn:hover { background: #5a5a2a; }
        .toolbar-sep { width: 1px; height: 28px; background: #444; margin: 0 4px; flex-shrink: 0; }

        /* Side panel */
        #sidePanel {
            position: fixed;
            top: 50px; left: 0;
            width: 260px;
            bottom: 0;
            background: rgba(16, 16, 40, 0.95);
            border-right: 1px solid #333;
            z-index: 90;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-section {
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        .panel-section h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
        }
        #objectList {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .obj-item {
            padding: 8px 10px;
            margin-bottom: 4px;
            background: #2a2a4a;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        .obj-item:hover { background: #3a3a6a; }
        .obj-item.selected { background: #1a5a8a; border-color: #7ecfff; }
        .obj-item .obj-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .obj-item .obj-actions { display: flex; gap: 4px; }
        .obj-item .obj-actions button {
            background: none; border: none; color: #888; cursor: pointer; font-size: 14px; padding: 2px 4px;
        }
        .obj-item .obj-actions button:hover { color: #fff; }
        .obj-item.child-item { margin-left: 16px; background: #252548; font-size: 12px; }

        /* Drop zone */
        #dropZone {
            position: fixed;
            bottom: 12px; left: 270px;
            right: 270px;
            padding: 12px;
            background: rgba(30, 30, 60, 0.9);
            border: 2px dashed #555;
            border-radius: 10px;
            text-align: center;
            color: #777;
            font-size: 13px;
            z-index: 90;
            transition: all 0.3s;
        }
        #dropZone.dragover {
            border-color: #7ecfff;
            background: rgba(30, 60, 100, 0.9);
            color: #7ecfff;
        }

        /* Right properties panel */
        #propsPanel {
            position: fixed;
            top: 50px; right: 0;
            width: 280px;
            bottom: 0;
            background: rgba(16, 16, 40, 0.95);
            border-left: 1px solid #333;
            z-index: 90;
            padding: 12px;
            overflow-y: auto;
        }
        #propsPanel h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
            margin-top: 14px;
        }
        #propsPanel h3:first-child { margin-top: 0; }
        .prop-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            gap: 6px;
        }
        .prop-row label {
            width: 60px;
            font-size: 12px;
            color: #aaa;
            flex-shrink: 0;
        }
        .prop-row input[type="number"] {
            flex: 1;
            background: #2a2a4a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #eee;
            padding: 4px 6px;
            font-size: 12px;
        }
        .prop-row input[type="range"] {
            flex: 1;
        }
        .prop-row input[type="color"] {
            width: 36px; height: 28px;
            border: 1px solid #555; border-radius: 4px;
            background: none; cursor: pointer;
        }
        #noSelection {
            color: #666;
            font-size: 13px;
            text-align: center;
            margin-top: 40px;
        }

        /* Canvas area */
        #canvasContainer {
            position: fixed;
            top: 50px; left: 260px;
            right: 280px; bottom: 0;
        }
        #canvasContainer canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Full-screen drag overlay */
        #dragOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #7ecfff;
            pointer-events: none;
        }
        #dragOverlay.show { display: flex; }

        /* Info bar */
        #infoBar {
            position: fixed;
            bottom: 60px;
            left: 270px;
            background: rgba(30,60,100,0.9);
            color: #7ecfff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 90;
            display: none;
        }

        /* Scene settings panel */
        #sceneSettings {
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        #sceneSettings h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
            cursor: pointer;
        }
        #sceneSettings h3:hover { color: #aaa; }
        .settings-content { display: none; }
        .settings-content.show { display: block; }
        .setting-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            gap: 6px;
        }
        .setting-row label {
            width: 70px;
            font-size: 11px;
            color: #aaa;
            flex-shrink: 0;
        }
        .setting-row input[type="color"] {
            width: 32px; height: 24px;
            border: 1px solid #555; border-radius: 4px;
            background: none; cursor: pointer;
        }
        .setting-row input[type="range"],
        .setting-row input[type="number"] {
            flex: 1;
            background: #2a2a4a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #eee;
            padding: 3px 5px;
            font-size: 11px;
        }
        .setting-row .val-display {
            width: 30px;
            font-size: 11px;
            color: #7ecfff;
            text-align: right;
        }

        /* Modal overlay for GLB decompose */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #1e1e3e;
            border: 1px solid #555;
            border-radius: 12px;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
        }
        .modal-box h2 { font-size: 16px; color: #7ecfff; margin-bottom: 12px; }
        .modal-box .mesh-list { max-height: 40vh; overflow-y: auto; }
        .modal-box .mesh-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px; margin-bottom: 4px;
            background: #2a2a4a; border-radius: 6px;
            font-size: 13px;
        }
        .modal-box .mesh-item input[type="checkbox"] { flex-shrink: 0; }
        .modal-box .mesh-item .mesh-name { flex: 1; }
        .modal-box .modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
    </style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
    <span class="title">3D Object Placer</span>
    <button class="tool-btn" id="btnAddFile" title="GLB/GLTF 파일 추가">+ 파일</button>
    <button class="tool-btn" id="btnAddPrimitive" title="기본 도형 추가">+ 도형</button>
    <div class="toolbar-sep"></div>
    <button class="tool-btn" id="btnTranslate" title="이동 모드 (G)">이동</button>
    <button class="tool-btn" id="btnRotate" title="회전 모드 (R)">회전</button>
    <button class="tool-btn" id="btnScale" title="크기 모드 (S)">크기</button>
    <div class="toolbar-sep"></div>
    <button class="tool-btn" id="btnGrid" title="그리드 토글">그리드</button>
    <button class="tool-btn" id="btnResetCam" title="카메라 초기화">카메라 리셋</button>
    <div class="toolbar-sep"></div>
    <button class="tool-btn save-btn" id="btnSaveScene" title="전체 씬 저장 (GLB 데이터 + JSON)">씬 저장</button>
    <button class="tool-btn load-btn" id="btnLoadScene" title="저장된 씬 불러오기">씬 로드</button>
    <div class="toolbar-sep"></div>
    <button class="tool-btn" id="btnExportJSON" title="씬 데이터 JSON 내보내기">JSON 내보내기</button>
    <button class="tool-btn load-btn" id="btnImportJSON" title="JSON 씬 데이터 불러오기">JSON 불러오기</button>
    <div class="toolbar-sep"></div>
    <button class="tool-btn save-btn" id="btnExportHTML" title="독립 실행 HTML 내보내기">HTML 내보내기</button>
    <button class="tool-btn save-btn" id="btnExportReact" title="React(.jsx) 컴포넌트로 내보내기" style="background:#2a1a5a;border-color:#a8f;">React 내보내기</button>
    <input type="file" id="fileInput" accept=".glb,.gltf" multiple style="display:none">
    <input type="file" id="jsonInput" accept=".json" style="display:none">
    <input type="file" id="sceneInput" accept=".json" style="display:none">
</div>

<!-- Side Panel: Scene Settings + Object List -->
<div id="sidePanel">
    <div id="sceneSettings">
        <h3 id="settingsToggle">씬 설정 (클릭하여 열기/닫기)</h3>
        <div class="settings-content show" id="settingsContent">
            <div class="setting-row">
                <label>배경색</label>
                <input type="color" id="bgColor" value="#1a1a2e" title="배경 색상">
                <span class="val-display" id="bgColorVal">#1a1a2e</span>
            </div>
            <div class="setting-row">
                <label>바닥색</label>
                <input type="color" id="groundColor" value="#222244" title="바닥 색상">
                <span class="val-display" id="groundColorVal">#222244</span>
            </div>
            <div class="setting-row">
                <label>바닥 투명도</label>
                <input type="range" id="groundOpacity" min="0" max="1" step="0.05" value="0.5">
                <span class="val-display" id="groundOpacityVal">0.5</span>
            </div>
            <div class="setting-row">
                <label>맵 크기</label>
                <input type="range" id="mapSize" min="10" max="500" step="10" value="50">
                <span class="val-display" id="mapSizeVal">50</span>
            </div>
            <div class="setting-row">
                <label>그리드 간격</label>
                <input type="range" id="gridDivisions" min="5" max="100" step="5" value="50">
                <span class="val-display" id="gridDivisionsVal">50</span>
            </div>
            <div class="setting-row">
                <label>격자 보기</label>
                <input type="checkbox" id="gridVisible" checked>
            </div>
            <div class="setting-row">
                <label>바닥 보기</label>
                <input type="checkbox" id="groundVisible" checked>
            </div>
        </div>
    </div>
    <div class="panel-section">
        <h3>씬 오브젝트 목록</h3>
    </div>
    <div id="objectList">
        <div style="color:#666;font-size:13px;text-align:center;margin-top:30px;">
            파일을 드래그하거나<br>"+ 파일" 버튼으로<br>GLB 오브젝트를 추가하세요
        </div>
    </div>
</div>

<!-- Properties Panel -->
<div id="propsPanel">
    <div id="noSelection">오브젝트를 선택하세요</div>
    <div id="propsContent" style="display:none;">
        <h3>위치 (Position)</h3>
        <div class="prop-row"><label>X</label><input type="number" id="posX" step="0.1"></div>
        <div class="prop-row"><label>Y</label><input type="number" id="posY" step="0.1"></div>
        <div class="prop-row"><label>Z</label><input type="number" id="posZ" step="0.1"></div>

        <h3>회전 (Rotation)</h3>
        <div class="prop-row"><label>X</label><input type="number" id="rotX" step="1"></div>
        <div class="prop-row"><label>Y</label><input type="number" id="rotY" step="1"></div>
        <div class="prop-row"><label>Z</label><input type="number" id="rotZ" step="1"></div>

        <h3>크기 (Scale)</h3>
        <div class="prop-row"><label>X</label><input type="number" id="scaX" step="0.1" min="0.01"></div>
        <div class="prop-row"><label>Y</label><input type="number" id="scaY" step="0.1" min="0.01"></div>
        <div class="prop-row"><label>Z</label><input type="number" id="scaZ" step="0.1" min="0.01"></div>
        <div class="prop-row">
            <label>균일 크기</label>
            <input type="checkbox" id="uniformScale" checked>
        </div>

        <h3>가시성</h3>
        <div class="prop-row">
            <label>보이기</label>
            <input type="checkbox" id="objVisible" checked>
        </div>

        <h3>동작</h3>
        <button class="tool-btn" id="btnCopyObj" style="width:100%;margin-bottom:6px;">복사 (Ctrl+C)</button>
        <button class="tool-btn" id="btnPasteObj" style="width:100%;margin-bottom:6px;">붙여넣기 (Ctrl+V)</button>
        <button class="tool-btn" id="btnDuplicate" style="width:100%;margin-bottom:6px;">복제 (Ctrl+D)</button>
        <button class="tool-btn" id="btnFocus" style="width:100%;margin-bottom:6px;">포커스 (F)</button>
        <button class="tool-btn" id="btnDecompose" style="width:100%;margin-bottom:6px;">GLB 분리 (하위 메쉬)</button>
        <button class="tool-btn danger" id="btnDeleteObj" style="width:100%;">삭제 (Del)</button>
    </div>
</div>

<!-- Canvas -->
<div id="canvasContainer"></div>

<!-- Drop zone -->
<div id="dropZone">GLB / GLTF 파일을 여기에 드래그 앤 드롭하세요</div>

<!-- Drag overlay -->
<div id="dragOverlay">파일을 놓으세요</div>

<!-- Info bar -->
<div id="infoBar"></div>

<!-- Decompose Modal -->
<div class="modal-overlay" id="decomposeModal">
    <div class="modal-box">
        <h2>GLB 객체 분리</h2>
        <p style="font-size:12px;color:#aaa;margin-bottom:10px;">분리할 메쉬를 선택하세요. 선택된 메쉬가 개별 객체로 분리됩니다.</p>
        <div class="mesh-list" id="meshList"></div>
        <div class="modal-actions">
            <button class="tool-btn" id="btnSelectAllMeshes">전체 선택</button>
            <button class="tool-btn" id="btnDeselectAllMeshes">전체 해제</button>
            <button class="tool-btn save-btn" id="btnDoDecompose">분리 실행</button>
            <button class="tool-btn" id="btnCancelDecompose">취소</button>
        </div>
    </div>
</div>

<!-- Pako (gzip compression) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>

<script>
(function() {
    // ========== Scene Setup ==========
    const container = document.getElementById('canvasContainer');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 2000);
    camera.position.set(10, 8, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    // Orbit controls
    const orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.08;
    orbitControls.minDistance = 1;
    orbitControls.maxDistance = 500;

    // Transform controls
    const transformControls = new THREE.TransformControls(camera, renderer.domElement);
    transformControls.addEventListener('dragging-changed', e => {
        orbitControls.enabled = !e.value;
    });
    transformControls.addEventListener('objectChange', () => {
        updatePropsPanel();
    });
    scene.add(transformControls);

    // ========== Lights ==========
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(15, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 100;
    dirLight.shadow.camera.left = -30;
    dirLight.shadow.camera.right = 30;
    dirLight.shadow.camera.top = 30;
    dirLight.shadow.camera.bottom = -30;
    scene.add(dirLight);

    const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x362e2e, 0.4);
    scene.add(hemiLight);

    // ========== Grid & Ground ==========
    let currentMapSize = 50;
    let currentGridDivisions = 50;

    let gridHelper = new THREE.GridHelper(currentMapSize, currentGridDivisions, 0x444466, 0x333355);
    scene.add(gridHelper);

    let groundGeo = new THREE.PlaneGeometry(currentMapSize, currentMapSize);
    const groundMat = new THREE.MeshStandardMaterial({
        color: 0x222244, roughness: 0.9, metalness: 0.0, transparent: true, opacity: 0.5
    });
    let ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    ground.userData.isGround = true;
    scene.add(ground);

    // ========== State ==========
    let sceneObjects = [];
    let selectedObject = null;
    let objectCounter = 0;
    let clipboard = null; // for copy/paste
    const loader = new THREE.GLTFLoader();
    const dracoLoader = new THREE.DRACOLoader();
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
    loader.setDRACOLoader(dracoLoader);
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const glbDataStore = {}; // id -> { base64, fileName }

    // ========== Resize ==========
    function onResize() {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);
    setTimeout(onResize, 50);

    // ========== Scene Settings ==========
    document.getElementById('settingsToggle').addEventListener('click', () => {
        document.getElementById('settingsContent').classList.toggle('show');
    });

    // Background color
    document.getElementById('bgColor').addEventListener('input', function() {
        scene.background = new THREE.Color(this.value);
        document.getElementById('bgColorVal').textContent = this.value;
    });

    // Ground color
    document.getElementById('groundColor').addEventListener('input', function() {
        groundMat.color.set(this.value);
        document.getElementById('groundColorVal').textContent = this.value;
    });

    // Ground opacity
    document.getElementById('groundOpacity').addEventListener('input', function() {
        groundMat.opacity = parseFloat(this.value);
        document.getElementById('groundOpacityVal').textContent = this.value;
    });

    // Map size
    document.getElementById('mapSize').addEventListener('input', function() {
        const size = parseInt(this.value);
        currentMapSize = size;
        document.getElementById('mapSizeVal').textContent = size;
        rebuildGroundAndGrid();
    });

    // Grid divisions
    document.getElementById('gridDivisions').addEventListener('input', function() {
        const divs = parseInt(this.value);
        currentGridDivisions = divs;
        document.getElementById('gridDivisionsVal').textContent = divs;
        rebuildGroundAndGrid();
    });

    // Grid / Ground individual visibility
    document.getElementById('gridVisible').addEventListener('change', function() {
        gridHelper.visible = this.checked;
    });
    document.getElementById('groundVisible').addEventListener('change', function() {
        ground.visible = this.checked;
    });

    function rebuildGroundAndGrid() {
        // Remember visibility state
        const gridWasVisible = gridHelper.visible;
        const groundWasVisible = ground.visible;

        // Remove old
        scene.remove(gridHelper);
        scene.remove(ground);

        // Rebuild grid
        gridHelper = new THREE.GridHelper(currentMapSize, currentGridDivisions, 0x444466, 0x333355);
        gridHelper.visible = gridWasVisible;
        scene.add(gridHelper);

        // Rebuild ground
        groundGeo = new THREE.PlaneGeometry(currentMapSize, currentMapSize);
        ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        ground.userData.isGround = true;
        ground.visible = groundWasVisible;
        scene.add(ground);

        // Update shadow camera
        const halfSize = currentMapSize / 2;
        dirLight.shadow.camera.left = -halfSize;
        dirLight.shadow.camera.right = halfSize;
        dirLight.shadow.camera.top = halfSize;
        dirLight.shadow.camera.bottom = -halfSize;
        dirLight.shadow.camera.updateProjectionMatrix();
    }

    // ========== Compress / Decompress ==========
    function compressToBase64(buffer) {
        const compressed = pako.deflate(new Uint8Array(buffer));
        let binary = '';
        for (let i = 0; i < compressed.length; i++) {
            binary += String.fromCharCode(compressed[i]);
        }
        return btoa(binary);
    }

    function decompressFromBase64(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        const decompressed = pako.inflate(bytes);
        return decompressed.buffer;
    }

    // ========== GLB Loader ==========
    function loadGLBFromFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                const base64Data = compressToBase64(arrayBuffer);

                loader.parse(arrayBuffer, '', (gltf) => {
                    const model = gltf.scene;
                    const name = file.name.replace(/\.(glb|gltf)$/i, '');
                    const wrapper = setupModel(model, name);
                    glbDataStore[wrapper.userData.id] = { base64: base64Data, fileName: file.name };
                    resolve(wrapper);
                }, reject);
            };
            reader.readAsArrayBuffer(file);
        });
    }

    function loadGLBFromURL(url, name) {
        return new Promise((resolve, reject) => {
            fetch(url).then(r => r.arrayBuffer()).then(arrayBuffer => {
                const base64Data = compressToBase64(arrayBuffer);
                loader.parse(arrayBuffer, '', (gltf) => {
                    const model = gltf.scene;
                    const wrapper = setupModel(model, name || 'Object');
                    glbDataStore[wrapper.userData.id] = { base64: base64Data, fileName: (name || 'object') + '.glb' };
                    resolve(wrapper);
                }, reject);
            }).catch(() => {
                loader.load(url, (gltf) => {
                    const model = gltf.scene;
                    setupModel(model, name || 'Object');
                    resolve(model);
                }, undefined, reject);
            });
        });
    }

    function loadGLBFromBase64(base64Data, name, transform) {
        return new Promise((resolve, reject) => {
            try {
                const arrayBuffer = decompressFromBase64(base64Data);
                loader.parse(arrayBuffer, '', (gltf) => {
                    const model = gltf.scene;
                    const wrapper = setupModel(model, name, transform);
                    glbDataStore[wrapper.userData.id] = { base64: base64Data, fileName: (name || 'object') + '.glb' };
                    resolve(wrapper);
                }, reject);
            } catch(e) { reject(e); }
        });
    }

    function setupModel(model, name, transform) {
        objectCounter++;
        const id = 'obj_' + objectCounter;

        // Center & normalize
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        // Wrap in group
        const wrapper = new THREE.Group();
        wrapper.add(model);
        wrapper.userData = { id, name: name, type: 'glb' };

        // Shadows
        wrapper.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        if (transform) {
            wrapper.position.set(transform.position.x, transform.position.y, transform.position.z);
            wrapper.rotation.set(transform.rotation.x, transform.rotation.y, transform.rotation.z);
            wrapper.scale.set(transform.scale.x, transform.scale.y, transform.scale.z);
            if (transform.visible !== undefined) wrapper.visible = transform.visible;
        } else {
            const offset = sceneObjects.length * 3;
            wrapper.position.set(offset % 15, 0, Math.floor(offset / 5) * 3);
        }

        scene.add(wrapper);
        sceneObjects.push(wrapper);
        refreshObjectList();
        selectObject(wrapper);
        showInfo(`"${name}" 추가됨`);
        return wrapper;
    }

    // ========== Primitive Objects ==========
    function addPrimitive(type, transform) {
        objectCounter++;
        const id = 'obj_' + objectCounter;
        let geo, mat, name;
        const color = transform && transform.color !== undefined ? transform.color : Math.random() * 0xffffff;
        mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5, metalness: 0.3 });

        switch(type) {
            case 'box': geo = new THREE.BoxGeometry(1, 1, 1); name = 'Box'; break;
            case 'sphere': geo = new THREE.SphereGeometry(0.5, 32, 32); name = 'Sphere'; break;
            case 'cylinder': geo = new THREE.CylinderGeometry(0.5, 0.5, 1, 32); name = 'Cylinder'; break;
            case 'cone': geo = new THREE.ConeGeometry(0.5, 1, 32); name = 'Cone'; break;
            case 'torus': geo = new THREE.TorusGeometry(0.5, 0.15, 16, 48); name = 'Torus'; break;
            case 'plane': geo = new THREE.PlaneGeometry(2, 2); name = 'Plane'; break;
            default: geo = new THREE.BoxGeometry(1, 1, 1); name = 'Box';
        }

        const mesh = new THREE.Mesh(geo, mat);
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        const wrapper = new THREE.Group();
        wrapper.add(mesh);
        wrapper.userData = { id, name: (transform && transform.name) || (name + '_' + objectCounter), type: 'primitive', primitiveType: type };

        if (transform) {
            wrapper.position.set(transform.position.x, transform.position.y, transform.position.z);
            wrapper.rotation.set(transform.rotation.x, transform.rotation.y, transform.rotation.z);
            wrapper.scale.set(transform.scale.x, transform.scale.y, transform.scale.z);
            if (transform.visible !== undefined) wrapper.visible = transform.visible;
        } else {
            const offset = sceneObjects.length * 2;
            wrapper.position.set(offset % 10, 0.5, Math.floor(offset / 5) * 2);
        }

        scene.add(wrapper);
        sceneObjects.push(wrapper);
        refreshObjectList();
        selectObject(wrapper);
        showInfo(`"${wrapper.userData.name}" 추가됨`);
        return wrapper;
    }

    // ========== Selection ==========
    function selectObject(obj) {
        selectedObject = obj;
        if (obj) {
            transformControls.attach(obj);
        } else {
            transformControls.detach();
        }
        refreshObjectList();
        updatePropsPanel();
    }

    function onCanvasClick(event) {
        const rect = container.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const allMeshes = [];
        sceneObjects.forEach(obj => {
            obj.traverse(child => {
                if (child.isMesh && !child.userData.isGround) allMeshes.push(child);
            });
        });

        const intersects = raycaster.intersectObjects(allMeshes, false);
        if (intersects.length > 0) {
            let hit = intersects[0].object;
            while (hit.parent && !hit.userData.id) {
                hit = hit.parent;
            }
            if (hit.userData.id) {
                selectObject(hit);
            }
        } else {
            selectObject(null);
        }
    }
    renderer.domElement.addEventListener('click', onCanvasClick);

    // ========== Object List UI ==========
    function refreshObjectList() {
        const listEl = document.getElementById('objectList');
        if (sceneObjects.length === 0) {
            listEl.innerHTML = `<div style="color:#666;font-size:13px;text-align:center;margin-top:30px;">
                파일을 드래그하거나<br>"+ 파일" 버튼으로<br>GLB 오브젝트를 추가하세요</div>`;
            return;
        }
        listEl.innerHTML = '';
        sceneObjects.forEach(obj => {
            const item = document.createElement('div');
            item.className = 'obj-item' + (selectedObject === obj ? ' selected' : '');
            const icon = obj.userData.type === 'glb' ? '📦' : '🔷';
            item.innerHTML = `
                <span class="obj-name">${icon} ${obj.userData.name}</span>
                <span class="obj-actions">
                    <button title="보이기 토글">${obj.visible ? '👁' : '🚫'}</button>
                    <button title="삭제" style="color:#f66;">✕</button>
                </span>
            `;
            const btns = item.querySelectorAll('.obj-actions button');
            btns[0].addEventListener('click', (e) => {
                e.stopPropagation();
                obj.visible = !obj.visible;
                refreshObjectList();
            });
            btns[1].addEventListener('click', (e) => {
                e.stopPropagation();
                deleteObject(obj);
            });
            item.addEventListener('click', () => selectObject(obj));
            listEl.appendChild(item);
        });
    }

    function deleteObject(obj) {
        scene.remove(obj);
        if (selectedObject === obj) {
            transformControls.detach();
            selectedObject = null;
        }
        sceneObjects = sceneObjects.filter(o => o !== obj);
        // Clean up glb data
        if (glbDataStore[obj.userData.id]) delete glbDataStore[obj.userData.id];
        refreshObjectList();
        updatePropsPanel();
        showInfo('오브젝트 삭제됨');
    }

    function duplicateSelected() {
        if (!selectedObject) return;
        const src = selectedObject;

        if (src.userData.type === 'glb' && glbDataStore[src.userData.id]) {
            // Reload from base64 data for proper deep clone
            const data = glbDataStore[src.userData.id];
            const transform = {
                position: { x: src.position.x + 2, y: src.position.y, z: src.position.z },
                rotation: { x: src.rotation.x, y: src.rotation.y, z: src.rotation.z },
                scale: { x: src.scale.x, y: src.scale.y, z: src.scale.z },
                visible: src.visible
            };
            loadGLBFromBase64(data.base64, src.userData.name + '_copy', transform);
        } else {
            // Clone for primitives or GLBs without stored data
            const clone = src.clone(true);
            objectCounter++;
            clone.userData = { ...src.userData, id: 'obj_' + objectCounter, name: src.userData.name + '_copy' };
            clone.position.x += 2;
            scene.add(clone);
            sceneObjects.push(clone);
            refreshObjectList();
            selectObject(clone);
        }
        showInfo('오브젝트 복제됨');
    }

    // ========== Copy / Paste ==========
    document.getElementById('btnCopyObj').addEventListener('click', () => { copySelected(); });
    document.getElementById('btnPasteObj').addEventListener('click', () => { pasteObject(); });

    function copySelected() {
        if (!selectedObject) return;
        clipboard = {
            userData: { ...selectedObject.userData },
            position: selectedObject.position.clone(),
            rotation: { x: selectedObject.rotation.x, y: selectedObject.rotation.y, z: selectedObject.rotation.z },
            scale: selectedObject.scale.clone(),
            visible: selectedObject.visible,
            glbData: glbDataStore[selectedObject.userData.id] || null
        };
        showInfo(`"${selectedObject.userData.name}" 복사됨`);
    }

    function pasteObject() {
        if (!clipboard) { showInfo('복사된 오브젝트가 없습니다'); return; }

        const transform = {
            position: { x: clipboard.position.x + 2, y: clipboard.position.y, z: clipboard.position.z },
            rotation: clipboard.rotation,
            scale: { x: clipboard.scale.x, y: clipboard.scale.y, z: clipboard.scale.z },
            visible: clipboard.visible
        };

        if (clipboard.userData.type === 'glb' && clipboard.glbData) {
            loadGLBFromBase64(clipboard.glbData.base64, clipboard.userData.name + '_paste', transform);
        } else if (clipboard.userData.type === 'primitive') {
            const src = sceneObjects.find(o => o.userData.id === clipboard.userData.id);
            let color = 0x888888;
            if (src && src.children[0] && src.children[0].material) {
                color = src.children[0].material.color.getHex();
            }
            transform.color = color;
            transform.name = clipboard.userData.name + '_paste';
            addPrimitive(clipboard.userData.primitiveType || 'box', transform);
        }
        showInfo('오브젝트 붙여넣기됨');
    }

    // Focus
    document.getElementById('btnFocus').addEventListener('click', () => {

        const box = new THREE.Box3().setFromObject(selectedObject);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const dist = Math.max(size.x, size.y, size.z) * 2.5;
        camera.position.copy(center).add(new THREE.Vector3(dist, dist * 0.7, dist));
        orbitControls.target.copy(center);

    // ========== GLB Decompose (분리) ==========
    document.getElementById('btnDecompose').addEventListener('click', () => {

        showDecomposeModal(selectedObject);

    function showDecomposeModal(obj) {
        const meshes = [];
        obj.traverse(child => {
            if (child.isMesh) {
                meshes.push({ mesh: child, name: child.name || 'Mesh_' + meshes.length });
            }
        });

        if (meshes.length === 0) {
            showInfo('분리할 메쉬가 없습니다');
            return;
        }

        const meshList = document.getElementById('meshList');
        meshList.innerHTML = '';
        meshes.forEach((m, i) => {
            const item = document.createElement('div');
            item.className = 'mesh-item';
            item.innerHTML = `
                <input type="checkbox" data-idx="${i}" checked>
                <span class="mesh-name">${m.name} (vertices: ${m.mesh.geometry.attributes.position ? m.mesh.geometry.attributes.position.count : '?'})</span>
            `;
            meshList.appendChild(item);
        });

        // Store meshes on modal for later use
        document.getElementById('decomposeModal')._meshes = meshes;
        document.getElementById('decomposeModal')._sourceObj = obj;
        document.getElementById('decomposeModal').classList.add('show');
    }

    document.getElementById('btnSelectAllMeshes').addEventListener('click', () => {
        document.querySelectorAll('#meshList input[type="checkbox"]').forEach(cb => cb.checked = true);
    });
    document.getElementById('btnDeselectAllMeshes').addEventListener('click', () => {
        document.querySelectorAll('#meshList input[type="checkbox"]').forEach(cb => cb.checked = false);
    });
    document.getElementById('btnCancelDecompose').addEventListener('click', () => {
        document.getElementById('decomposeModal').classList.remove('show');
    });

    document.getElementById('btnDoDecompose').addEventListener('click', () => {
        const modal = document.getElementById('decomposeModal');
        const meshes = modal._meshes;
        const sourceObj = modal._sourceObj;
        const checkboxes = document.querySelectorAll('#meshList input[type="checkbox"]');

        const selectedIndices = [];
        checkboxes.forEach(cb => {
            if (cb.checked) selectedIndices.push(parseInt(cb.dataset.idx));
        });

        if (selectedIndices.length === 0) {
            showInfo('분리할 메쉬를 선택하세요');
            return;
        }

        // Extract selected meshes as individual objects
        selectedIndices.forEach(idx => {
            const meshData = meshes[idx];
            const mesh = meshData.mesh;

            // Clone the mesh
            const clonedMesh = mesh.clone();
            clonedMesh.material = mesh.material.clone();

            // Get world position
            const worldPos = new THREE.Vector3();
            mesh.getWorldPosition(worldPos);
            const worldQuat = new THREE.Quaternion();
            mesh.getWorldQuaternion(worldQuat);
            const worldScale = new THREE.Vector3();
            mesh.getWorldScale(worldScale);

            clonedMesh.position.set(0, 0, 0);
            clonedMesh.rotation.set(0, 0, 0);
            clonedMesh.scale.set(1, 1, 1);
            clonedMesh.castShadow = true;
            clonedMesh.receiveShadow = true;

            // Create wrapper
            objectCounter++;
            const wrapper = new THREE.Group();
            wrapper.add(clonedMesh);
            wrapper.position.copy(worldPos);
            wrapper.quaternion.copy(worldQuat);
            wrapper.scale.copy(worldScale);
            wrapper.userData = {
                id: 'obj_' + objectCounter,
                name: meshData.name,
                type: 'decomposed'
            };

            scene.add(wrapper);
            sceneObjects.push(wrapper);
        });

        // Ask if user wants to remove original
        if (confirm('원본 GLB 객체를 삭제하시겠습니까?')) {
            deleteObject(sourceObj);
        }

        modal.classList.remove('show');
        refreshObjectList();
        showInfo(`${selectedIndices.length}개 메쉬 분리 완료`);
    });

    // ========== JSON Export (씬 데이터만) ==========
    document.getElementById('btnExportJSON').addEventListener('click', () => {

        downloadJSON(data, 'scene_data.json');
        showInfo('JSON 씬 데이터 내보내기 완료');
    });

    function buildSceneJSON(includeGLBData) {
        const sceneData = {
            version: 2,
            timestamp: new Date().toISOString(),
            settings: {
                bgColor: '#' + scene.background.getHexString(),
                groundColor: '#' + groundMat.color.getHexString(),
                groundOpacity: groundMat.opacity,
                mapSize: currentMapSize,
                gridDivisions: currentGridDivisions,
                gridVisible: gridHelper.visible,
                groundVisible: ground.visible
            },
            camera: {
                position: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
                target: { x: orbitControls.target.x, y: orbitControls.target.y, z: orbitControls.target.z }
            },
            objects: sceneObjects.map(obj => {
                const entry = {
                    name: obj.userData.name,
                    type: obj.userData.type,
                    position: { x: obj.position.x, y: obj.position.y, z: obj.position.z },
                    rotation: { x: obj.rotation.x, y: obj.rotation.y, z: obj.rotation.z },
                    scale: { x: obj.scale.x, y: obj.scale.y, z: obj.scale.z },
                    visible: obj.visible
                };
                if (obj.userData.type === 'primitive') {
                    entry.primitiveType = obj.userData.primitiveType || 'box';
                    if (obj.children[0] && obj.children[0].material) {
                        entry.color = obj.children[0].material.color.getHex();
                    }
                }
                if (includeGLBData && obj.userData.type === 'glb' && glbDataStore[obj.userData.id]) {
                    entry.glbBase64 = glbDataStore[obj.userData.id].base64;
                    entry.fileName = glbDataStore[obj.userData.id].fileName;
                }
                return entry;
            })
        };
        return sceneData;
    }

    function downloadJSON(data, filename) {
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    }

    // ========== JSON Import ==========
    document.getElementById('btnImportJSON').addEventListener('click', () => {
        document.getElementById('jsonInput').click();
    });
    document.getElementById('jsonInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                loadSceneFromJSON(data);

    if (!data.glbBase64) return;

    const draco = new DRACOLoader();
    draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");

      });

    });

      position={data.position}
      rotation={data.rotation}
      scale={data.scale}
      visible={data.visible}
    >

    </group>
  );

        마우스: 회전 | 스크롤: 줌 | 우클릭: 이동
      </div>
    </div>
  );
}
`;
