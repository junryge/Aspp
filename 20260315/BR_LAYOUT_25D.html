// OBJ EXPORT — 2.5D (Oblique Projection Relief)
// 캔버스에 보이는 사선 투영 모양 그대로의 릴리프 지오메트리
// X=화면수평, Y=화면수직(위가+), Z=깊이(릴리프 두께)
// ══════════════════════════════════════════════
function export25DOBJ(){
  if(!S.nodes.length){alert('노드가 없습니다.');return;}
  var L=['# 2.5D FAB Layout — Oblique Projection Relief OBJ','# 화면에 보이는 사선 투영 형태 그대로의 릴리프 모델',''];
  var ML=['# 2.5D FAB Layout MTL',''];
  var vi=1;
  var matDone={};

  // 사선 투영 변환 (캔버스 drawFloorPlate 등에서 쓰는 것과 동일)
  var _OA=Math.PI/6, _OC=Math.cos(_OA), _OS=Math.sin(_OA), _OD=0.7;
  function iso(wx,wy){ return{ x: wx + wy*_OC*_OD, y: -(wy*_OS*_OD) }; }
  // 노드 중심의 화면 좌표 (Y반전)
  function nScr(n){ var p=iso(n.x,n.y); return{x:p.x, y:p.y}; }

  // 색상 문자열 → {r,g,b} (0~1) 파싱 — hex (#rrggbb) 와 rgb(r,g,b) 모두 지원
  function parseCol(c){
    if(!c) return{r:0.5,g:0.5,b:0.5};
    if(c[0]==='#'){
      return{r:parseInt(c.slice(1,3),16)/255, g:parseInt(c.slice(3,5),16)/255, b:parseInt(c.slice(5,7),16)/255};
    }
    var m=c.match(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
    if(m) return{r:parseInt(m[1])/255, g:parseInt(m[2])/255, b:parseInt(m[3])/255};
    return{r:0.5,g:0.5,b:0.5};
  }
  function addMtl(name,colorStr){
    if(matDone[name])return;matDone[name]=true;
    var c=parseCol(colorStr);
    ML.push('newmtl '+name,
      'Ka '+(c.r*0.3).toFixed(4)+' '+(c.g*0.3).toFixed(4)+' '+(c.b*0.3).toFixed(4),
      'Kd '+c.r.toFixed(4)+' '+c.g.toFixed(4)+' '+c.b.toFixed(4),
      'Ks 0.15 0.15 0.15','Ns 40','d 1.0','');
  }

  // 평행사변형 면 (4꼭짓점 → 앞/뒤면 + 측면으로 릴리프)
  // pts = [{x,y},...] 화면좌표, depth = Z 두께
  function addRelief(pts, depth, matTop, matSide){
    if(pts.length<3)return;
    var d=depth||5;
    var base=vi;
    // 앞면 꼭짓점 (z=d/2)
    pts.forEach(function(p){ L.push('v '+p.x.toFixed(4)+' '+p.y.toFixed(4)+' '+(d/2).toFixed(4)); vi++; });
    // 뒷면 꼭짓점 (z=-d/2)
    pts.forEach(function(p){ L.push('v '+p.x.toFixed(4)+' '+p.y.toFixed(4)+' '+(-d/2).toFixed(4)); vi++; });
    var n=pts.length;
    // 앞면
    L.push('usemtl '+matTop);
    var f='f';for(var i=0;i<n;i++)f+=' '+(base+i);L.push(f);
    // 뒷면 (반대 winding)
    f='f';for(var i=n-1;i>=0;i--)f+=' '+(base+n+i);L.push(f);
    // 측면
    if(matSide)L.push('usemtl '+matSide);
    for(var i=0;i<n;i++){
      var i2=(i+1)%n;
      L.push('f '+(base+i)+' '+(base+i2)+' '+(base+n+i2)+' '+(base+n+i));
    }
  }

  // 이소메트릭 큐브 (drawCube와 동일한 6면체) → 릴리프
  function addIsoCube(cx,cy,sz,matT,matL,matR){
    var hs=sz*0.55;
    // 상단 다이아몬드
    var top=[{x:cx,y:cy-sz*0.65},{x:cx+hs,y:cy-sz*0.3},{x:cx,y:cy+sz*0.05},{x:cx-hs,y:cy-sz*0.3}];
    // 왼쪽 면
    var left=[{x:cx-hs,y:cy-sz*0.3},{x:cx,y:cy+sz*0.05},{x:cx,y:cy+sz*0.4},{x:cx-hs,y:cy+sz*0.05}];
    // 오른쪽 면
    var right=[{x:cx+hs,y:cy-sz*0.3},{x:cx,y:cy+sz*0.05},{x:cx,y:cy+sz*0.4},{x:cx+hs,y:cy+sz*0.05}];
    addRelief(top,3,matT,matT);
    addRelief(left,3,matL,matL);
    addRelief(right,3,matR,matR);
  }

  // 사선 투영 오프셋 (isoOff와 동일, z=1 고정)
  function iOff(wx,wy){ return{x:wx+wy*_OC*_OD, y:-(wy*_OS*_OD)}; }

  L.push('mtllib fab_layout_25d.mtl','');

  S.nodes.forEach(function(n,ni){
    var sc=nScr(n);
    var objN='node_'+ni+'_'+n.type+(n.label?'_'+n.label.replace(/[^a-zA-Z0-9가-힣]/g,'_'):'');
    L.push('o '+objN);
    var col=n.color||'#888888';
    var mTop='m'+ni+'_top'; addMtl(mTop,col);
    var mSideD='m'+ni+'_sideD';
    var dkCol=dk(col,.72);addMtl(mSideD,dkCol);
    var mSideR='m'+ni+'_sideR';
    var dkCol2=dk(col,.58);addMtl(mSideR,dkCol2);

    switch(n.type){
      case 'floor':{
        // 바닥판 다이아몬드 + 두께 측면 (drawFloorPlate 재현)
        var hw=(n.w||200)/2, hh=(n.h||80)/2;
        var p0=iOff(-hw,-hh),p1=iOff(hw,-hh),p2=iOff(hw,hh),p3=iOff(-hw,hh);
        var tk=5; // 릴리프 두께
        // 상판 (다이아몬드)
        var topPts=[
          {x:sc.x+p0.x,y:sc.y+p0.y},{x:sc.x+p1.x,y:sc.y+p1.y},
          {x:sc.x+p2.x,y:sc.y+p2.y},{x:sc.x+p3.x,y:sc.y+p3.y}
        ];
        addRelief(topPts,tk,mTop,mSideD);
        // 바닥 측면 (두께 표현 — 아래로 내려감)
        var tkY=5; // 화면상 아래 방향
        var mSideBot='m'+ni+'_sBot';addMtl(mSideBot,dk(col,.65));
        // 아래쪽 (p3→p2)
        addRelief([
          {x:sc.x+p3.x,y:sc.y+p3.y},{x:sc.x+p2.x,y:sc.y+p2.y},
          {x:sc.x+p2.x,y:sc.y+p2.y-tkY},{x:sc.x+p3.x,y:sc.y+p3.y-tkY}
        ],tk,mSideD,mSideD);
        // 오른쪽 (p2→p1)
        addRelief([
          {x:sc.x+p2.x,y:sc.y+p2.y},{x:sc.x+p1.x,y:sc.y+p1.y},
          {x:sc.x+p1.x,y:sc.y+p1.y-tkY},{x:sc.x+p2.x,y:sc.y+p2.y-tkY}
        ],tk,mSideR,mSideR);
        // 왼쪽 (p0→p3)
        addRelief([
          {x:sc.x+p0.x,y:sc.y+p0.y},{x:sc.x+p3.x,y:sc.y+p3.y},
          {x:sc.x+p3.x,y:sc.y+p3.y-tkY},{x:sc.x+p0.x,y:sc.y+p0.y-tkY}
        ],tk,mSideBot,mSideBot);
        break;
      }
      case 'eq_grid':{
        // 장비 그리드: 이소메트릭 큐브 배열
        var rows=n.rows||3,cols=n.cols||4,gap=18;
        for(var r=0;r<rows;r++)for(var cc=0;cc<cols;cc++){
          var wx=(cc-cols/2+.5)*gap, wy=(r-rows/2+.5)*gap;
          var off=iOff(wx,wy);
          addIsoCube(sc.x+off.x,sc.y+off.y,9,mTop,mSideD,mSideR);
        }
        break;
      }
      case 'conveyor':{
        // 컨베이어: X축 방향 사선 투영 라인 (두꺼운 밴드)
        var len=(n.w||120)/2;
        var s1=iOff(-len,0),s2=iOff(len,0);
        var bw=4; // 밴드 폭 (화면상)
        addRelief([
          {x:sc.x+s1.x,y:sc.y+s1.y+bw},{x:sc.x+s2.x,y:sc.y+s2.y+bw},
          {x:sc.x+s2.x,y:sc.y+s2.y-bw},{x:sc.x+s1.x,y:sc.y+s1.y-bw}
        ],4,mTop,mSideD);
        break;
      }
      case 'lift':{
        // 리프트: 사선 투영 평행사변형 (프레임)
        var hw=(n.w||28)/2,hh=(n.h||70)/2;
        var p0=iOff(-hw,-hh),p1=iOff(hw,-hh),p2=iOff(hw,hh),p3=iOff(-hw,hh);
        var frame=[
          {x:sc.x+p0.x,y:sc.y+p0.y},{x:sc.x+p1.x,y:sc.y+p1.y},
          {x:sc.x+p2.x,y:sc.y+p2.y},{x:sc.x+p3.x,y:sc.y+p3.y}
        ];
        addRelief(frame,3,mTop,mSideD);
        break;
      }
      case 'hub':{
        // 허브: 사선 투영 평행사변형
        var hw=(n.w||60)/2,hh=(n.h||45)/2;
        var p0=iOff(-hw,-hh),p1=iOff(hw,-hh),p2=iOff(hw,hh),p3=iOff(-hw,hh);
        addRelief([
          {x:sc.x+p0.x,y:sc.y+p0.y},{x:sc.x+p1.x,y:sc.y+p1.y},
          {x:sc.x+p2.x,y:sc.y+p2.y},{x:sc.x+p3.x,y:sc.y+p3.y}
        ],4,mTop,mSideD);
        // 중심 원 (8각형 근사)
        var cr=Math.min(hw,hh)*0.4;
        var circle=[];
        for(var ai=0;ai<12;ai++){
          var ang=Math.PI*2*ai/12;
          circle.push({x:sc.x+Math.cos(ang)*cr,y:sc.y-Math.sin(ang)*cr*_OS*_OD*2});
        }
        var mHub='m'+ni+'_hub';addMtl(mHub,lt(col,.3));
        addRelief(circle,6,mHub,mTop);
        break;
      }
      case 'stocker':{
        // 스토커: 이소메트릭 큐브 1개
        var sz2=Math.max(n.w||35,n.h||45)*0.55;
        addIsoCube(sc.x,sc.y,sz2,mTop,mSideD,mSideR);
        break;
      }
      case 'zone':{
        // 구역: 사선 투영 평행사변형 테두리 (얇은 릴리프)
        var hw=(n.w||130)/2,hh=(n.h||90)/2;
        var p0=iOff(-hw,-hh),p1=iOff(hw,-hh),p2=iOff(hw,hh),p3=iOff(-hw,hh);
        addRelief([
          {x:sc.x+p0.x,y:sc.y+p0.y},{x:sc.x+p1.x,y:sc.y+p1.y},
          {x:sc.x+p2.x,y:sc.y+p2.y},{x:sc.x+p3.x,y:sc.y+p3.y}
        ],1.5,mTop,mTop);
        break;
      }
      case 'bridge':{
        // 브릿지: Y축(깊이) 사선 라인
        var hh=(n.h||120)/2;
        var bt=iOff(0,-hh),bb=iOff(0,hh);
        var bw2=3;
        // 직교 법선
        var dx=bb.x-bt.x,dy=bb.y-bt.y;
        var bl=Math.sqrt(dx*dx+dy*dy)||1;
        var nx=-dy/bl*bw2,ny=dx/bl*bw2;
        addRelief([
          {x:sc.x+bt.x+nx,y:sc.y+bt.y+ny},{x:sc.x+bb.x+nx,y:sc.y+bb.y+ny},
          {x:sc.x+bb.x-nx,y:sc.y+bb.y-ny},{x:sc.x+bt.x-nx,y:sc.y+bt.y-ny}
        ],5,mTop,mSideD);
        // 삼각형 마커들
        var mTri='m'+ni+'_tri';addMtl(mTri,lt(col,.2));
        for(var ti=0;ti<3;ti++){
          var tf=(ti+1)/4;
          var mx=bt.x+(bb.x-bt.x)*tf,my=bt.y+(bb.y-bt.y)*tf;
          addRelief([
            {x:sc.x+mx-5,y:sc.y+my+4},{x:sc.x+mx,y:sc.y+my-4},{x:sc.x+mx+5,y:sc.y+my+4}
          ],4,mTri,mTri);
        }
        break;
      }
      case 'tunnel':{
        // 터널/파이프: 각 세그먼트를 사선 투영된 밴드로
        var pts=n.points||[{x:0,y:0},{x:60,y:0},{x:60,y:-60},{x:120,y:-60}];
        var pw=(n.pipeW||8)/2;
        for(var pi=0;pi<pts.length-1;pi++){
          var a=pts[pi],b=pts[pi+1];
          var sa=iOff(a.x,a.y),sb=iOff(b.x,b.y);
          var sdx=sb.x-sa.x,sdy=sb.y-sa.y;
          var sl=Math.sqrt(sdx*sdx+sdy*sdy)||1;
          var snx=-sdy/sl*pw,sny=sdx/sl*pw;
          addRelief([
            {x:sc.x+sa.x+snx,y:sc.y+sa.y+sny},{x:sc.x+sb.x+snx,y:sc.y+sb.y+sny},
            {x:sc.x+sb.x-snx,y:sc.y+sb.y-sny},{x:sc.x+sa.x-snx,y:sc.y+sa.y-sny}
          ],pw*1.5,mTop,mSideD);
        }
        // 관절 (원형 근사)
        var mJnt='m'+ni+'_jnt';addMtl(mJnt,dk(col,.7));
        pts.forEach(function(p){
          var sp=iOff(p.x,p.y);
          var jr=pw*0.65,jc=[];
          for(var ai=0;ai<8;ai++){
            var ang=Math.PI*2*ai/8;
            jc.push({x:sc.x+sp.x+Math.cos(ang)*jr,y:sc.y+sp.y+Math.sin(ang)*jr});
          }
          addRelief(jc,pw*1.8,mJnt,mJnt);
        });
        break;
      }
      case 'label': break; // 라벨은 지오메트리 없음
      default:{
        // 기본: 이소메트릭 큐브
        var sz2=Math.max(n.w||30,n.h||30)*0.55;
        addIsoCube(sc.x,sc.y,sz2,mTop,mSideD,mSideR);
      }
    }
    L.push('');
  });

  // 연결선 (사선 투영 밴드)
  S.conns.forEach(function(cn,ci){
    var nF=S.nodes.find(function(x){return x.id===cn.from;}),nT=S.nodes.find(function(x){return x.id===cn.to;});
    if(!nF||!nT)return;
    var sf=nScr(nF),st=nScr(nT);
    var mCon='mcon_'+ci;addMtl(mCon,cn.color||'#3b82f6');
    var cdx=st.x-sf.x,cdy=st.y-sf.y;
    var cl=Math.sqrt(cdx*cdx+cdy*cdy)||1;
    var cnx=-cdy/cl*2,cny=cdx/cl*2;
    L.push('o conn_'+ci);
    addRelief([
      {x:sf.x+cnx,y:sf.y+cny},{x:st.x+cnx,y:st.y+cny},
      {x:st.x-cnx,y:st.y-cny},{x:sf.x-cnx,y:sf.y-cny}
    ],2,mCon,mCon);
  });

  // 다운로드
  var objB=new Blob([L.join('\n')],{type:'text/plain'});
  var mtlB=new Blob([ML.join('\n')],{type:'text/plain'});
  var a=document.createElement('a');a.href=URL.createObjectURL(objB);a.download='fab_layout_25d.obj';a.click();
  setTimeout(function(){
    var a2=document.createElement('a');a2.href=URL.createObjectURL(mtlB);a2.download='fab_layout_25d.mtl';a2.click();
  },500);
  document.getElementById('stat').textContent='2.5D OBJ 내보내기 완료 (사선 투영 릴리프)';
}
document.getElementById('bOBJ25').onclick=export25DOBJ;


</script>
