<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>2.5D FAB 레이아웃 에디터</title>
<style>
:root{--bg:#0c1017;--p1:#151b28;--p2:#1c2436;--bd:#2a3450;--ac:#3b82f6;--ac2:#60a5fa;--tx:#e2e8f0;--tx2:#8494b0;--grn:#22c55e;--yel:#eab308;--red:#ef4444;--ora:#f97316;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Malgun Gothic',system-ui,sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh;}
.app{display:grid;grid-template-columns:200px 1fr 260px;grid-template-rows:44px 1fr 32px;height:100vh;}

.topbar{grid-column:1/4;background:var(--p1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:6px;z-index:10;}
.logo{font-weight:800;font-size:14px;color:var(--ac2);letter-spacing:-.5px;white-space:nowrap;}
.sep{width:1px;height:22px;background:var(--bd);margin:0 6px;}
.tb{background:var(--p2);border:1px solid var(--bd);color:var(--tx2);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;transition:.12s;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.tb:hover,.tb.on{background:var(--ac);color:#fff;border-color:var(--ac);}
.spacer{flex:1;}
.zinfo{font-size:10px;color:var(--tx2);background:var(--p2);padding:2px 8px;border-radius:3px;}

.left{background:var(--p1);border-right:1px solid var(--bd);overflow-y:auto;padding:10px;font-size:12px;}
.stitle{font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.7px;margin:0 0 6px 2px;}
.tbox{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.ti{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;background:var(--p2);border:1px solid var(--bd);border-radius:7px;cursor:grab;font-size:9px;color:var(--tx2);transition:.12s;user-select:none;}
.ti:hover{border-color:var(--ac);color:var(--tx);}
.ti:active{cursor:grabbing;}
.usage{margin-top:12px;padding:8px;background:var(--p2);border-radius:7px;font-size:10px;color:var(--tx2);line-height:1.7;}

.cvs{position:relative;overflow:hidden;cursor:default;background:var(--bg);min-width:0;min-height:0;}
.cvs.drag{cursor:grabbing;}.cvs.conn{cursor:crosshair;}.cvs.moving{cursor:grabbing;}
canvas#mc{display:block;pointer-events:none;}
.hint{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(59,130,246,.88);border-radius:7px;padding:5px 14px;font-size:11px;color:#fff;font-weight:600;pointer-events:none;z-index:5;}
.mmap{position:absolute;bottom:10px;right:10px;width:160px;height:100px;background:rgba(21,27,40,.92);border:1px solid var(--bd);border-radius:7px;overflow:hidden;cursor:pointer;}

.right{background:var(--p1);border-left:1px solid var(--bd);overflow-y:auto;padding:10px;font-size:12px;}
.nosel{text-align:center;padding:30px 16px;color:var(--tx2);font-size:12px;line-height:1.7;}
.pg{margin-bottom:10px;}
.pl{font-size:10px;color:var(--tx2);margin-bottom:3px;}
.pi{width:100%;background:var(--p2);border:1px solid var(--bd);border-radius:5px;padding:5px 8px;color:var(--tx);font-size:12px;outline:0;}
.pi:focus{border-color:var(--ac);}
.pr{display:flex;gap:5px;}.pr .pg{flex:1;}
.ci{width:100%;height:28px;border:1px solid var(--bd);border-radius:5px;cursor:pointer;background:var(--p2);padding:1px;}
.pact{display:flex;gap:5px;margin-top:10px;}
.pact button{flex:1;padding:6px;border-radius:5px;border:1px solid var(--bd);cursor:pointer;font-size:11px;font-weight:600;}
.bdel{background:rgba(239,68,68,.12);color:var(--red);border-color:rgba(239,68,68,.25);}
.bdel:hover{background:rgba(239,68,68,.25);}
.bdup{background:rgba(59,130,246,.12);color:var(--ac2);border-color:rgba(59,130,246,.25);}
.bdup:hover{background:rgba(59,130,246,.25);}

.bot{grid-column:1/4;background:var(--p1);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;font-size:10px;color:var(--tx2);gap:14px;}

.ctx{position:fixed;background:var(--p1);border:1px solid var(--bd);border-radius:7px;padding:3px;min-width:150px;box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:100;}
.cti{padding:6px 10px;border-radius:4px;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:6px;}
.cti:hover{background:var(--p2);}
.cti.dng{color:var(--red);}
.cts{height:1px;background:var(--bd);margin:3px 6px;}
.hid{display:none!important;}

/* 인라인 편집 */
.inline-edit{position:absolute;z-index:50;background:var(--p1);border:2px solid var(--ac);border-radius:7px;padding:10px;display:flex;flex-direction:column;gap:6px;min-width:220px;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.inline-edit label{font-size:10px;color:var(--tx2);}
.inline-edit input{background:var(--p2);border:1px solid var(--bd);border-radius:4px;padding:5px 8px;color:var(--tx);font-size:12px;outline:0;width:100%;}
.inline-edit input:focus{border-color:var(--ac);}
.inline-edit .ie-btns{display:flex;gap:4px;justify-content:flex-end;margin-top:2px;}
.inline-edit .ie-btns button{padding:4px 12px;border-radius:4px;border:1px solid var(--bd);cursor:pointer;font-size:11px;font-weight:600;}
.inline-edit .ie-ok{background:var(--ac);color:#fff;border-color:var(--ac);}
.inline-edit .ie-cancel{background:var(--p2);color:var(--tx2);}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200;}
.mdl{background:var(--p1);border:1px solid var(--bd);border-radius:14px;padding:20px;min-width:380px;max-width:90vw;}
.mdl h3{font-size:15px;margin-bottom:12px;}
.mdl textarea{width:100%;height:260px;background:var(--p2);border:1px solid var(--bd);border-radius:7px;padding:8px;color:var(--tx);font-family:monospace;font-size:11px;resize:vertical;}
.mbtn{display:flex;gap:6px;margin-top:10px;justify-content:flex-end;}
.mbtn button{padding:7px 18px;border-radius:7px;border:1px solid var(--bd);cursor:pointer;font-size:12px;font-weight:600;}
.mbtn .bp{background:var(--ac);color:#fff;border-color:var(--ac);}
.mbtn .bc{background:var(--p2);color:var(--tx2);}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <span class="logo">2.5D FAB 레이아웃</span><div class="sep"></div>
  <button class="tb on" id="bSel">▸ 선택</button>
  <button class="tb" id="bPan">✥ 이동</button>
  <button class="tb" id="bCon">⟶ 연결</button>
  <div class="sep"></div>
  <button class="tb on" id="bGrd">격자</button>
  <button class="tb on" id="bSnp">스냅</button>
  <button class="tb on" id="bAnm">애니</button>
  <div class="sep"></div>
  <div class="spacer"></div>
  <button class="tb" id="bUnd">실행취소</button>
  <button class="tb" id="bRed">다시실행</button>
  <div class="sep"></div>
  <button class="tb" id="bSav">💾 저장</button>
  <button class="tb" id="bLod">📂 불러오기</button>
  <button class="tb" id="bExp">🖼 PNG</button>
  <button class="tb" id="bExH">🌐 HTML</button>
  <button class="tb" id="bExR">⚛ React</button>
  <div class="sep"></div>
  <button class="tb" id="bOBJ25" title="2.5D OBJ 내보내기">📦 2.5D OBJ</button>
  <button class="tb" id="bFit">⊞ 맞춤</button>
  <div class="sep"></div>
  <span class="zinfo" id="zInf">100%</span>
  <div class="sep"></div>
  <label class="tb" style="padding:2px 6px;gap:3px" title="배경색">🎨 <input type="color" id="bBg" value="#0c1017" style="width:22px;height:18px;border:none;cursor:pointer;background:none;padding:0"/></label>
</div>

<div class="left">
  <div class="stitle">컴포넌트</div>
  <div class="tbox" id="tbox"></div>
  <div class="usage">
    <b>마우스 조작</b><br/>
    드래그: 컴포넌트 배치<br/>
    <b>클릭+드래그: 노드 이동</b><br/>
    <b>빈곳 드래그: 범위 선택</b><br/>
    <b>Shift+클릭: 다중 선택</b><br/>
    더블클릭: 직접 편집<br/>
    핸들 드래그: 크기 조절<br/>
    우클릭: 메뉴<br/>
    <br/><b>키보드</b><br/>
    <b>Ctrl+A: 전체 선택</b><br/>
    Del: 삭제 (다중 가능)<br/>
    R: 회전 / Ctrl+D: 복제<br/>
    Ctrl+C/V/X: 복사/붙여넣기<br/>
    Ctrl+Z/Y: 실행취소/다시실행<br/>
    ESC: 선택해제
  </div>
</div>

<div class="cvs" id="cvsArea">
  <canvas id="mc"></canvas>
  <div class="hint hid" id="hint"></div>
  <div class="mmap"><canvas id="mm"></canvas></div>
</div>

<div class="right" id="rp">
  <div class="nosel" id="noSel">
    <div style="font-size:22px;margin-bottom:6px;">📐</div>
    노드를 선택하거나<br/>왼쪽에서 드래그하세요<br/><br/>
    <b>더블클릭</b>으로 직접 편집
  </div>
  <div id="pe" class="hid"></div>
</div>

<div class="bot">
  <span id="stat">준비</span><span class="spacer"></span>
  <span id="mpos">0, 0</span><span>│</span><span id="nc">N:0</span><span>│</span><span id="cc">C:0</span>
</div>
</div>

<div class="ctx hid" id="ctx"></div>
<div class="mbg hid" id="mbg"><div class="mdl" id="mdl"></div></div>

<script>
// ══════════════════════════════════════════════
// STATE — 단일 캔버스, 층 없음
// ══════════════════════════════════════════════
let uid=1;const gid=()=>'n'+(uid++);
const S={
  nodes:[],conns:[],
  sel:null,sels:[],selC:null,  // sel=단일선택, sels=다중선택 ID배열
  tool:'select',cFrom:null,
  cam:{x:0,y:0,z:1},
  grid:true,snap:true,anim:true,
  _dn:null,_do:{x:0,y:0},_drag:false,_pan:false,_ps:{x:0,y:0},
  _resizing:null,
  _rotating:null,
  _tunDrag:null, _tunPtIdx:-1, // 터널 꼭짓점 드래그
  _selBox:null, // {x1,y1,x2,y2} 드래그 선택 박스 (화면좌표)
  _multiDrag:null, // {offsets:[{id,dx,dy}...]} 다중 드래그
  hist:[],hi:-1,
  _mx:0,_my:0,
  bgColor:'#0c1017',
};
// 선택 여부 확인 헬퍼
function isSel(id){return S.sel===id||S.sels.includes(id);}
function allSel(){
  const s=new Set(S.sels);
  if(S.sel)s.add(S.sel);
  return[...s];
}
function clearSel(){S.sel=null;S.sels=[];S.selC=null;}

// ══════════════════════════════════════════════
// CANVAS
// ══════════════════════════════════════════════
const ca=document.getElementById('cvsArea');
const cv=document.getElementById('mc');
const c=cv.getContext('2d');
const mv=document.getElementById('mm');
const mc=mv.getContext('2d');
let W,H;
function rsz(){
  const r=ca.getBoundingClientRect();W=r.width;H=r.height;
  cv.width=W*devicePixelRatio;cv.height=H*devicePixelRatio;
  cv.style.width=W+'px';cv.style.height=H+'px';
  c.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  mv.width=160;mv.height=100;
}
rsz();addEventListener('resize',rsz);

// ══════════════════════════════════════════════
// 사선 투영 (Oblique) — 정면 뷰 + 깊이 대각선
// X축=수평(폭), Y축=대각선(깊이, 30°방향)
// ══════════════════════════════════════════════
const OBL_ANG=Math.PI/6, OBL_COS=Math.cos(OBL_ANG), OBL_SIN=Math.sin(OBL_ANG);
const OBL_D=0.7; // 깊이축 축소비

// 마우스 좌표 헬퍼 (항상 ca 기준)
function getPos(e){
  const r=ca.getBoundingClientRect();
  return{x:e.clientX-r.left, y:e.clientY-r.top};
}

// 월드→화면 공간
function isoWorld(wx,wy){
  return{ sx: wx + wy*OBL_COS*OBL_D, sy: wy*OBL_SIN*OBL_D };
}
function toScr(ix,iy){
  return{x:ix*S.cam.z+S.cam.x+W/2, y:iy*S.cam.z+S.cam.y+H/2};
}
function fromScr(sx,sy){
  return{x:(sx-W/2-S.cam.x)/S.cam.z, y:(sy-H/2-S.cam.y)/S.cam.z};
}
function scrToWorld(sx,sy){
  const ix=(sx-W/2-S.cam.x)/S.cam.z;
  const iy=(sy-H/2-S.cam.y)/S.cam.z;
  let wy=iy/(OBL_SIN*OBL_D);
  let wx=ix-wy*OBL_COS*OBL_D;
  if(S.snap){wx=Math.round(wx/15)*15;wy=Math.round(wy/15)*15;}
  return{x:wx,y:wy};
}
function nodeScr(n){
  const p=isoWorld(n.x,n.y);
  return toScr(p.sx,p.sy);
}

// ══════════════════════════════════════════════
// DRAWING
// ══════════════════════════════════════════════
function dk(hex,f){
  if(!hex||!hex.startsWith('#'))return hex||'#888';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${r*f|0},${g*f|0},${b*f|0})`;
}
function lt(hex,f){
  if(!hex||!hex.startsWith('#'))return hex||'#ccc';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${Math.min(255,r+(255-r)*f|0)},${Math.min(255,g+(255-g)*f|0)},${Math.min(255,b+(255-b)*f|0)})`;
}

function drawGrid(){
  if(!S.grid)return;
  c.save();c.globalAlpha=.06;c.strokeStyle='#60a5fa';c.lineWidth=.5;
  for(let i=-20;i<=20;i++){
    const wx=i*30;
    const p1=isoWorld(wx,-300),p2=isoWorld(wx,300);
    const s1=toScr(p1.sx,p1.sy),s2=toScr(p2.sx,p2.sy);
    c.beginPath();c.moveTo(s1.x,s1.y);c.lineTo(s2.x,s2.y);c.stroke();
    const p3=isoWorld(-300,wx),p4=isoWorld(300,wx);
    const s3=toScr(p3.sx,p3.sy),s4=toScr(p4.sx,p4.sy);
    c.beginPath();c.moveTo(s3.x,s3.y);c.lineTo(s4.x,s4.y);c.stroke();
  }
  c.restore();
}

// 월드→화면 오프셋 (사선 투영)
function isoOff(wx,wy,z){
  return{x:(wx + wy*OBL_COS*OBL_D)*z, y:(wy*OBL_SIN*OBL_D)*z};
}

// 바닥판 그리기 (아이소메트릭 다이아몬드)
function drawFloorPlate(n){
  const sp=nodeScr(n);
  const z=S.cam.z;
  const hw=(n.w||200)/2, hh=(n.h||80)/2;
  // 바닥 네 꼭짓점 (월드 좌표 → 화면)
  const p0=isoOff(-hw,-hh,z); // 위
  const p1=isoOff(hw,-hh,z);  // 오른쪽
  const p2=isoOff(hw,hh,z);   // 아래
  const p3=isoOff(-hw,hh,z);  // 왼쪽

  c.save();
  c.globalAlpha=.7;
  c.beginPath();
  c.moveTo(sp.x+p0.x,sp.y+p0.y);
  c.lineTo(sp.x+p1.x,sp.y+p1.y);
  c.lineTo(sp.x+p2.x,sp.y+p2.y);
  c.lineTo(sp.x+p3.x,sp.y+p3.y);
  c.closePath();
  c.fillStyle=n.color||'#c8dca8';c.fill();
  c.globalAlpha=.8;c.strokeStyle=n.border||'#90b060';c.lineWidth=1.5;c.stroke();

  // 두께 (측면) — 아래쪽 3변 모두 표시
  const tk=5*z;
  c.globalAlpha=.85;
  // 아래 왼쪽 측면 (p3→p2, 가장 아래)
  c.beginPath();
  c.moveTo(sp.x+p3.x,sp.y+p3.y);c.lineTo(sp.x+p2.x,sp.y+p2.y);
  c.lineTo(sp.x+p2.x,sp.y+p2.y+tk);c.lineTo(sp.x+p3.x,sp.y+p3.y+tk);
  c.closePath();c.fillStyle=dk(n.color||'#c8dca8',.72);c.fill();c.strokeStyle=n.border||'#90b060';c.lineWidth=1;c.stroke();
  // 아래 오른쪽 측면 (p2→p1)
  c.beginPath();
  c.moveTo(sp.x+p2.x,sp.y+p2.y);c.lineTo(sp.x+p1.x,sp.y+p1.y);
  c.lineTo(sp.x+p1.x,sp.y+p1.y+tk);c.lineTo(sp.x+p2.x,sp.y+p2.y+tk);
  c.closePath();c.fillStyle=dk(n.color||'#c8dca8',.58);c.fill();c.stroke();
  // 왼쪽 측면 (p0→p3)
  c.beginPath();
  c.moveTo(sp.x+p0.x,sp.y+p0.y);c.lineTo(sp.x+p3.x,sp.y+p3.y);
  c.lineTo(sp.x+p3.x,sp.y+p3.y+tk);c.lineTo(sp.x+p0.x,sp.y+p0.y+tk);
  c.closePath();c.fillStyle=dk(n.color||'#c8dca8',.65);c.fill();c.stroke();

  // 바닥판 위에 격자선 (내부 타일 표시)
  c.globalAlpha=.15;c.strokeStyle=n.border||'#90b060';c.lineWidth=.5;
  const step=30;
  for(let i=-hw;i<=hw;i+=step){
    const a=isoOff(i,-hh,z),b=isoOff(i,hh,z);
    c.beginPath();c.moveTo(sp.x+a.x,sp.y+a.y);c.lineTo(sp.x+b.x,sp.y+b.y);c.stroke();
  }
  for(let j=-hh;j<=hh;j+=step){
    const a=isoOff(-hw,j,z),b=isoOff(hw,j,z);
    c.beginPath();c.moveTo(sp.x+a.x,sp.y+a.y);c.lineTo(sp.x+b.x,sp.y+b.y);c.stroke();
  }
  c.restore();
}

function drawCube(sx,sy,sz,c1,c2,c3,bd){
  const s=sz*S.cam.z, hs=s*.55;
  c.beginPath();c.moveTo(sx,sy-s*.65);c.lineTo(sx+hs,sy-s*.3);c.lineTo(sx,sy+s*.05);c.lineTo(sx-hs,sy-s*.3);c.closePath();
  c.fillStyle=c1;c.fill();c.strokeStyle=bd;c.lineWidth=.7;c.stroke();
  c.beginPath();c.moveTo(sx-hs,sy-s*.3);c.lineTo(sx,sy+s*.05);c.lineTo(sx,sy+s*.4);c.lineTo(sx-hs,sy+s*.05);c.closePath();
  c.fillStyle=c2;c.fill();c.stroke();
  c.beginPath();c.moveTo(sx+hs,sy-s*.3);c.lineTo(sx,sy+s*.05);c.lineTo(sx,sy+s*.4);c.lineTo(sx+hs,sy+s*.05);c.closePath();
  c.fillStyle=c3;c.fill();c.stroke();
}

// floorAlign=true → 바닥판 방향, false → 기존 다이아몬드
function drawBox(cx,cy,w,h,col,bd,floorAlign,depth){
  if(!floorAlign){
    const sz=Math.max(w,h)*.55;
    drawCube(cx,cy,sz,col,dk(col,.72),dk(col,.52),bd);
  }else{
    const z=S.cam.z;
    const hw=w/2, hh=h/2;
    const tk=(depth||5)*z;
    const p0=isoOff(-hw,-hh,z),p1=isoOff(hw,-hh,z),p2=isoOff(hw,hh,z),p3=isoOff(-hw,hh,z);
    // 왼면 (p0→p3) — 먼저 그려야 윗면에 가림
    c.beginPath();c.moveTo(cx+p0.x,cy+p0.y-tk);c.lineTo(cx+p3.x,cy+p3.y-tk);c.lineTo(cx+p3.x,cy+p3.y);c.lineTo(cx+p0.x,cy+p0.y);c.closePath();
    c.fillStyle=dk(col,.65);c.fill();c.strokeStyle=bd;c.lineWidth=.7;c.stroke();
    // 앞면 (p3→p2)
    c.beginPath();c.moveTo(cx+p3.x,cy+p3.y-tk);c.lineTo(cx+p2.x,cy+p2.y-tk);c.lineTo(cx+p2.x,cy+p2.y);c.lineTo(cx+p3.x,cy+p3.y);c.closePath();
    c.fillStyle=dk(col,.72);c.fill();c.stroke();
    // 오른면 (p1→p2)
    c.beginPath();c.moveTo(cx+p1.x,cy+p1.y-tk);c.lineTo(cx+p2.x,cy+p2.y-tk);c.lineTo(cx+p2.x,cy+p2.y);c.lineTo(cx+p1.x,cy+p1.y);c.closePath();
    c.fillStyle=dk(col,.58);c.fill();c.stroke();
    // 윗면 (맨 위에 그림)
    c.beginPath();c.moveTo(cx+p0.x,cy+p0.y-tk);c.lineTo(cx+p1.x,cy+p1.y-tk);c.lineTo(cx+p2.x,cy+p2.y-tk);c.lineTo(cx+p3.x,cy+p3.y-tk);c.closePath();
    c.fillStyle=col;c.fill();c.strokeStyle=bd;c.lineWidth=.7;c.stroke();
  }
}

function drawLabel(sx,sy,title,desc,sel,lblSz,dscSz){
  c.save();const z=S.cam.z;
  const fs1=(lblSz||10)*z, fs2=(dscSz||8.5)*z;
  c.font=`bold ${fs1}px 'Malgun Gothic','Segoe UI',sans-serif`;
  const tw=Math.max(c.measureText(title).width, desc?c.measureText(desc).width:0);
  const lineH=fs1+fs2+4*z;
  const bw=tw+16*z, bh=desc?lineH+6*z:fs1+10*z;
  c.shadowColor='rgba(0,0,0,.18)';c.shadowBlur=6*z;c.shadowOffsetY=2*z;
  c.fillStyle=sel?'#dce8ff':'#fff';
  c.beginPath();c.roundRect(sx-bw/2,sy-bh/2,bw,bh,4*z);c.fill();
  c.shadowBlur=0;c.strokeStyle=sel?'#3b82f6':'#b8c4d0';c.lineWidth=sel?2:1;c.stroke();
  c.fillStyle=sel?'#3b82f6':'#7aaccc';
  c.fillRect(sx-bw/2+3*z,sy-bh/2+1.5*z,bw-6*z,2*z);
  c.fillStyle='#2a4050';c.textAlign='center';c.textBaseline='middle';
  c.fillText(title,sx,desc?sy-fs2*.6:sy);
  if(desc){c.fillStyle='#708050';c.font=`${fs2}px 'Malgun Gothic','Segoe UI',sans-serif`;c.fillText(desc,sx,sy+fs1*.5);}
  c.restore();
}

function drawNode(n,ts){
  const sp=nodeScr(n);
  const sel=isSel(n.id);
  const z=S.cam.z;
  const rot=(n.rot||0)*Math.PI/180;

  c.save();
  if(sel){c.shadowColor='rgba(59,130,246,.35)';c.shadowBlur=14;}

  // 회전 적용
  if(rot){c.translate(sp.x,sp.y);c.rotate(rot);c.translate(-sp.x,-sp.y);}

  switch(n.type){
    case'floor': drawFloorPlate(n); break;
    case'eq_grid':{
      const rows=n.rows||3,cols=n.cols||4,gap=18;
      for(let r=0;r<rows;r++)for(let cc=0;cc<cols;cc++){
        const wx=(cc-cols/2+.5)*gap;
        const wy=(r-rows/2+.5)*gap;
        const off=isoOff(wx,wy,z);
        drawBox(sp.x+off.x,sp.y+off.y,12,12,n.color||'#a8d4e8',n.border||'#5090a8',n.floorAlign,n.d);
      }
      break;}
    case'conveyor':{
      const len=(n.w||120)/2;
      // X축 방향 컨베이어 (사선 투영)
      const s1=isoOff(-len,0,z), s2=isoOff(len,0,z);
      c.strokeStyle=n.color||'#3b82f6';c.lineWidth=7*z;c.lineCap='round';c.globalAlpha=.22;
      c.beginPath();c.moveTo(sp.x+s1.x,sp.y+s1.y);c.lineTo(sp.x+s2.x,sp.y+s2.y);c.stroke();
      c.globalAlpha=1;
      if(S.anim){
        const ph=(ts%1600)/1600;
        const seg=Math.max(3,Math.floor(len*z/(7)));
        for(let i=0;i<seg;i++){
          const f=((i/seg)+ph)%1;
          const px=s1.x+(s2.x-s1.x)*f, py=s1.y+(s2.y-s1.y)*f;
          c.save();c.translate(sp.x+px,sp.y+py);
          c.fillStyle=`rgba(59,130,246,${Math.sin(f*Math.PI)*.55+.3})`;
          c.font=`bold ${12*z}px sans-serif`;c.textAlign='center';c.textBaseline='middle';
          c.fillText('›››',0,0);c.restore();
        }
      }
      break;}
    case'lift':{
      // 리프트: 사선 투영 평행사변형
      const hw=(n.w||28)/2, hh=(n.h||70)/2;
      const p0=isoOff(-hw,-hh,z),p1=isoOff(hw,-hh,z),p2=isoOff(hw,hh,z),p3=isoOff(-hw,hh,z);
      c.fillStyle='rgba(120,170,220,.12)';
      c.beginPath();c.moveTo(sp.x+p0.x,sp.y+p0.y);c.lineTo(sp.x+p1.x,sp.y+p1.y);c.lineTo(sp.x+p2.x,sp.y+p2.y);c.lineTo(sp.x+p3.x,sp.y+p3.y);c.closePath();c.fill();
      c.strokeStyle=n.border||'#6090b0';c.lineWidth=1.2;c.setLineDash([3*z,3*z]);
      c.beginPath();c.moveTo(sp.x+p0.x,sp.y+p0.y);c.lineTo(sp.x+p3.x,sp.y+p3.y);c.stroke();
      c.beginPath();c.moveTo(sp.x+p1.x,sp.y+p1.y);c.lineTo(sp.x+p2.x,sp.y+p2.y);c.stroke();
      c.setLineDash([]);
      // 수직 연결선
      const topC=isoOff(0,-hh,z), botC=isoOff(0,hh,z);
      c.strokeStyle='rgba(100,160,220,.3)';c.lineWidth=2*z;
      c.beginPath();c.moveTo(sp.x+topC.x,sp.y+topC.y);c.lineTo(sp.x+topC.x,sp.y+topC.y-40*z);c.stroke();
      c.beginPath();c.moveTo(sp.x+botC.x,sp.y+botC.y);c.lineTo(sp.x+botC.x,sp.y+botC.y+40*z);c.stroke();
      if(S.anim){
        const t=(ts%2500)/2500;
        const animOff=isoOff(0,-hh+(n.h||70)*t,z);
        drawCube(sp.x+animOff.x,sp.y+animOff.y,6,'#a8d8ea','#78c0da','#58a8c8','#5090a8');
      }
      break;}
    case'hub':{
      // 허브: 사선 투영 평행사변형
      const hw=(n.w||60)/2, hh=(n.h||45)/2;
      const p0=isoOff(-hw,-hh,z),p1=isoOff(hw,-hh,z),p2=isoOff(hw,hh,z),p3=isoOff(-hw,hh,z);
      c.beginPath();c.moveTo(sp.x+p0.x,sp.y+p0.y);c.lineTo(sp.x+p1.x,sp.y+p1.y);c.lineTo(sp.x+p2.x,sp.y+p2.y);c.lineTo(sp.x+p3.x,sp.y+p3.y);c.closePath();
      c.fillStyle='rgba(234,179,8,.1)';c.fill();
      c.strokeStyle='#eab308';c.lineWidth=2;c.stroke();
      if(S.anim){
        const pulse=Math.sin(ts/400)*.15+.25;
        c.beginPath();c.arc(sp.x,sp.y,Math.min(hw,hh)*z*.5,0,Math.PI*2);
        c.fillStyle=`rgba(234,179,8,${pulse})`;c.fill();
      }else{
        c.beginPath();c.arc(sp.x,sp.y,Math.min(hw,hh)*z*.4,0,Math.PI*2);
        c.fillStyle='rgba(234,179,8,.2)';c.fill();
      }
      break;}
    case'stocker':{
      drawBox(sp.x,sp.y,n.w||35,n.h||45,n.color||'#88d4a8',n.border||'#50a078',n.floorAlign,n.d);
      break;}
    case'zone':{
      // 구역: 사선 투영 평행사변형 (점선)
      const hw=(n.w||130)/2, hh=(n.h||90)/2;
      const p0=isoOff(-hw,-hh,z),p1=isoOff(hw,-hh,z),p2=isoOff(hw,hh,z),p3=isoOff(-hw,hh,z);
      c.setLineDash([5*z,4*z]);
      c.strokeStyle=n.color||'#f97316';c.lineWidth=1.8;
      c.beginPath();c.moveTo(sp.x+p0.x,sp.y+p0.y);c.lineTo(sp.x+p1.x,sp.y+p1.y);c.lineTo(sp.x+p2.x,sp.y+p2.y);c.lineTo(sp.x+p3.x,sp.y+p3.y);c.closePath();c.stroke();
      c.setLineDash([]);c.globalAlpha=.05;c.fillStyle=n.color||'#f97316';c.fill();c.globalAlpha=1;
      break;}
    case'bridge':{
      // 브릿지: Y축(깊이) 방향 (사선 투영)
      const hh=(n.h||120)/2;
      const btop=isoOff(0,-hh,z), bbot=isoOff(0,hh,z);
      c.strokeStyle=n.color||'#818cf8';c.lineWidth=6*z;c.lineCap='round';c.globalAlpha=.2;
      c.beginPath();c.moveTo(sp.x+btop.x,sp.y+btop.y);c.lineTo(sp.x+bbot.x,sp.y+bbot.y);c.stroke();
      c.globalAlpha=.6;c.lineWidth=3*z;
      c.beginPath();c.moveTo(sp.x+btop.x,sp.y+btop.y);c.lineTo(sp.x+bbot.x,sp.y+bbot.y);c.stroke();
      c.globalAlpha=1;
      for(let i=0;i<3;i++){
        const f=(i+1)/4;
        const mx=btop.x+(bbot.x-btop.x)*f, my=btop.y+(bbot.y-btop.y)*f;
        c.fillStyle=n.color||'#818cf8';c.globalAlpha=.5;
        c.beginPath();c.moveTo(sp.x+mx-5*z,sp.y+my+4*z);c.lineTo(sp.x+mx,sp.y+my-4*z);c.lineTo(sp.x+mx+5*z,sp.y+my+4*z);c.closePath();c.fill();
      }
      c.globalAlpha=1;
      if(S.anim){
        const t=(ts%2000)/2000;
        const ax=bbot.x+(btop.x-bbot.x)*t, ay=bbot.y+(btop.y-bbot.y)*t;
        drawCube(sp.x+ax,sp.y+ay,5,'#c8b8f8','#a898e8','#8878d8','#6858b8');
      }
      break;}
    case'tunnel':{
      // 배관/호스형 터널: waypoint 기반 파이프
      const pts=n.points||[{x:0,y:0},{x:60,y:0},{x:60,y:-60},{x:120,y:-60}];
      const col=n.color||'#4a90d0';
      const brd=n.border||'#2a6ab0';
      const pw=(n.pipeW||8); // 파이프 두께
      // 화면 좌표 변환
      const spts=pts.map(p=>{ const o=isoOff(p.x,p.y,z); return{x:sp.x+o.x, y:sp.y+o.y}; });
      if(spts.length<2)break;
      // 그림자
      c.globalAlpha=.12;c.strokeStyle=col;c.lineWidth=(pw+6)*z;c.lineCap='round';c.lineJoin='round';
      c.beginPath();c.moveTo(spts[0].x,spts[0].y);
      for(let i=1;i<spts.length;i++)c.lineTo(spts[i].x,spts[i].y);
      c.stroke();
      // 파이프 외곽 (어두운색)
      c.globalAlpha=.85;c.strokeStyle=dk(col,.55);c.lineWidth=(pw+3)*z;
      c.beginPath();c.moveTo(spts[0].x,spts[0].y);
      for(let i=1;i<spts.length;i++)c.lineTo(spts[i].x,spts[i].y);
      c.stroke();
      // 파이프 본체
      c.strokeStyle=col;c.lineWidth=pw*z;
      c.beginPath();c.moveTo(spts[0].x,spts[0].y);
      for(let i=1;i<spts.length;i++)c.lineTo(spts[i].x,spts[i].y);
      c.stroke();
      // 파이프 하이라이트 (밝은 중앙선)
      c.strokeStyle=lt(col,.4);c.lineWidth=Math.max(1.5,pw*.35)*z;c.globalAlpha=.5;
      c.beginPath();c.moveTo(spts[0].x,spts[0].y-1.5*z);
      for(let i=1;i<spts.length;i++)c.lineTo(spts[i].x,spts[i].y-1.5*z);
      c.stroke();
      c.globalAlpha=1;
      // 관절 (꼭짓점 원형 조인트)
      spts.forEach((p,i)=>{
        c.beginPath();c.arc(p.x,p.y,(pw*.65)*z,0,Math.PI*2);
        c.fillStyle=col;c.fill();c.strokeStyle=dk(col,.5);c.lineWidth=1.5;c.stroke();
      });
      // 끝단 마감 (원형)
      [spts[0],spts[spts.length-1]].forEach(p=>{
        c.beginPath();c.arc(p.x,p.y,(pw*.5)*z,0,Math.PI*2);
        c.fillStyle=lt(col,.25);c.fill();
      });
      // 편집모드: 꼭짓점 핸들 표시
      if(sel){
        spts.forEach((p,i)=>{
          c.beginPath();c.arc(p.x,p.y,5,0,Math.PI*2);
          c.fillStyle=S._tunPtIdx===i?'#ef4444':'#fff';c.fill();
          c.strokeStyle='#3b82f6';c.lineWidth=2;c.stroke();
          c.fillStyle='#3b82f6';c.font='bold 8px sans-serif';c.textAlign='center';c.textBaseline='middle';
          c.fillText(i+'',p.x,p.y-12);
        });
      }
      // 이동 애니메이션 (점이 경로를 따라 이동)
      if(S.anim){
        // 총 경로 길이 계산
        let totalLen=0;const segs=[];
        for(let i=1;i<spts.length;i++){
          const dx=spts[i].x-spts[i-1].x, dy=spts[i].y-spts[i-1].y;
          const segLen=Math.sqrt(dx*dx+dy*dy);segs.push(segLen);totalLen+=segLen;
        }
        if(totalLen>0){
          const dotCount=Math.max(2,Math.floor(totalLen/(20*z)));
          const ph=(ts%3000)/3000;
          for(let d=0;d<dotCount;d++){
            let f=((d/dotCount)+ph)%1;
            let dist=f*totalLen, acc=0, px=spts[0].x, py=spts[0].y;
            for(let i=0;i<segs.length;i++){
              if(acc+segs[i]>=dist){
                const t2=(dist-acc)/segs[i];
                px=spts[i].x+(spts[i+1].x-spts[i].x)*t2;
                py=spts[i].y+(spts[i+1].y-spts[i].y)*t2;
                break;
              }
              acc+=segs[i];
            }
            c.globalAlpha=Math.sin(f*Math.PI)*.7+.3;
            c.beginPath();c.arc(px,py,2.5*z,0,Math.PI*2);
            c.fillStyle='#fff';c.fill();
          }
          c.globalAlpha=1;
        }
      }
      break;}
    case'port':{
      c.save();
      c.globalAlpha=n.portOpacity!=null?n.portOpacity:0.8;
      drawBox(sp.x,sp.y,n.w||20,n.h||20,n.color||'#22c55e',n.border||'#16a34a',n.floorAlign,n.d);
      c.restore();
      break;}
    case'label':break;
    default:{
      drawBox(sp.x,sp.y,n.w||30,n.h||30,n.color||'#a78bfa',n.border||'#7c5cbf',n.floorAlign,n.d);
    }
  }

  // 선택 표시 + 리사이즈 핸들 + 회전 핸들
  if(sel){
    const bw=(n.w||40)*z+14,bh=(n.h||30)*z+14;
    c.strokeStyle='#3b82f6';c.lineWidth=1.8;c.setLineDash([4,3]);
    c.beginPath();c.roundRect(sp.x-bw/2,sp.y-bh/2,bw,bh,5);c.stroke();
    c.setLineDash([]);
    // 8개 핸들: 모서리 4개 + 변 중간 4개
    const HS=5;
    const handles=[
      {x:sp.x-bw/2, y:sp.y-bh/2}, // tl
      {x:sp.x,      y:sp.y-bh/2}, // t
      {x:sp.x+bw/2, y:sp.y-bh/2}, // tr
      {x:sp.x+bw/2, y:sp.y},       // r
      {x:sp.x+bw/2, y:sp.y+bh/2}, // br
      {x:sp.x,      y:sp.y+bh/2}, // b
      {x:sp.x-bw/2, y:sp.y+bh/2}, // bl
      {x:sp.x-bw/2, y:sp.y},       // l
    ];
    handles.forEach((h,i)=>{
      c.fillStyle= i%2===0 ? '#3b82f6' : '#60a5fa';
      c.fillRect(h.x-HS,h.y-HS,HS*2,HS*2);
      c.strokeStyle='#fff';c.lineWidth=1;
      c.strokeRect(h.x-HS,h.y-HS,HS*2,HS*2);
    });
    // 회전 핸들 (상단 위 원형)
    const rotY=sp.y-bh/2-22*z;
    c.strokeStyle='#22c55e';c.lineWidth=1.5;c.setLineDash([3,2]);
    c.beginPath();c.moveTo(sp.x,sp.y-bh/2);c.lineTo(sp.x,rotY);c.stroke();
    c.setLineDash([]);
    c.beginPath();c.arc(sp.x,rotY,6,0,Math.PI*2);
    c.fillStyle='#22c55e';c.fill();c.strokeStyle='#fff';c.lineWidth=1.5;c.stroke();
    // 회전 아이콘
    c.fillStyle='#fff';c.font=`bold ${8}px sans-serif`;c.textAlign='center';c.textBaseline='middle';
    c.fillText('↻',sp.x,rotY);
    // 현재 각도 표시
    if(n.rot){
      c.fillStyle='#22c55e';c.font=`bold ${9*z}px 'Malgun Gothic',sans-serif`;c.textAlign='center';
      c.fillText(Math.round(n.rot)+'°',sp.x+bw/2+16*z,sp.y-bh/2);
    }
  }
  c.restore();

  // 노드 라벨 (labelOffX/Y로 오프셋 이동 가능)
  const lox=(n.labelOffX||0)*z, loy=(n.labelOffY||0)*z;
  if(n.label&&n.type!=='label'){
    const ly=sp.y-(n.type==='eq_grid'?(n.rows||3)*6*z:(n.h||30)*.45*z)-18*z;
    drawLabel(sp.x+lox,ly+loy,n.label,n.desc||'',sel,n.labelSize,n.descSize);
  }
  if(n.type==='label'&&n.label){
    drawLabel(sp.x+lox,sp.y+loy,n.label,n.desc||'',sel,n.labelSize,n.descSize);
  }
}

function drawConn(conn,ts){
  const nF=S.nodes.find(n=>n.id===conn.from);
  const nT=S.nodes.find(n=>n.id===conn.to);
  if(!nF||!nT)return;
  const s1=nodeScr(nF),s2=nodeScr(nT);
  const sel=conn===S.selC;
  const col=conn.color||'#3b82f6';
  const lw=(conn.width||3)*S.cam.z;

  c.save();
  // 그림자
  c.strokeStyle=col;c.lineWidth=lw+4*S.cam.z;c.globalAlpha=.1;c.lineCap='round';
  c.beginPath();c.moveTo(s1.x,s1.y);c.lineTo(s2.x,s2.y);c.stroke();

  // 본선
  c.globalAlpha=sel?1:.78;c.lineWidth=sel?lw+2:lw;
  if(sel)c.strokeStyle='#60a5fa';
  if(conn.dashed)c.setLineDash([7*S.cam.z,5*S.cam.z]);
  c.beginPath();c.moveTo(s1.x,s1.y);c.lineTo(s2.x,s2.y);c.stroke();
  c.setLineDash([]);

  // 화살표
  const ang=Math.atan2(s2.y-s1.y,s2.x-s1.x);
  const as=10*S.cam.z;
  c.fillStyle=col;c.globalAlpha=.85;
  c.beginPath();c.moveTo(s2.x,s2.y);
  c.lineTo(s2.x-as*Math.cos(ang-.5),s2.y-as*Math.sin(ang-.5));
  c.lineTo(s2.x-as*Math.cos(ang+.5),s2.y-as*Math.sin(ang+.5));c.closePath();c.fill();

  // 움직이는 점
  if(S.anim){
    const t=(ts%2800)/2800;
    const px=s1.x+(s2.x-s1.x)*t,py=s1.y+(s2.y-s1.y)*t;
    c.globalAlpha=1;
    c.beginPath();c.arc(px,py,4*S.cam.z,0,Math.PI*2);
    c.fillStyle='#fff';c.fill();c.strokeStyle=col;c.lineWidth=2*S.cam.z;c.stroke();
  }

  // 라벨
  if(conn.label){
    const mx2=(s1.x+s2.x)/2, my2=(s1.y+s2.y)/2;
    c.font=`bold ${8.5*S.cam.z}px 'Malgun Gothic','Segoe UI',sans-serif`;
    const tw=c.measureText(conn.label).width+8*S.cam.z;
    c.globalAlpha=.92;c.fillStyle='#fff';
    c.beginPath();c.roundRect(mx2-tw/2,my2-7*S.cam.z,tw,14*S.cam.z,3*S.cam.z);c.fill();
    c.strokeStyle=col;c.lineWidth=1;c.stroke();
    c.fillStyle=col;c.textAlign='center';c.textBaseline='middle';c.fillText(conn.label,mx2,my2);
  }
  c.restore();
}

function drawTempConn(){
  if(S.tool!=='connect'||!S.cFrom)return;
  const nF=S.nodes.find(n=>n.id===S.cFrom);if(!nF)return;
  const sp=nodeScr(nF);
  c.save();c.strokeStyle='#60a5fa';c.lineWidth=2;c.setLineDash([5,4]);c.globalAlpha=.55;
  c.beginPath();c.moveTo(sp.x,sp.y);c.lineTo(S._mx,S._my);c.stroke();
  c.setLineDash([]);c.restore();
}

// ══════════════════════════════════════════════
// 렌더 루프
// ══════════════════════════════════════════════
function render(ts){
  c.clearRect(0,0,W,H);
  c.fillStyle=S.bgColor||'#0c1017';c.fillRect(0,0,W,H);
  drawGrid();

  // 연결선
  S.conns.forEach(cn=>drawConn(cn,ts));
  drawTempConn();

  // 노드 (floor 먼저, 나머지 나중에)
  const floors=S.nodes.filter(n=>n.type==='floor');
  const others=S.nodes.filter(n=>n.type!=='floor');
  const sorted=[...floors,...others.sort((a,b)=>(a.y+a.x)-(b.y+b.x))];
  sorted.forEach(n=>drawNode(n,ts));

  // 드래그 선택 박스
  if(S._selBox){
    const b=S._selBox;
    const bx=Math.min(b.x1,b.x2),by=Math.min(b.y1,b.y2);
    const bw=Math.abs(b.x2-b.x1),bh=Math.abs(b.y2-b.y1);
    c.save();c.strokeStyle='#3b82f6';c.lineWidth=1.5;c.setLineDash([5,3]);
    c.fillStyle='rgba(59,130,246,.08)';
    c.beginPath();c.rect(bx,by,bw,bh);c.fill();c.stroke();
    c.setLineDash([]);c.restore();
  }

  // 다중 선택 개수 표시
  if(S.sels.length>1){
    c.save();c.fillStyle='rgba(59,130,246,.85)';c.font='bold 12px Malgun Gothic,sans-serif';
    c.textAlign='left';c.textBaseline='top';
    c.fillText(`${S.sels.length}개 선택됨`,10,10);c.restore();
  }

  // 미니맵
  drawMinimap();
  requestAnimationFrame(render);
}

let _mmT={sc:1,ox:0,oy:0}; // 미니맵 변환 저장
function drawMinimap(){
  mc.fillStyle='#151b28';mc.fillRect(0,0,160,100);
  if(!S.nodes.length)return;
  // 바운딩 계산
  let mx=Infinity,MX=-Infinity,my=Infinity,MY=-Infinity;
  S.nodes.forEach(n=>{
    const p=isoWorld(n.x,n.y);
    const hw=(n.w||40)/2+20, hh=(n.h||30)/2+20;
    mx=Math.min(mx,p.sx-hw);MX=Math.max(MX,p.sx+hw);
    my=Math.min(my,p.sy-hh);MY=Math.max(MY,p.sy+hh);
  });
  const rng=Math.max(MX-mx,MY-my,300);
  const sc=120/rng,ox=80-(mx+MX)/2*sc,oy=50-(my+MY)/2*sc;
  _mmT={sc,ox,oy};
  function mIso(wx,wy){const p=isoWorld(wx,wy);return{x:p.sx*sc+ox,y:p.sy*sc+oy};}
  function mOff(wx,wy){return{x:(wx+wy*OBL_COS*OBL_D)*sc,y:(wy*OBL_SIN*OBL_D)*sc};}
  // 연결선
  mc.save();mc.globalAlpha=.4;mc.strokeStyle='#3b82f6';mc.lineWidth=1;
  S.conns.forEach(cn=>{
    const nF=S.nodes.find(x=>x.id===cn.from),nT=S.nodes.find(x=>x.id===cn.to);
    if(!nF||!nT)return;
    const s1=mIso(nF.x,nF.y),s2=mIso(nT.x,nT.y);
    mc.beginPath();mc.moveTo(s1.x,s1.y);mc.lineTo(s2.x,s2.y);mc.stroke();
  });
  mc.restore();
  // 바닥판 먼저
  S.nodes.filter(n=>n.type==='floor').forEach(n=>{
    const sp=mIso(n.x,n.y);
    const hw=(n.w||200)/2,hh=(n.h||80)/2;
    const p0=mOff(-hw,-hh),p1=mOff(hw,-hh),p2=mOff(hw,hh),p3=mOff(-hw,hh);
    mc.globalAlpha=.25;mc.fillStyle=n.color||'#c8dca8';
    mc.beginPath();mc.moveTo(sp.x+p0.x,sp.y+p0.y);mc.lineTo(sp.x+p1.x,sp.y+p1.y);
    mc.lineTo(sp.x+p2.x,sp.y+p2.y);mc.lineTo(sp.x+p3.x,sp.y+p3.y);mc.closePath();mc.fill();
    mc.globalAlpha=.4;mc.strokeStyle=n.border||'#90b060';mc.lineWidth=.5;mc.stroke();
  });
  // 나머지 노드
  S.nodes.filter(n=>n.type!=='floor').sort((a,b)=>(a.y+a.x)-(b.y+b.x)).forEach(n=>{
    const sp=mIso(n.x,n.y);
    mc.globalAlpha=.8;
    if(n.type==='tunnel'&&n.points){
      // 터널: 경로 그리기
      const spts=n.points.map(p=>{const o=mOff(p.x,p.y);return{x:sp.x+o.x,y:sp.y+o.y};});
      if(spts.length>=2){
        mc.strokeStyle=n.color||'#4a90d0';mc.lineWidth=Math.max(1.5,(n.pipeW||8)*sc*.5);mc.lineCap='round';mc.lineJoin='round';
        mc.beginPath();mc.moveTo(spts[0].x,spts[0].y);
        for(let i=1;i<spts.length;i++)mc.lineTo(spts[i].x,spts[i].y);
        mc.stroke();
      }
    }else if(n.type==='conveyor'){
      const len=(n.w||120)/2;
      const s1=mOff(-len,0),s2=mOff(len,0);
      mc.strokeStyle=n.color||'#3b82f6';mc.lineWidth=1.5;mc.lineCap='round';
      mc.beginPath();mc.moveTo(sp.x+s1.x,sp.y+s1.y);mc.lineTo(sp.x+s2.x,sp.y+s2.y);mc.stroke();
    }else if(n.type==='bridge'){
      const hh=(n.h||120)/2;
      const bt=mOff(0,-hh),bb=mOff(0,hh);
      mc.strokeStyle=n.color||'#818cf8';mc.lineWidth=1.5;mc.lineCap='round';
      mc.beginPath();mc.moveTo(sp.x+bt.x,sp.y+bt.y);mc.lineTo(sp.x+bb.x,sp.y+bb.y);mc.stroke();
    }else if(n.type==='zone'){
      const hw=(n.w||130)/2,hh=(n.h||90)/2;
      const p0=mOff(-hw,-hh),p1=mOff(hw,-hh),p2=mOff(hw,hh),p3=mOff(-hw,hh);
      mc.strokeStyle=n.color||'#f97316';mc.lineWidth=.7;mc.setLineDash([2,2]);
      mc.beginPath();mc.moveTo(sp.x+p0.x,sp.y+p0.y);mc.lineTo(sp.x+p1.x,sp.y+p1.y);
      mc.lineTo(sp.x+p2.x,sp.y+p2.y);mc.lineTo(sp.x+p3.x,sp.y+p3.y);mc.closePath();mc.stroke();
      mc.setLineDash([]);
    }else if(n.type==='eq_grid'){
      const rows=n.rows||3,cols=n.cols||4,gap=18;
      mc.fillStyle=n.color||'#a8d4e8';
      for(let r=0;r<rows;r++)for(let cc=0;cc<cols;cc++){
        const o=mOff((cc-cols/2+.5)*gap,(r-rows/2+.5)*gap);
        mc.beginPath();mc.arc(sp.x+o.x,sp.y+o.y,1.5,0,Math.PI*2);mc.fill();
      }
    }else if(n.type==='hub'){
      const hw=(n.w||60)/2,hh=(n.h||45)/2;
      const p0=mOff(-hw,-hh),p1=mOff(hw,-hh),p2=mOff(hw,hh),p3=mOff(-hw,hh);
      mc.strokeStyle='#eab308';mc.lineWidth=.7;
      mc.beginPath();mc.moveTo(sp.x+p0.x,sp.y+p0.y);mc.lineTo(sp.x+p1.x,sp.y+p1.y);
      mc.lineTo(sp.x+p2.x,sp.y+p2.y);mc.lineTo(sp.x+p3.x,sp.y+p3.y);mc.closePath();mc.stroke();
      mc.fillStyle='rgba(234,179,8,.3)';mc.beginPath();mc.arc(sp.x,sp.y,2,0,Math.PI*2);mc.fill();
    }else if(n.type==='lift'){
      const hw=(n.w||28)/2,hh=(n.h||70)/2;
      const p0=mOff(-hw,-hh),p1=mOff(hw,-hh),p2=mOff(hw,hh),p3=mOff(-hw,hh);
      mc.strokeStyle=n.border||'#6090b0';mc.lineWidth=.5;mc.setLineDash([1,1]);
      mc.beginPath();mc.moveTo(sp.x+p0.x,sp.y+p0.y);mc.lineTo(sp.x+p1.x,sp.y+p1.y);
      mc.lineTo(sp.x+p2.x,sp.y+p2.y);mc.lineTo(sp.x+p3.x,sp.y+p3.y);mc.closePath();mc.stroke();
      mc.setLineDash([]);
    }else if(n.type!=='label'){
      mc.fillStyle=isSel(n.id)?'#3b82f6':(n.color||'#666');
      mc.beginPath();mc.arc(sp.x,sp.y,2.5,0,Math.PI*2);mc.fill();
    }
  });
  mc.globalAlpha=1;
  // 현재 뷰포트 표시
  const vx1=fromScr(0,0),vx2=fromScr(W,H);
  const vs1={x:vx1.x*sc+ox,y:vx1.y*sc+oy},vs2={x:vx2.x*sc+ox,y:vx2.y*sc+oy};
  mc.strokeStyle='rgba(255,255,255,.35)';mc.lineWidth=1;
  mc.strokeRect(vs1.x,vs1.y,vs2.x-vs1.x,vs2.y-vs1.y);
}

// ══════════════════════════════════════════════
// HIT TEST
// ══════════════════════════════════════════════
function hitNode(sx,sy){
  const sorted=[...S.nodes].sort((a,b)=>((b.y+b.x)-(a.y+a.x)));
  // floor는 맨 뒤
  const floors=sorted.filter(n=>n.type==='floor');
  const others=sorted.filter(n=>n.type!=='floor');
  for(const n of others){
    const sp=nodeScr(n);
    const hw=Math.max(n.w||40,30)*S.cam.z/2+20;
    const hh=Math.max(n.h||30,20)*S.cam.z/2+20;
    if(sx>=sp.x-hw&&sx<=sp.x+hw&&sy>=sp.y-hh-20*S.cam.z&&sy<=sp.y+hh)return n;
  }
  for(const n of floors){
    const sp=nodeScr(n);
    const hw=(n.w||200)*S.cam.z/2+12;
    const hh=(n.h||80)*S.cam.z/2+12;
    if(sx>=sp.x-hw&&sx<=sp.x+hw&&sy>=sp.y-hh&&sy<=sp.y+hh)return n;
  }
  return null;
}
function hitConn(sx,sy){
  for(const cn of S.conns){
    const nF=S.nodes.find(n=>n.id===cn.from),nT=S.nodes.find(n=>n.id===cn.to);
    if(!nF||!nT)continue;
    const s1=nodeScr(nF),s2=nodeScr(nT);
    const dx=s2.x-s1.x,dy=s2.y-s1.y,len=Math.sqrt(dx*dx+dy*dy);
    if(len<1)continue;
    const t=Math.max(0,Math.min(1,((sx-s1.x)*dx+(sy-s1.y)*dy)/(len*len)));
    const px=s1.x+t*dx,py=s1.y+t*dy;
    if(Math.sqrt((sx-px)**2+(sy-py)**2)<12)return cn;
  }
  return null;
}

// ══════════════════════════════════════════════
// 회전 핸들 히트 테스트
// ══════════════════════════════════════════════
function hitRotHandle(sx,sy){
  if(!S.sel)return false;
  const n=S.nodes.find(x=>x.id===S.sel);
  if(!n)return false;
  const sp=nodeScr(n);
  const z=S.cam.z;
  const bh=(n.h||30)*z+14;
  const rot=(n.rot||0)*Math.PI/180;
  // 회전 핸들 위치 (회전된 좌표계)
  let rhx=sp.x, rhy=sp.y-bh/2-22*z;
  if(rot){
    const dx=rhx-sp.x, dy=rhy-sp.y;
    rhx=sp.x+dx*Math.cos(rot)-dy*Math.sin(rot);
    rhy=sp.y+dx*Math.sin(rot)+dy*Math.cos(rot);
  }
  return Math.sqrt((sx-rhx)**2+(sy-rhy)**2)<=10;
}

// ══════════════════════════════════════════════
// 리사이즈 핸들 히트 테스트
// ══════════════════════════════════════════════
// 핸들: 0=tl, 1=t, 2=tr, 3=r, 4=br, 5=b, 6=bl, 7=l
const HANDLE_NAMES=['tl','t','tr','r','br','b','bl','l'];
const HANDLE_CURSORS=['nwse-resize','ns-resize','nesw-resize','ew-resize','nwse-resize','ns-resize','nesw-resize','ew-resize'];

function hitHandle(sx,sy){
  if(!S.sel)return null;
  const n=S.nodes.find(x=>x.id===S.sel);
  if(!n)return null;
  const sp=nodeScr(n);
  const z=S.cam.z;
  const bw=(n.w||40)*z+14, bh=(n.h||30)*z+14;
  const HS=7; // 약간 넓은 히트 영역
  const handles=[
    {x:sp.x-bw/2, y:sp.y-bh/2},
    {x:sp.x,      y:sp.y-bh/2},
    {x:sp.x+bw/2, y:sp.y-bh/2},
    {x:sp.x+bw/2, y:sp.y},
    {x:sp.x+bw/2, y:sp.y+bh/2},
    {x:sp.x,      y:sp.y+bh/2},
    {x:sp.x-bw/2, y:sp.y+bh/2},
    {x:sp.x-bw/2, y:sp.y},
  ];
  for(let i=0;i<handles.length;i++){
    const h=handles[i];
    if(Math.abs(sx-h.x)<=HS && Math.abs(sy-h.y)<=HS){
      return {index:i, name:HANDLE_NAMES[i], cursor:HANDLE_CURSORS[i]};
    }
  }
  return null;
}

// ══════════════════════════════════════════════
// 터널 꼭짓점 히트 테스트 & 드래그
// ══════════════════════════════════════════════
function hitTunPt(sx,sy){
  if(!S.sel)return null;
  const n=S.nodes.find(x=>x.id===S.sel);
  if(!n||n.type!=='tunnel'||!n.points)return null;
  const sp=nodeScr(n);const z=S.cam.z;
  for(let i=0;i<n.points.length;i++){
    const o=isoOff(n.points[i].x,n.points[i].y,z);
    const px=sp.x+o.x, py=sp.y+o.y;
    if(Math.sqrt((sx-px)**2+(sy-py)**2)<=8)return{node:n,idx:i};
  }
  return null;
}

// ══════════════════════════════════════════════
// 인라인 편집 (더블클릭)
// ══════════════════════════════════════════════
let inlineEl=null;
function showInlineEdit(n, sx, sy){
  hideInlineEdit();
  const div=document.createElement('div');
  div.className='inline-edit';
  div.style.left=(sx-110)+'px';
  div.style.top=(sy-10)+'px';
  div.innerHTML=`
    <label>이름</label>
    <div style="display:flex;gap:4px;">
      <input id="ie-label" value="${(n.label||'').replace(/"/g,'&quot;')}" placeholder="이름 입력..." style="flex:1"/>
      <input id="ie-ls" type="number" value="${n.labelSize||10}" min="5" max="40" step="0.5" style="width:50px" title="이름 크기"/>
    </div>
    <label>설명</label>
    <div style="display:flex;gap:4px;">
      <input id="ie-desc" value="${(n.desc||'').replace(/"/g,'&quot;')}" placeholder="설명 입력..." style="flex:1"/>
      <input id="ie-ds" type="number" value="${n.descSize||8.5}" min="4" max="30" step="0.5" style="width:50px" title="설명 크기"/>
    </div>
    <div class="ie-btns">
      <button class="ie-cancel" id="ie-c">취소</button>
      <button class="ie-ok" id="ie-o">확인</button>
    </div>`;
  ca.appendChild(div);
  inlineEl=div;
  const labelInput=div.querySelector('#ie-label');
  labelInput.focus();
  labelInput.select();

  const apply=()=>{
    push();
    n.label=div.querySelector('#ie-label').value;
    n.desc=div.querySelector('#ie-desc').value;
    n.labelSize=parseFloat(div.querySelector('#ie-ls').value)||10;
    n.descSize=parseFloat(div.querySelector('#ie-ds').value)||8.5;
    hideInlineEdit();
    updProp();
  };
  div.querySelector('#ie-o').onclick=apply;
  div.querySelector('#ie-c').onclick=()=>hideInlineEdit();
  div.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      e.stopPropagation();
      if(e.key==='Enter')apply();
      if(e.key==='Escape')hideInlineEdit();
    });
  });
}
function hideInlineEdit(){
  if(inlineEl){inlineEl.remove();inlineEl=null;}
}

// ══════════════════════════════════════════════
// 상호작용
// ══════════════════════════════════════════════
let _lm={x:0,y:0};

ca.addEventListener('mousedown',e=>{
  if(e.target.closest('.inline-edit'))return;
  const p=getPos(e);const sx=p.x,sy=p.y;_lm={x:sx,y:sy};
  if(e.button===2)return;
  if(S.tool==='pan'||e.button===1||e.altKey){
    S._pan=true;S._ps={x:sx-S.cam.x,y:sy-S.cam.y};ca.classList.add('drag');return;
  }
  if(S.tool==='connect'){
    const h=hitNode(sx,sy);
    if(h){
      if(!S.cFrom){S.cFrom=h.id;stat(`"${h.label||h.id}"에서 연결 시작. 도착 노드를 클릭하세요.`);}
      else if(h.id!==S.cFrom){
        push();S.conns.push({id:gid(),from:S.cFrom,to:h.id,color:'#3b82f6',width:3,dashed:false,label:''});
        S.cFrom=null;stat('연결 완료');cnts();
      }
    }
    return;
  }
  // 터널 꼭짓점 드래그
  if(S.sel&&S.sels.length<=1){
    const tp=hitTunPt(sx,sy);
    if(tp){push();S._tunDrag={node:tp.node,idx:tp.idx};S._tunPtIdx=tp.idx;ca.style.cursor='move';stat(`터널 꼭짓점 ${tp.idx} 드래그`);return;}
  }
  // 회전 핸들 (단일 선택만)
  if(S.sel&&S.sels.length<=1&&hitRotHandle(sx,sy)){
    const n=S.nodes.find(x=>x.id===S.sel);
    if(n){
      push();const sp=nodeScr(n);
      S._rotating={node:n, startAngle:Math.atan2(sy-sp.y,sx-sp.x), origRot:n.rot||0};
      ca.style.cursor='crosshair';stat('회전 중...');return;
    }
  }
  // 리사이즈 핸들 (단일 선택만)
  if(S.sel&&S.sels.length<=1){
    const hh=hitHandle(sx,sy);
    if(hh){
      const n=S.nodes.find(x=>x.id===S.sel);
      if(n){push();S._resizing={node:n,handle:hh.name,startSx:sx,startSy:sy,origW:n.w||40,origH:n.h||30,origX:n.x,origY:n.y};
        ca.style.cursor=hh.cursor;stat(`크기 조절 중 (${hh.name})`);return;}
    }
  }
  const hn=hitNode(sx,sy);
  if(hn){
    // Shift+드래그: 무조건 라벨 이동
    if(e.shiftKey){
      e.preventDefault();
      S.sel=hn.id;S.sels=[hn.id];S.selC=null;
      S._labelDrag={node:hn,startSx:sx,startSy:sy,origLX:hn.labelOffX||0,origLY:hn.labelOffY||0};
      ca.style.cursor='grab';updProp();
      stat('라벨 이동');return;
    }
    // 이미 다중선택된 노드를 클릭 → 전체 드래그 시작
    if(S.sels.length>1&&isSel(hn.id)){
      S._dn=hn;S._drag=false;
      const sp=nodeScr(hn);S._do={x:sx-sp.x,y:sy-sp.y};
      // 다중 드래그: 각 노드의 상대 오프셋 저장
      S._multiDrag={offsets:allSel().map(id=>{const nd=S.nodes.find(x=>x.id===id);return{id,ox:nd.x-hn.x,oy:nd.y-hn.y};})};
      ca.style.cursor='move';updProp();return;
    }
    // 일반 클릭: 단일 선택 + 드래그 준비
    S.sel=hn.id;S.sels=[hn.id];S.selC=null;S._dn=hn;
    const sp=nodeScr(hn);S._do={x:sx-sp.x,y:sy-sp.y};S._drag=false;
    S._multiDrag=null;
    ca.style.cursor='move';updProp();return;
  }
  const hc=hitConn(sx,sy);
  if(hc){clearSel();S.selC=hc;updProp();return;}
  // 빈 공간 클릭 → 선택 박스 드래그 시작 (Shift 없으면 선택 해제)
  if(!e.shiftKey)clearSel();
  S.selC=null;S._selBox={x1:sx,y1:sy,x2:sx,y2:sy};updProp();
});

ca.addEventListener('mousemove',e=>{
  const p=getPos(e);const sx=p.x,sy=p.y;S._mx=sx;S._my=sy;
  document.getElementById('mpos').textContent=`${sx|0}, ${sy|0}`;
  // Shift 누르면 항상 grab 커서
  if(e.shiftKey&&!S._labelDrag&&!S._pan){ca.style.cursor='grab';}
  else if(!S._labelDrag&&!S._pan&&!S._dn&&!S._resizing&&!S._rotating&&!S._tunDrag){ca.style.cursor='';}
  if(S._pan){S.cam.x=sx-S._ps.x;S.cam.y=sy-S._ps.y;return;}

  // 라벨 드래그 중
  if(S._labelDrag){
    e.preventDefault();
    const ld=S._labelDrag;
    ld.node.labelOffX=ld.origLX+(sx-ld.startSx)/S.cam.z;
    ld.node.labelOffY=ld.origLY+(sy-ld.startSy)/S.cam.z;
    return;
  }

  // 회전 중
  if(S._rotating){
    const r=S._rotating;const sp=nodeScr(r.node);
    let deg=r.origRot+(Math.atan2(sy-sp.y,sx-sp.x)-r.startAngle)*180/Math.PI;
    if(e.shiftKey)deg=Math.round(deg/15)*15;
    r.node.rot=((deg%360)+360)%360;updProp();stat('회전: '+Math.round(r.node.rot)+'°');return;
  }

  // 터널 꼭짓점 드래그 중
  if(S._tunDrag){
    const td=S._tunDrag;const sp=nodeScr(td.node);
    // 마우스 위치를 노드 기준 월드좌표로 변환
    const ww=scrToWorld(sx,sy);
    td.node.points[td.idx]={x:ww.x-td.node.x, y:ww.y-td.node.y};
    stat(`꼭짓점 ${td.idx}: (${Math.round(td.node.points[td.idx].x)}, ${Math.round(td.node.points[td.idx].y)})`);return;
  }
  // 리사이즈 중
  if(S._resizing){
    const r=S._resizing,dx=(sx-r.startSx)/S.cam.z,dy=(sy-r.startSy)/S.cam.z,h=r.handle;
    let nw=r.origW,nh=r.origH;
    if(h==='r'||h==='tr'||h==='br')nw=Math.max(10,r.origW+dx);
    if(h==='l'||h==='tl'||h==='bl')nw=Math.max(10,r.origW-dx);
    if(h==='b'||h==='bl'||h==='br')nh=Math.max(10,r.origH+dy);
    if(h==='t'||h==='tl'||h==='tr')nh=Math.max(10,r.origH-dy);
    if(S.snap){nw=Math.round(nw/5)*5;nh=Math.round(nh/5)*5;}
    r.node.w=nw;r.node.h=nh;updProp();stat(`크기: ${Math.round(nw)} × ${Math.round(nh)}`);return;
  }

  // 선택 박스 드래그
  if(S._selBox){
    S._selBox.x2=sx;S._selBox.y2=sy;return;
  }

  // 노드 드래그 이동 (단일 또는 다중)
  if(S._dn){
    if(!S._drag&&(Math.abs(sx-_lm.x)+Math.abs(sy-_lm.y)>3)){S._drag=true;push();}
    if(S._drag){
      const ww=scrToWorld(sx-S._do.x,sy-S._do.y);
      S._dn.x=ww.x;S._dn.y=ww.y;
      // 다중 드래그: 나머지 노드도 같이 이동
      if(S._multiDrag){
        S._multiDrag.offsets.forEach(o=>{
          if(o.id===S._dn.id)return;
          const nd=S.nodes.find(x=>x.id===o.id);
          if(nd){nd.x=ww.x+o.ox;nd.y=ww.y+o.oy;}
        });
      }
      ca.style.cursor='grabbing';updProp();
    }
    return;
  }

  // 핸들 호버
  if(S.sel&&S.sels.length<=1&&S.tool==='select'){
    if(hitRotHandle(sx,sy)){ca.style.cursor='crosshair';return;}
    const hh=hitHandle(sx,sy);if(hh){ca.style.cursor=hh.cursor;return;}
  }
  const hn=hitNode(sx,sy);
  ca.style.cursor=hn?'move':'default';
});

ca.addEventListener('mouseup',e=>{
  // 라벨 드래그 종료
  if(S._labelDrag){push();S._labelDrag=null;ca.style.cursor='';stat('라벨 이동 완료');return;}
  // 선택 박스 완료 → 박스 안의 노드 전부 선택
  if(S._selBox){
    const b=S._selBox;
    const bx1=Math.min(b.x1,b.x2),by1=Math.min(b.y1,b.y2);
    const bx2=Math.max(b.x1,b.x2),by2=Math.max(b.y1,b.y2);
    // 3px 이상 드래그해야 선택 박스로 처리
    if(bx2-bx1>3||by2-by1>3){
      const found=[];
      S.nodes.forEach(n=>{
        const sp=nodeScr(n);
        if(sp.x>=bx1&&sp.x<=bx2&&sp.y>=by1&&sp.y<=by2)found.push(n.id);
      });
      if(found.length){
        if(e&&e.shiftKey){found.forEach(id=>{if(!S.sels.includes(id))S.sels.push(id);});}
        else{S.sels=found;}
        S.sel=S.sels[0]||null;
        stat(`${S.sels.length}개 선택됨`);
      }
    }
    S._selBox=null;updProp();
  }
  if(S._tunDrag){S._tunDrag=null;stat('꼭짓점 이동 완료');}
  if(S._rotating){S._rotating=null;stat('회전 완료');}
  if(S._resizing){S._resizing=null;stat('크기 조절 완료');}
  S._pan=false;S._dn=null;S._drag=false;S._multiDrag=null;
  ca.style.cursor='default';ca.classList.remove('drag');ca.classList.remove('moving');
});

// 더블클릭 → 인라인 편집
ca.addEventListener('dblclick',e=>{
  if(e.target.closest('.inline-edit'))return;
  const p=getPos(e);const sx=p.x,sy=p.y;
  const hn=hitNode(sx,sy);
  if(hn){
    S.sel=hn.id;S.selC=null;updProp();
    showInlineEdit(hn,sx,sy);
  }
});

ca.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?.92:1.08;
  const nz=Math.max(.15,Math.min(5,S.cam.z*f));
  const p=getPos(e);const sx=p.x,sy=p.y;
  const wx=(sx-W/2-S.cam.x)/S.cam.z,wy=(sy-H/2-S.cam.y)/S.cam.z;
  S.cam.z=nz;S.cam.x=sx-W/2-wx*S.cam.z;S.cam.y=sy-H/2-wy*S.cam.z;
  document.getElementById('zInf').textContent=Math.round(S.cam.z*100)+'%';
},{passive:false});

ca.addEventListener('contextmenu',e=>{
  e.preventDefault();
  const p=getPos(e);const sx=p.x,sy=p.y;
  showCtx(e.clientX,e.clientY,hitNode(sx,sy),hitConn(sx,sy),sx,sy);
});

// 미니맵 클릭 → 해당 위치로 이동
// ══════════════════════════════════════════════
const mmEl=document.querySelector('.mmap');
let _mmDrag=false;
function mmNav(e){
  const r=mv.getBoundingClientRect();
  const mx2=e.clientX-r.left, my2=e.clientY-r.top;
  const ix=(mx2-_mmT.ox)/_mmT.sc, iy=(my2-_mmT.oy)/_mmT.sc;
  S.cam.x=-ix*S.cam.z;
  S.cam.y=-iy*S.cam.z;
}
mmEl.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();_mmDrag=true;mmNav(e);});
document.addEventListener('mousemove',e=>{if(_mmDrag){e.preventDefault();mmNav(e);}});
document.addEventListener('mouseup',()=>{_mmDrag=false;if(S._labelDrag){push();S._labelDrag=null;ca.style.cursor='';stat('라벨 이동 완료');}});

// 드래그 앤 드롭 (도구상자)

  {type:'floor',name:'바닥판',icon:'⬛'},
  {type:'eq_grid',name:'장비 그룹',icon:'⊞'},
  {type:'conveyor',name:'컨베이어',icon:'⟿'},
  {type:'lift',name:'리프트',icon:'⇕'},
  {type:'bridge',name:'브릿지',icon:'⥯'},
  {type:'hub',name:'허브',icon:'◉'},
  {type:'stocker',name:'스토커',icon:'▣'},
  {type:'tunnel',name:'터널',icon:'⊟'},
  {type:'zone',name:'구역',icon:'▢'},
  {type:'label',name:'라벨',icon:'𝐀'},
  {type:'custom',name:'커스텀',icon:'◇'},
  {type:'port',name:'PORT',icon:'⊙'},
];
let _dropType=null;
const tbox=document.getElementById('tbox');
TOOLS.forEach(t=>{

  el.dataset.type=t.type;

ca.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';});
ca.addEventListener('drop',e=>{
  e.preventDefault();if(!_dropType)return;
  const p=getPos(e);const sx=p.x,sy=p.y;
  const ww=scrToWorld(sx,sy);
  push();
  const n=mkNode(_dropType,ww.x,ww.y);
  S.nodes.push(n);S.sel=n.id;updProp();cnts();
  stat(`${_dropType} 추가됨`);
  _dropType=null;
});

function mkNode(type,x,y){
  const D={
    floor:{w:200,h:80,color:'#c8dca8',border:'#90b060',label:'바닥판'},
    eq_grid:{w:80,h:50,rows:3,cols:4,color:'#a8d4e8',border:'#5090a8',label:'장비그룹'},
    conveyor:{w:120,h:10,color:'#3b82f6',border:'#2563eb',label:'컨베이어'},
    lift:{w:28,h:70,color:'#818cf8',border:'#6366f1',label:'리프트'},
    bridge:{w:20,h:120,color:'#818cf8',border:'#6366f1',label:'브릿지'},
    hub:{w:65,h:48,color:'#eab308',border:'#ca8a04',label:'허브'},
    stocker:{w:38,h:48,color:'#88d4a8',border:'#50a078',label:'스토커'},
    label:{w:50,h:18,color:'#ffffff',border:'#94a3b8',label:'라벨'},
    tunnel:{w:120,h:60,color:'#4a90d0',border:'#2a6ab0',label:'터널',pipeW:8,points:[{x:0,y:0},{x:60,y:0},{x:60,y:-60},{x:120,y:-60}]},
    zone:{w:130,h:90,color:'#f97316',border:'#ea580c',label:'구역'},
    custom:{w:35,h:35,color:'#a78bfa',border:'#7c3aed',label:'커스텀'},
    port:{w:20,h:20,color:'#22c55e',border:'#16a34a',label:'PORT',portOpacity:0.8},
  };
  const d=D[type]||D.custom;
  return{id:gid(),type,x,y,z:0,...d,desc:''};
}

// 속성 패널 (우측)
// ══════════════════════════════════════════════
function updProp(){
  const pe=document.getElementById('pe'),ns=document.getElementById('noSel');
  if(S.selC){
    const cn=S.selC;ns.classList.add('hid');pe.classList.remove('hid');
    pe.innerHTML=`
      <div class="stitle">연결선</div>
      <div class="pg"><div class="pl">라벨</div><input class="pi" id="cl" value="${cn.label||''}"/></div>
      <div class="pg"><div class="pl">색상</div><input type="color" class="ci" id="cc2" value="${cn.color||'#3b82f6'}"/></div>
      <div class="pr"><div class="pg"><div class="pl">두께</div><input type="number" class="pi" id="cw" value="${cn.width||3}" min="1" max="20"/></div>
      <div class="pg"><div class="pl">스타일</div><select class="pi" id="cd"><option value="0" ${!cn.dashed?'selected':''}>실선</option><option value="1" ${cn.dashed?'selected':''}>점선</option></select></div></div>
      <div class="pact"><button class="bdel" id="cdl">삭제</button></div>`;
    pe.querySelector('#cl').oninput=e=>{cn.label=e.target.value;};
    pe.querySelector('#cc2').oninput=e=>{cn.color=e.target.value;};
    pe.querySelector('#cw').oninput=e=>{cn.width=+e.target.value||3;};
    pe.querySelector('#cd').onchange=e=>{cn.dashed=e.target.value==='1';};
    pe.querySelector('#cdl').onclick=()=>{push();S.conns=S.conns.filter(x=>x!==cn);S.selC=null;updProp();cnts();};
    return;
  }
  if(!S.sel&&!S.sels.length){ns.classList.remove('hid');pe.classList.add('hid');return;}
  const n=S.nodes.find(x=>x.id===S.sel);
  if(!n){ns.classList.remove('hid');pe.classList.add('hid');return;}
  ns.classList.add('hid');pe.classList.remove('hid');

  // 다중 선택 시 요약 표시
  if(S.sels.length>1){
    pe.innerHTML=`<div class="stitle">${S.sels.length}개 선택됨</div>
      <div style="padding:8px;color:var(--tx2);font-size:11px;line-height:1.8;">
        드래그: 전체 이동<br/>
        Delete: 전체 삭제<br/>
        R: 전체 회전<br/>
        Ctrl+C/X/D: 전체 복사/잘라내기/복제
      </div>
      <div class="pact"><button class="bdup" id="ndu">전체 복제</button><button class="bdel" id="ndl">전체 삭제</button></div>`;
    pe.querySelector('#ndl').onclick=()=>{push();const idSet=new Set(S.sels);S.nodes=S.nodes.filter(x=>!idSet.has(x.id));S.conns=S.conns.filter(x=>!idSet.has(x.from)&&!idSet.has(x.to));clearSel();updProp();cnts();stat('전체 삭제됨');};
    pe.querySelector('#ndu').onclick=()=>{push();const newIds=[];S.sels.forEach(id=>{const src=S.nodes.find(x=>x.id===id);if(!src)return;const d=JSON.parse(JSON.stringify(src));d.id=gid();d.x+=30;d.y+=30;S.nodes.push(d);newIds.push(d.id);});S.sels=newIds;S.sel=newIds[0];updProp();cnts();stat(`${newIds.length}개 복제됨`);};
    return;
  }

  const typeNames={floor:'바닥판',eq_grid:'장비 그룹',conveyor:'컨베이어',lift:'리프트',bridge:'브릿지',hub:'허브',stocker:'스토커',tunnel:'터널',zone:'구역',label:'라벨',custom:'커스텀',port:'PORT'};
  let ex='';
  if(n.type==='port')ex=`<div class="pg"><div class="pl">투명도</div><input type="range" id="npo" min="0" max="100" value="${Math.round((n.portOpacity!=null?n.portOpacity:0.8)*100)}" style="width:100%"/><span id="npoV" style="font-size:10px;color:var(--tx2)">${Math.round((n.portOpacity!=null?n.portOpacity:0.8)*100)}%</span></div>`;
  if(n.type==='eq_grid')ex=`<div class="pr"><div class="pg"><div class="pl">행</div><input type="number" class="pi" id="nr" value="${n.rows||3}" min="1" max="20"/></div><div class="pg"><div class="pl">열</div><input type="number" class="pi" id="nc2" value="${n.cols||4}" min="1" max="20"/></div></div>`;
  if(n.type==='tunnel'){
    const tpts=n.points||[];
    let ptRows='';
    tpts.forEach((p,i)=>{
      ptRows+=`<div class="pr" style="margin-bottom:2px"><div class="pg"><div class="pl">P${i} X</div><input type="number" class="pi tpx" data-i="${i}" value="${Math.round(p.x)}" step="5"/></div><div class="pg"><div class="pl">Y</div><input type="number" class="pi tpy" data-i="${i}" value="${Math.round(p.y)}" step="5"/></div><div class="pg" style="flex:0 0 28px"><button class="pi tpdel" data-i="${i}" style="cursor:pointer;color:var(--red);padding:0;text-align:center;font-size:14px" title="삭제">×</button></div></div>`;
    });
    ex=`<div class="pr"><div class="pg"><div class="pl">파이프 두께</div><input type="number" class="pi" id="tpw" value="${n.pipeW||8}" min="2" max="30" step="1"/></div><div class="pg"><div class="pl">전체</div><div style="display:flex;gap:2px"><button class="pi" id="tsc5" style="cursor:pointer;text-align:center;color:var(--ac2);padding:4px">50%</button><button class="pi" id="tsc2" style="cursor:pointer;text-align:center;color:var(--ac2);padding:4px">200%</button></div></div></div><div class="stitle" style="margin-top:8px">꼭짓점 (${tpts.length}개) <button id="tpadd" style="float:right;background:var(--ac);color:#fff;border:none;border-radius:3px;padding:1px 8px;cursor:pointer;font-size:9px">+ 추가</button></div>${ptRows}`;
  }

  pe.innerHTML=`
    <div class="stitle">${typeNames[n.type]||n.type}</div>
    <div class="pg"><div class="pl">이름</div><input class="pi" id="nl" value="${n.label||''}"/></div>
    <div class="pr"><div class="pg" style="flex:3"><div class="pl">설명</div><input class="pi" id="nd" value="${n.desc||''}"/></div></div>
    <div class="pr"><div class="pg"><div class="pl">이름 크기</div><input type="number" class="pi" id="nls" value="${n.labelSize||10}" min="5" max="40" step="0.5"/></div>
    <div class="pg"><div class="pl">설명 크기</div><input type="number" class="pi" id="nds" value="${n.descSize||8.5}" min="4" max="30" step="0.5"/></div></div>
    <div class="pr"><div class="pg"><div class="pl">X</div><input type="number" class="pi" id="nx" value="${Math.round(n.x)}"/></div>
    <div class="pg"><div class="pl">Y</div><input type="number" class="pi" id="ny" value="${Math.round(n.y)}"/></div></div>
    <div class="pr"><div class="pg"><div class="pl">너비</div><input type="number" class="pi" id="nw" value="${n.w||40}"/></div>
    <div class="pg"><div class="pl">높이</div><input type="number" class="pi" id="nh" value="${n.h||30}"/></div>
    <div class="pg"><div class="pl">폭</div><input type="number" class="pi" id="nd2" value="${n.d||20}" min="1"/></div></div>
    <div class="pr"><div class="pg"><div class="pl">회전 (°)</div><input type="number" class="pi" id="nrt" value="${n.rot||0}" min="0" max="359" step="15"/></div>
    <div class="pg"><div class="pl">&nbsp;</div><button class="pi" id="nrt0" style="cursor:pointer;text-align:center;color:var(--ac2)">초기화</button></div></div>
    ${ex}
    <div class="pr"><div class="pg"><div class="pl">색상</div><input type="color" class="ci" id="nco" value="${n.color||'#a8d4e8'}"/></div>
    <div class="pg"><div class="pl">테두리</div><input type="color" class="ci" id="nbo" value="${n.border||'#5090a8'}"/></div></div>
    ${(n.type!=='floor'&&n.type!=='conveyor'&&n.type!=='lift'&&n.type!=='bridge'&&n.type!=='hub'&&n.type!=='tunnel'&&n.type!=='zone'&&n.type!=='label')?`<div class="pg"><div class="pl">바닥판 맞춤</div><select class="pi" id="nfa"><option value="0" ${!n.floorAlign?'selected':''}>OFF (다이아몬드)</option><option value="1" ${n.floorAlign?'selected':''}>ON (바닥판 방향)</option></select></div>`:''}
    <div class="pact"><button class="bdup" id="ndu">복제</button><button class="bdel" id="ndl">삭제</button></div>`;

  const bd=(id,k,num)=>{const el2=pe.querySelector('#'+id);if(el2)el2.oninput=e=>{n[k]=num?parseFloat(e.target.value)||0:e.target.value;};};
  bd('nl','label');bd('nd','desc');
  bd('nls','labelSize',1);bd('nds','descSize',1);
  bd('nx','x',1);bd('ny','y',1);bd('nw','w',1);bd('nh','h',1);bd('nd2','d',1);
  bd('nrt','rot',1);
  pe.querySelector('#nrt0').onclick=()=>{n.rot=0;updProp();};
  bd('nco','color');bd('nbo','border');
  const faEl=pe.querySelector('#nfa');if(faEl)faEl.onchange=()=>{n.floorAlign=faEl.value==='1';push();};
  if(n.type==='port'){const poEl=pe.querySelector('#npo');if(poEl){poEl.oninput=()=>{n.portOpacity=parseInt(poEl.value)/100;const vEl=pe.querySelector('#npoV');if(vEl)vEl.textContent=poEl.value+'%';};poEl.onchange=()=>{push();};}}
  if(n.type==='eq_grid'){bd('nr','rows',1);bd('nc2','cols',1);}
  if(n.type==='tunnel'){
    bd('tpw','pipeW',1);
    const sc=f=>{push();if(n.points)n.points.forEach(p=>{p.x=Math.round(p.x*f);p.y=Math.round(p.y*f);});updProp();};
    const b5=pe.querySelector('#tsc5');if(b5)b5.onclick=()=>sc(0.5);
    const b2=pe.querySelector('#tsc2');if(b2)b2.onclick=()=>sc(2);
    // 꼭짓점 X/Y 입력
    pe.querySelectorAll('.tpx').forEach(el=>{el.oninput=e=>{const i=parseInt(el.dataset.i);if(n.points&&n.points[i]!=null)n.points[i].x=parseFloat(e.target.value)||0;};el.addEventListener('keydown',e=>e.stopPropagation());});
    pe.querySelectorAll('.tpy').forEach(el=>{el.oninput=e=>{const i=parseInt(el.dataset.i);if(n.points&&n.points[i]!=null)n.points[i].y=parseFloat(e.target.value)||0;};el.addEventListener('keydown',e=>e.stopPropagation());});
    // 꼭짓점 삭제 버튼
    pe.querySelectorAll('.tpdel').forEach(el=>{el.onclick=()=>{const i=parseInt(el.dataset.i);if(n.points&&n.points.length>2){push();n.points.splice(i,1);updProp();}};});
    // 꼭짓점 추가 버튼
    const addBtn=pe.querySelector('#tpadd');if(addBtn)addBtn.onclick=()=>{push();if(!n.points)n.points=[];const lp=n.points.length?n.points[n.points.length-1]:{x:0,y:0};n.points.push({x:lp.x+30,y:lp.y});updProp();};
  }
  pe.querySelector('#ndl').onclick=()=>{push();const ids=allSel();const idSet=new Set(ids.length?ids:[n.id]);S.nodes=S.nodes.filter(x=>!idSet.has(x.id));S.conns=S.conns.filter(x=>!idSet.has(x.from)&&!idSet.has(x.to));clearSel();updProp();cnts();stat(`${idSet.size}개 삭제됨`);};
  pe.querySelector('#ndu').onclick=()=>{push();const ids=allSel();const newIds=[];(ids.length?ids:[n.id]).forEach(id=>{const src=S.nodes.find(x=>x.id===id);if(!src)return;const d=JSON.parse(JSON.stringify(src));d.id=gid();d.x+=30;d.y+=30;S.nodes.push(d);newIds.push(d.id);});S.sels=newIds;S.sel=newIds[0];updProp();cnts();stat(`${newIds.length}개 복제됨`);};
}

// ══════════════════════════════════════════════
// 우클릭 메뉴

function showCtx(cx,cy,node,conn,sx,sy){
  const m=document.getElementById('ctx');m.classList.remove('hid');m.style.left=cx+'px';m.style.top=cy+'px';
  let h='';
  if(node){
    h+=`<div class="cti" data-a="edit">✏️ 편집</div>`;
    if(node.type==='tunnel'&&node.points){
      h+=`<div class="cts"></div>`;
      h+=`<div class="cti" data-a="tunAdd">＋ 꼭짓점 추가 (끝)</div>`;
      const tp=hitTunPt(sx,sy);
      if(tp&&node.points.length>2){
        h+=`<div class="cti dng" data-a="tunDel" data-ti="${tp.idx}">− 꼭짓점 ${tp.idx} 삭제</div>`;
      }
      h+=`<div class="cts"></div>`;
    }
    h+=`<div class="cti" data-a="rot90">↻ 90° 회전</div>`;
    h+=`<div class="cti" data-a="rot-90">↺ -90° 회전</div>`;
    h+=`<div class="cti" data-a="rot0">⊙ 회전 초기화</div>`;
    h+=`<div class="cti" data-a="dup">📋 복제</div><div class="cts"></div><div class="cti dng" data-a="del">🗑 삭제</div>`;
  }else if(conn){
    h+=`<div class="cti dng" data-a="delc">🗑 연결 삭제</div>`;
  }else{
    TOOLS.forEach(t=>{
      h+=`<div class="cti" data-a="add" data-t="${t.type}">➕ ${t.name} 추가</div>`;
    });
    h+=`<div class="cts"></div><div class="cti" data-a="selall">☑ 전체 선택</div>`;
    h+=`<div class="cti" data-a="fit">⊞ 화면 맞춤</div>`;
  }
  m.innerHTML=h;
  m.querySelectorAll('.cti').forEach(el=>{
    el.onclick=()=>{
      const a=el.dataset.a;
      if(a==='edit'&&node){showInlineEdit(node,sx,sy);}
      if(a==='rot90'&&node){push();node.rot=((node.rot||0)+90)%360;updProp();}
      if(a==='rot-90'&&node){push();node.rot=((node.rot||0)-90+360)%360;updProp();}
      if(a==='rot0'&&node){push();node.rot=0;updProp();}
      if(a==='tunAdd'&&node&&node.points){push();const lp=node.points[node.points.length-1];node.points.push({x:lp.x+30,y:lp.y});updProp();stat('꼭짓점 추가됨');}
      if(a==='tunDel'&&node&&node.points){push();const ti=parseInt(el.dataset.ti);node.points.splice(ti,1);updProp();stat('꼭짓점 삭제됨');}
      if(a==='del'&&node){push();const ids=allSel();const idSet=new Set(ids.length?ids:[node.id]);S.nodes=S.nodes.filter(x=>!idSet.has(x.id));S.conns=S.conns.filter(x=>!idSet.has(x.from)&&!idSet.has(x.to));clearSel();updProp();cnts();}
      if(a==='dup'&&node){push();const ids=allSel();const newIds=[];(ids.length?ids:[node.id]).forEach(id=>{const src=S.nodes.find(x=>x.id===id);if(!src)return;const d=JSON.parse(JSON.stringify(src));d.id=gid();d.x+=30;d.y+=30;S.nodes.push(d);newIds.push(d.id);});S.sels=newIds;S.sel=newIds[0];updProp();cnts();}
      if(a==='delc'&&conn){push();S.conns=S.conns.filter(x=>x!==conn);S.selC=null;updProp();cnts();}
      if(a==='add'){const ww=scrToWorld(sx,sy);push();const n2=mkNode(el.dataset.t,ww.x,ww.y);S.nodes.push(n2);S.sel=n2.id;updProp();cnts();}
      if(a==='selall'){S.sels=S.nodes.map(n2=>n2.id);S.sel=S.sels[0]||null;updProp();stat(`전체 선택: ${S.sels.length}개`);}
      if(a==='fit')fitView();
      m.classList.add('hid');
    };
  });
}
document.addEventListener('click',e=>{if(!e.target.closest('.ctx'))document.getElementById('ctx').classList.add('hid');});

// ══════════════════════════════════════════════
// 키보드
// ══════════════════════════════════════════════
let _clipboard=null; // 복사된 노드 데이터

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  // Ctrl+C 복사 (다중 지원)
  if(e.ctrlKey&&(e.key==='c'||e.code==='KeyC')){
    e.preventDefault();
    const ids=allSel();
    if(ids.length>0){
      _clipboard=ids.map(id=>JSON.parse(JSON.stringify(S.nodes.find(x=>x.id===id)))).filter(Boolean);
      stat(`${_clipboard.length}개 복사됨`);
    }else if(S.selC){
      _clipboard=[JSON.parse(JSON.stringify(S.selC))];_clipboard[0]._isConn=true;
      stat('연결선 복사됨');
    }
    return;
  }
  // Ctrl+V 붙여넣기 (다중 지원)
  if(e.ctrlKey&&(e.key==='v'||e.code==='KeyV')){
    e.preventDefault();
    if(!_clipboard||!_clipboard.length){stat('클립보드가 비어있습니다');return;}
    push();
    if(_clipboard[0]._isConn){
      const nc=JSON.parse(JSON.stringify(_clipboard[0]));nc.id=gid();delete nc._isConn;
      S.conns.push(nc);S.selC=nc;clearSel();updProp();cnts();stat('연결선 붙여넣기 완료');
    }else{
      const newIds=[];
      _clipboard.forEach(src=>{
        const nn=JSON.parse(JSON.stringify(src));nn.id=gid();nn.x+=30;nn.y+=30;src.x=nn.x;src.y=nn.y;
        S.nodes.push(nn);newIds.push(nn.id);
      });
      S.sels=newIds;S.sel=newIds[0];S.selC=null;updProp();cnts();
      stat(`${newIds.length}개 붙여넣기 완료`);
    }
    return;
  }
  // Ctrl+X 잘라내기 (다중 지원)
  if(e.ctrlKey&&(e.key==='x'||e.code==='KeyX')){
    e.preventDefault();
    const ids=allSel();
    if(ids.length>0){
      _clipboard=ids.map(id=>JSON.parse(JSON.stringify(S.nodes.find(x=>x.id===id)))).filter(Boolean);
      push();const idSet=new Set(ids);
      S.nodes=S.nodes.filter(x=>!idSet.has(x.id));
      S.conns=S.conns.filter(x=>!idSet.has(x.from)&&!idSet.has(x.to));
      clearSel();updProp();cnts();stat(`${_clipboard.length}개 잘라내기`);
    }
    return;
  }
  // Ctrl+D 복제 (다중 지원)
  if(e.ctrlKey&&(e.key==='d'||e.code==='KeyD')){
    e.preventDefault();
    const ids=allSel();
    if(ids.length>0){
      push();const newIds=[];
      ids.forEach(id=>{
        const n=S.nodes.find(x=>x.id===id);if(!n)return;
        const d=JSON.parse(JSON.stringify(n));d.id=gid();d.x+=30;d.y+=30;
        S.nodes.push(d);newIds.push(d.id);
      });
      S.sels=newIds;S.sel=newIds[0];updProp();cnts();stat(`${newIds.length}개 복제됨`);
    }
    return;
  }
  // Ctrl+A 전체선택
  if(e.ctrlKey&&(e.key==='a'||e.code==='KeyA')){
    e.preventDefault();
    S.sels=S.nodes.map(n=>n.id);
    S.sel=S.sels[0]||null;S.selC=null;
    updProp();stat(`전체 선택: ${S.sels.length}개`);
    return;
  }

  // R키: 선택 노드 15도 회전
  if(e.key==='r'||e.key==='R'){
    const ids=allSel();
    if(ids.length>0){
      push();ids.forEach(id=>{
        const n=S.nodes.find(x=>x.id===id);
        if(n)n.rot=((n.rot||0)+(e.shiftKey?-15:15)+360)%360;
      });
      updProp();stat(`${ids.length}개 회전`);
    }
    return;
  }

  if(e.key==='v'&&!e.ctrlKey)setTool('select');
  if(e.key==='h')setTool('pan');
  if(e.key==='c'&&!e.ctrlKey)setTool('connect');
  if(e.key==='g')tglGrid();
  if(e.key==='s'&&!e.ctrlKey)tglSnap();
  if(e.key==='f')fitView();
  // Delete: 다중 삭제 지원
  if(e.key==='Delete'||e.key==='Backspace'){
    const ids=allSel();
    if(ids.length>0){
      push();const idSet=new Set(ids);
      S.nodes=S.nodes.filter(x=>!idSet.has(x.id));
      S.conns=S.conns.filter(x=>!idSet.has(x.from)&&!idSet.has(x.to));
      clearSel();updProp();cnts();stat(`${ids.length}개 삭제됨`);
    }else if(S.selC){push();S.conns=S.conns.filter(x=>x!==S.selC);S.selC=null;updProp();cnts();}
  }
  if(e.key==='Escape'){S.cFrom=null;clearSel();hideInlineEdit();document.getElementById('hint').classList.add('hid');updProp();}
  if(e.ctrlKey&&(e.key==='z'||e.code==='KeyZ')){e.preventDefault();undo();}
  if(e.ctrlKey&&(e.key==='y'||e.key==='Z'||e.code==='KeyY')){e.preventDefault();redo();}
  if(e.ctrlKey&&(e.key==='s'||e.code==='KeyS')){e.preventDefault();saveJ();}
});

function setTool(t){
  S.tool=t;S.cFrom=null;
  ['bSel','bPan','bCon'].forEach(id=>document.getElementById(id).classList.remove('on'));
  ({select:'bSel',pan:'bPan',connect:'bCon'})[t]&&document.getElementById({select:'bSel',pan:'bPan',connect:'bCon'}[t]).classList.add('on');
  ca.classList.toggle('conn',t==='connect');
  const hint=document.getElementById('hint');
  if(t==='connect'){hint.textContent='출발 노드 → 도착 노드를 클릭하세요. ESC로 취소.';hint.classList.remove('hid');}
  else hint.classList.add('hid');
  stat('도구: '+({select:'선택',pan:'이동',connect:'연결'}[t]||t));
}
function tglGrid(){S.grid=!S.grid;document.getElementById('bGrd').classList.toggle('on',S.grid);}
function tglSnap(){S.snap=!S.snap;document.getElementById('bSnp').classList.toggle('on',S.snap);}

document.getElementById('bExH').onclick=expHTML;

// ══════════════════════════════════════════════
// 히스토리
// ══════════════════════════════════════════════
function push(){
  const snap=JSON.stringify({nodes:S.nodes,conns:S.conns});
  S.hist=S.hist.slice(0,S.hi+1);S.hist.push(snap);S.hi=S.hist.length-1;
  if(S.hist.length>60){S.hist.shift();S.hi--;}
}
function undo(){if(S.hi<=0)return;S.hi--;const d=JSON.parse(S.hist[S.hi]);S.nodes=d.nodes;S.conns=d.conns;S.sel=null;S.selC=null;updProp();cnts();stat('실행취소');}
function redo(){if(S.hi>=S.hist.length-1)return;S.hi++;const d=JSON.parse(S.hist[S.hi]);S.nodes=d.nodes;S.conns=d.conns;S.sel=null;updProp();cnts();stat('다시실행');}

// ══════════════════════════════════════════════
// 저장 / 불러오기 / 내보내기

function saveJ(){
  const data=JSON.stringify({nodes:S.nodes,conns:S.conns},null,2);
  showModal('레이아웃 저장 (JSON)',`<textarea id="ja">${data}</textarea><div class="mbtn"><button class="bc" id="mc2">닫기</button><button class="bp" id="md">다운로드</button></div>`,()=>{
    document.getElementById('mc2').onclick=hideModal;
    document.getElementById('md').onclick=()=>{const b=new Blob([data],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='fab_layout.json';a.click();hideModal();};
  });
}
function loadJ(){
  showModal('레이아웃 불러오기 (JSON)',`<textarea id="ja" placeholder="JSON을 붙여넣으세요..."></textarea><div class="mbtn"><button class="bc" id="mc2">취소</button><button class="bp" id="ml">불러오기</button></div>`,()=>{
    document.getElementById('mc2').onclick=hideModal;
    document.getElementById('ml').onclick=()=>{
      try{const d=JSON.parse(document.getElementById('ja').value);push();
        if(d.nodes)S.nodes=d.nodes;if(d.conns)S.conns=d.conns;
        updProp();cnts();fitView();stat('불러오기 완료');hideModal();
      }catch(e){alert('잘못된 JSON: '+e.message);}
    };
  });
}
function expPNG(){
  const oc=document.createElement('canvas');oc.width=W*2;oc.height=H*2;
  const ox=oc.getContext('2d');ox.scale(2,2);ox.drawImage(cv,0,0,cv.width,cv.height,0,0,W,H);
  oc.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='fab_layout.png';a.click();});
  stat('PNG 내보내기 완료');
}

function expHTML(){
  var nj=JSON.stringify(S.nodes);
  var cj=JSON.stringify(S.conns);
  var parts=[];
  parts.push('<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/><title>FAB 레이아웃</title>');
  parts.push('<style>*{margin:0;padding:0;box-sizing:border-box;}body{background:'+(S.bgColor||'#0c1017')+';overflow:hidden;height:100vh;font-family:Segoe UI,Malgun Gothic,sans-serif;}canvas{display:block;}.mmap{position:fixed;bottom:10px;right:10px;width:160px;height:100px;background:rgba(21,27,40,.92);border:1px solid #2a3450;border-radius:7px;overflow:hidden;cursor:pointer;}</style>');
  parts.push('</head><body><canvas id="cv"></canvas><div class="mmap"><canvas id="mm" width="160" height="100"></canvas></div>');
  parts.push('<script>');
  parts.push('var NODES='+nj+';');
  parts.push('var CONNS='+cj+';');
  parts.push('var cv=document.getElementById("cv");');
  parts.push('var ctx=cv.getContext("2d");');
  parts.push('var W,H,cam={x:0,y:0,z:1};');
  parts.push('var OA=Math.PI/6,OC=Math.cos(OA),OS=Math.sin(OA),OD=0.5;');
  parts.push('function rsz(){W=innerWidth;H=innerHeight;cv.width=W*devicePixelRatio;cv.height=H*devicePixelRatio;cv.style.width=W+"px";cv.style.height=H+"px";ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}');
  parts.push('rsz();addEventListener("resize",rsz);');
  parts.push('function isoW(wx,wy){return{sx:wx+wy*OC*OD,sy:wy*OS*OD};}');
  parts.push('function toScr(ix,iy){return{x:ix*cam.z+cam.x+W/2,y:iy*cam.z+cam.y+H/2};}');
  parts.push('function dk(hex,f){if(!hex||hex[0]!="#")return hex||"#888";var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return"rgb("+(r*f|0)+","+(g*f|0)+","+(b*f|0)+")";}');
  parts.push('function nScr(n){var p=isoW(n.x,n.y);return toScr(p.sx,p.sy);}');
  parts.push('function iOff(wx,wy,z){return{x:(wx+wy*OC*OD)*z,y:(wy*OS*OD)*z};}');
  parts.push('function lt(hex,f){if(!hex||hex[0]!="#")return hex||"#ccc";var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return"rgb("+Math.min(255,r+(255-r)*f|0)+","+Math.min(255,g+(255-g)*f|0)+","+Math.min(255,b+(255-b)*f|0)+")";}');
  // drawCube
  parts.push('function drawCube(sx,sy,sz,c1,c2,c3,bd){var s=sz*cam.z,hs=s*.55;ctx.beginPath();ctx.moveTo(sx,sy-s*.65);ctx.lineTo(sx+hs,sy-s*.3);ctx.lineTo(sx,sy+s*.05);ctx.lineTo(sx-hs,sy-s*.3);ctx.closePath();ctx.fillStyle=c1;ctx.fill();ctx.strokeStyle=bd;ctx.lineWidth=.7;ctx.stroke();ctx.beginPath();ctx.moveTo(sx-hs,sy-s*.3);ctx.lineTo(sx,sy+s*.05);ctx.lineTo(sx,sy+s*.4);ctx.lineTo(sx-hs,sy+s*.05);ctx.closePath();ctx.fillStyle=c2;ctx.fill();ctx.stroke();ctx.beginPath();ctx.moveTo(sx+hs,sy-s*.3);ctx.lineTo(sx,sy+s*.05);ctx.lineTo(sx,sy+s*.4);ctx.lineTo(sx+hs,sy+s*.05);ctx.closePath();ctx.fillStyle=c3;ctx.fill();ctx.stroke();}');
  // drawLbl
  parts.push('function drawLbl(sx,sy,t,d){ctx.save();var z=cam.z;ctx.font="bold "+(10*z)+"px Malgun Gothic,Segoe UI,sans-serif";var tw=Math.max(ctx.measureText(t).width,d?ctx.measureText(d).width:0);var bw=tw+16*z,bh=d?32*z:20*z;ctx.shadowColor="rgba(0,0,0,.18)";ctx.shadowBlur=6*z;ctx.fillStyle="#fff";ctx.beginPath();ctx.roundRect(sx-bw/2,sy-bh/2,bw,bh,4*z);ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle="#b8c4d0";ctx.lineWidth=1;ctx.stroke();ctx.fillStyle="#7aaccc";ctx.fillRect(sx-bw/2+3*z,sy-bh/2+1.5*z,bw-6*z,2*z);ctx.fillStyle="#2a4050";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(t,sx,d?sy-5*z:sy);if(d){ctx.fillStyle="#708050";ctx.font=(8.5*z)+"px Malgun Gothic,Segoe UI,sans-serif";ctx.fillText(d,sx,sy+7*z);}ctx.restore();}');
  // drawNode — 에디터와 동일한 isoOff 기반 렌더링

    NODES.forEach(n=>{const p=isoW(n.x,n.y);bx1=Math.min(bx1,p.sx-80);bx2=Math.max(bx2,p.sx+80);by1=Math.min(by1,p.sy-80);by2=Math.max(by2,p.sy+80);});
    if(NODES.length){const cw=bx2-bx1,ch=by2-by1;camRef.current.z=Math.min(W*.82/cw,H*.82/ch,2.5);camRef.current.x=-(bx1+bx2)/2*camRef.current.z;camRef.current.y=-(by1+by2)/2*camRef.current.z;}

    // 줌/팬
    let isPan=false, ps={x:0,y:0};
    cv.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY>0?.92:1.08;const cam=camRef.current;const nz=Math.max(.15,Math.min(5,cam.z*f));const sx=e.offsetX,sy=e.offsetY;const wx=(sx-W/2-cam.x)/cam.z,wy=(sy-H/2-cam.y)/cam.z;cam.z=nz;cam.x=sx-W/2-wx*cam.z;cam.y=sy-H/2-wy*cam.z;},{passive:false});
    cv.addEventListener('mousedown',e=>{isPan=true;ps={x:e.offsetX-camRef.current.x,y:e.offsetY-camRef.current.y};});
    cv.addEventListener('mousemove',e=>{if(isPan){camRef.current.x=e.offsetX-ps.x;camRef.current.y=e.offsetY-ps.y;}});
    cv.addEventListener('mouseup',()=>{isPan=false;});

    // 미니맵 네비게이션
    let mmDrag=false;
    function mmNav(e){const r=mc.getBoundingClientRect();const mx2=e.clientX-r.left,my2=e.clientY-r.top;if(!mc._mmT)return;const t=mc._mmT;const ix=(mx2-t.ox)/t.sc,iy=(my2-t.oy)/t.sc;camRef.current.x=-ix*camRef.current.z;camRef.current.y=-iy*camRef.current.z;}
    mc.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();mmDrag=true;mmNav(e);});
    document.addEventListener('mousemove',e=>{if(mmDrag){e.preventDefault();mmNav(e);}});
    document.addEventListener('mouseup',()=>{mmDrag=false;});

    function render(ts) {
      const cam = camRef.current;
      ctx.clearRect(0,0,W,H); ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

      const ot=NODES.filter(n=>n.type!=='floor').sort((a,b)=>(a.y+a.x)-(b.y+b.x));
      [...fl,...ot].forEach(n=>drawNode(ctx,n,cam,W,H,ts));

      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
    return () => window.removeEventListener('resize', rsz);
  }, []);

  return (
    <div style={{ width, height, background: BG, position: 'relative' }}>
      <canvas ref={canvasRef} style={{display:'block'}} />
      <div style={{position:'absolute',bottom:10,right:10,background:'rgba(12,16,23,.85)',borderRadius:6,border:'1px solid rgba(255,255,255,.12)',padding:4,cursor:'crosshair'}}>
        <canvas ref={mmRef} style={{display:'block',width:180,height:120}} />
      </div>
      <div style={{ position: 'absolute', bottom: 10, left: 10, color: '#8494b0', fontSize: 11 }}>

function fitView(){
  if(!S.nodes.length){S.cam={x:0,y:0,z:1};return;}
  let mx=Infinity,MX=-Infinity,my=Infinity,MY=-Infinity;
  S.nodes.forEach(n=>{
    const p=isoWorld(n.x,n.y);
    mx=Math.min(mx,p.sx-80);MX=Math.max(MX,p.sx+80);
    my=Math.min(my,p.sy-80);MY=Math.max(MY,p.sy+80);
  });
  const cw=MX-mx,ch=MY-my;
  S.cam.z=Math.min(W*.82/cw,H*.82/ch,2.5);
  S.cam.x=-(mx+MX)/2*S.cam.z;S.cam.y=-(my+MY)/2*S.cam.z;
  document.getElementById('zInf').textContent=Math.round(S.cam.z*100)+'%';
}
