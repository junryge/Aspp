<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLB Builder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;height:100vh;overflow:hidden}
#app{display:flex;height:100vh}
#sidebar{
  width:320px;background:#16213e;padding:12px;overflow-y:auto;
  display:flex;flex-direction:column;gap:8px;border-right:1px solid #333;
  scrollbar-width:thin;scrollbar-color:#444 #16213e;
}
#sidebar h1{font-size:17px;color:#e94560}
.sec{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.dim-group{display:flex;gap:5px}
.dim-input{flex:1;display:flex;flex-direction:column;gap:1px}
.dim-input label{font-size:9px;color:#aaa}
.dim-input input{background:#0f3460;border:1px solid #444;color:#fff;padding:4px 5px;border-radius:3px;font-size:12px;width:100%}
.btn{background:#e94560;color:#fff;border:none;padding:6px 12px;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600}
.btn:hover{background:#c73652}
.btn-sm{padding:2px 7px;font-size:10px}
.btn-outline{background:transparent;border:1px solid #e94560;color:#e94560}
.btn-outline:hover{background:#e94560;color:#fff}
.btn-green{background:#27ae60}.btn-green:hover{background:#1e8449}
.face-card{background:#0f3460;border-radius:5px;padding:7px;display:flex;flex-direction:column;gap:4px}
.face-header{display:flex;justify-content:space-between;align-items:center}
.face-header h3{font-size:11px;color:#e94560}
.face-actions{display:flex;gap:3px;align-items:center}
.upload-label{background:#1a1a4e;border:1px dashed #555;padding:1px 6px;border-radius:3px;cursor:pointer;font-size:10px}
.upload-label:hover{border-color:#e94560;color:#e94560}
.face-card input[type="file"]{display:none}
.face-preview{border:1px solid #333;border-radius:3px;cursor:grab;display:block;margin:0 auto;background:#222}
.face-preview:active{cursor:grabbing}
.face-info{font-size:8px;color:#555;text-align:center}
#viewport{flex:1;position:relative;background:transparent}
#viewport canvas{width:100%!important;height:100%!important;display:block}
.dim-label{
  position:absolute;pointer-events:none;font-size:11px;font-weight:700;
  padding:2px 6px;border-radius:3px;white-space:nowrap;z-index:5;
  text-shadow:0 0 3px rgba(0,0,0,0.8);
}
#label-w{color:#ff6666}#label-h{color:#66ff66}#label-d{color:#6688ff}
#export-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
#help-text{position:absolute;top:8px;left:8px;font-size:10px;color:#444;pointer-events:none;line-height:1.6}
#mode-info{position:absolute;top:8px;right:8px;font-size:11px;color:#e94560;pointer-events:none;font-weight:600;opacity:0;transition:opacity 0.3s}
#mode-info.show{opacity:1}
#glb-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,20,40,0.92);border:1px solid #8e44ad;color:#ccc;padding:12px 20px;border-radius:6px;font-size:12px;pointer-events:none;opacity:0;transition:opacity 0.4s;z-index:20;text-align:center}
#glb-toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>GLB Builder</h1>
    <div class="sec">건물 크기 (m)</div>
    <div class="dim-group">
      <div class="dim-input"><label>가로 W</label><input type="number" id="dimW" value="10" min="0.1" step="0.5"></div>
      <div class="dim-input"><label>높이 H</label><input type="number" id="dimH" value="8" min="0.1" step="0.5"></div>
      <div class="dim-input"><label>깊이 D</label><input type="number" id="dimD" value="6" min="0.1" step="0.5"></div>
    </div>
    <div class="dim-group" style="margin-top:2px;align-items:end">
      <div class="dim-input"><label>상단면 깊이</label><input type="number" id="dimTopDepth" value="0" min="0" step="0.1"></div>
      <button class="btn btn-sm btn-outline" id="topUp" style="padding:3px 8px" title="▲ 올리기 (Shift:크게)">▲</button>
      <button class="btn btn-sm btn-outline" id="topDown" style="padding:3px 8px" title="▼ 내리기 (Shift:크게)">▼</button>
    </div>
    <div class="sec">배경색</div>
    <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-sm bg-sel" data-bg="none" title="투명" style="background:repeating-conic-gradient(#555 0% 25%,#333 0% 50%) 50%/12px 12px;width:26px;height:22px;border:2px solid #e94560"></button>
      <button class="btn btn-sm bg-sel" data-bg="#ffffff" title="흰색" style="background:#ffffff;width:26px;height:22px;border:2px solid transparent"></button>
      <button class="btn btn-sm bg-sel" data-bg="#00ff00" title="초록(크로마키)" style="background:#00ff00;width:26px;height:22px;border:2px solid transparent"></button>
      <button class="btn btn-sm bg-sel" data-bg="#000000" title="검정" style="background:#000000;width:26px;height:22px;border:2px solid transparent"></button>
      <button class="btn btn-sm bg-sel" data-bg="#87CEEB" title="하늘색" style="background:#87CEEB;width:26px;height:22px;border:2px solid transparent"></button>
      <input type="color" id="bgCustomColor" value="#888888" title="직접 선택" style="width:26px;height:22px;border:none;padding:0;cursor:pointer;background:transparent">
    </div>
    <div style="display:flex;gap:4px;flex-wrap:wrap">
      <button class="btn btn-sm" id="glbLoadBtn" style="background:#8e44ad">GLB 불러오기</button>
      <input type="file" id="glbFileInput" accept=".glb" style="display:none">
      <button class="btn btn-sm btn-outline" id="autoSizeBtn">이미지 자동크기</button>
      <button class="btn btn-sm btn-outline" id="allUploadBtn">전체 불러오기</button>
      <button class="btn btn-sm btn-outline" id="resetPosBtn">위치 초기화</button>
    </div>
    <div class="sec">면 이미지 (프리뷰: 드래그/휠)</div>
    <div id="faces"></div>
  </div>
  <div id="viewport">
    <canvas id="threeCanvas"></canvas>
    <div class="dim-label" id="label-w"></div>
    <div class="dim-label" id="label-h"></div>
    <div class="dim-label" id="label-d"></div>
    <div id="mode-info"></div>
    <div id="glb-toast"></div>
    <div id="help-text">면 클릭: 이미지 조절 (드래그:이동 / 휠:크기) | Esc: 해제<br>핸들 드래그: 크기조절 (빨강:W / 초록:H / 파랑:D)<br>Shift+면 드래그: 건물 이동 | 빈곳 드래그: 회전</div>
    <div id="export-bar">
      <button class="btn btn-green" id="exportBtn">GLB 내보내기</button>
    </div>
  </div>
</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ===== CONFIG =====
const FACES=[
  {key:'front',name:'정면',wDim:'w',hDim:'h',matIdx:4},
  {key:'back', name:'후면',wDim:'w',hDim:'h',matIdx:5},
  {key:'right',name:'우측',wDim:'d',hDim:'h',matIdx:1},
  {key:'left', name:'좌측',wDim:'d',hDim:'h',matIdx:0},
  {key:'top',  name:'상단',wDim:'w',hDim:'d',matIdx:2},
  {key:'bottom',name:'하단',wDim:'w',hDim:'d',matIdx:3},
];
const TX=1024, PW=270, PH=150;

// ===== STATE =====
const S={w:10,h:8,d:6,px:0,pz:0,topDepth:0,bgColor:'none',faces:{}};
FACES.forEach(f=>{S.faces[f.key]={img:null,sx:1,sy:1,ox:0,oy:0,pc:null,tc:null,tex:null,mat:null,chromaOn:false,chromaColor:'#ffffff',chromaTol:40}});

// ===== THREE SCENE =====
const cvs3=document.getElementById('threeCanvas');
const scene=new THREE.Scene();
scene.background=null;
const camera=new THREE.PerspectiveCamera(45,1,0.1,500);
camera.position.set(20,14,20);
const renderer=new THREE.WebGLRenderer({canvas:cvs3,antialias:true,alpha:true});
renderer.setClearColor(0x000000,0);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
scene.add(new THREE.AmbientLight(0xffffff,0.8));
const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(10,20,10);scene.add(dl);
scene.add(new THREE.GridHelper(50,50,0x333344,0x222233));

const ctrl=new OrbitControls(camera,cvs3);
ctrl.enableDamping=true;ctrl.dampingFactor=0.08;

// ===== GROUP & MESHES =====
const grp=new THREE.Group();scene.add(grp);
let boxMesh=null, edgeMesh=null;
const raycaster=new THREE.Raycaster();
const mv=new THREE.Vector2();

// ===== HANDLES =====
const hGeo=new THREE.SphereGeometry(0.35,16,16);
const hColors={w:0xff4444,h:0x44ff44,d:0x5588ff};
const hColorsHov={w:0xff8888,h:0x88ff88,d:0x88aaff};
const handleMeshes={};
const axes={w:new THREE.Vector3(1,0,0),h:new THREE.Vector3(0,1,0),d:new THREE.Vector3(0,0,1)};
['w','h','d'].forEach(dim=>{
  const m=new THREE.Mesh(hGeo,new THREE.MeshStandardMaterial({color:hColors[dim],emissive:hColors[dim],emissiveIntensity:0.3}));
  m.userData.dim=dim;
  m.userData.isHandle=true;
  grp.add(m);
  handleMeshes[dim]=m;
});
const handleArr=Object.values(handleMeshes);

function posHandles(){
  handleMeshes.w.position.set(S.w/2+0.6, S.h/2, 0);
  handleMeshes.h.position.set(0, S.h+0.6, 0);
  handleMeshes.d.position.set(0, S.h/2, S.d/2+0.6);
}

// ===== DRAW =====
function drawCover(ctx,cw,ch,img,sx,sy,ox,oy,prev,faceKey){
  ctx.clearRect(0,0,cw,ch);
  // Texture canvas (prev=false): NO white fill → transparent background
  // This ensures alphaMode:MASK works correctly in GLB export
  // (faces without images stay fully transparent = invisible)
  if(!img){
    if(prev){ctx.fillStyle='rgba(80,80,80,0.4)';ctx.fillRect(0,0,cw,ch);ctx.fillStyle='#aaa';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('이미지 없음',cw/2,ch/2);}
    // Texture canvas: bottom face gets solid gray when no image
    if(!prev && faceKey==='bottom'){
      ctx.fillStyle='#888888';
      ctx.fillRect(0,0,cw,ch);
    }
    return;
  }
  // Base cover size (fills face completely at sx=1,sy=1)
  const car=cw/ch,iar=img.width/img.height;
  let bw,bh;
  if(iar>car){bh=ch;bw=bh*iar;}else{bw=cw;bh=bw/iar;}
  // Apply independent scaleX/scaleY
  const dw=bw*sx, dh=bh*sy;
  const x=(cw-dw)/2 + ox*cw;
  const y=(ch-dh)/2 + oy*ch;
  ctx.drawImage(img,x,y,dw,dh);
  if(!prev){
    const id=ctx.getImageData(0,0,cw,ch);
    const d=id.data;
    const fs=faceKey?S.faces[faceKey]:null;
    // ChromaKey: 가장자리에서 연결된 배경색만 제거 (flood fill)
    // 이미지 내부의 비슷한 색은 건드리지 않음
    if(fs&&fs.chromaOn){
      const hex=fs.chromaColor;
      const cr=parseInt(hex.slice(1,3),16),cg=parseInt(hex.slice(3,5),16),cb=parseInt(hex.slice(5,7),16);
      const tol=fs.chromaTol,w=cw,h=ch;
      const total=w*h, visited=new Uint8Array(total);
      const match=idx=>{
        const i=idx*4;
        if(d[i+3]===0)return false;
        const dr=d[i]-cr,dg=d[i+1]-cg,db=d[i+2]-cb;
        return Math.sqrt(dr*dr+dg*dg+db*db)<=tol;
      };
      // 가장자리 픽셀부터 시작
      const q=[];let qi=0;
      for(let x=0;x<w;x++){
        if(match(x))q.push(x);
        const bi=(h-1)*w+x; if(match(bi))q.push(bi);
      }
      for(let y=1;y<h-1;y++){
        if(match(y*w))q.push(y*w);
        const ri=y*w+w-1; if(match(ri))q.push(ri);
      }
      // BFS: 연결된 배경만 투명화
      while(qi<q.length){
        const idx=q[qi++];
        if(visited[idx])continue;
        visited[idx]=1;
        d[idx*4+3]=0;
        const x=idx%w,y=(idx/w)|0;
        if(x>0&&!visited[idx-1]&&match(idx-1))q.push(idx-1);
        if(x<w-1&&!visited[idx+1]&&match(idx+1))q.push(idx+1);
        if(y>0&&!visited[idx-w]&&match(idx-w))q.push(idx-w);
        if(y<h-1&&!visited[idx+w]&&match(idx+w))q.push(idx+w);
      }
    }
    // Binary mask: clean edges
    for(let i=0;i<d.length;i+=4){
      d[i+3]=d[i+3]>=128?255:0;
    }
    ctx.putImageData(id,0,0);
  }
}

function makeTC(fw,fh){
  const ar=fw/fh;let w,h;
  if(ar>=1){w=TX;h=Math.max(1,Math.round(TX/ar));}else{h=TX;w=Math.max(1,Math.round(TX*ar));}
  const c=document.createElement('canvas');c.width=w;c.height=h;return c;
}

function updPrvSize(key){
  const fc=FACES.find(f=>f.key===key),fs=S.faces[key];
  const fw=S[fc.wDim],fh=S[fc.hDim],ar=fw/fh;
  let pw,ph;
  if(ar>=PW/PH){pw=PW;ph=Math.max(24,Math.round(PW/ar));}
  else{ph=PH;pw=Math.max(24,Math.round(PH*ar));}
  fs.pc.width=pw;fs.pc.height=ph;fs.pc.style.width=pw+'px';fs.pc.style.height=ph+'px';
}

function updFace(key){
  const fs=S.faces[key],pc=fs.pc;
  drawCover(pc.getContext('2d'),pc.width,pc.height,fs.img,fs.sx,fs.sy,fs.ox,fs.oy,true,key);
  if(fs.tc){drawCover(fs.tc.getContext('2d'),fs.tc.width,fs.tc.height,fs.img,fs.sx,fs.sy,fs.ox,fs.oy,false,key);}
  if(fs.tex)fs.tex.needsUpdate=true;
  if(fs.mat){
    fs.mat.visible=!!fs.img || key==='bottom';
    fs.mat.map=fs.tex;
    fs.mat.needsUpdate=true;
  }
  const info=document.querySelector(`.face-card[data-key="${key}"] .face-info`);
  if(info)info.textContent=fs.img?`${fs.img.width}x${fs.img.height} | W:${(fs.sx*100).toFixed(0)}% H:${(fs.sy*100).toFixed(0)}%`:'드래그:이동 / 휠:가로 / Shift+휠:세로';
}

// ===== FILL FACE =====
function fillFace(key){
  const fs=S.faces[key];if(!fs.img||!fs.tc)return;
  const cw=fs.tc.width,ch=fs.tc.height;
  const car=cw/ch,iar=fs.img.width/fs.img.height;
  let bw,bh;
  if(iar>car){bh=ch;bw=bh*iar;}else{bw=cw;bh=bw/iar;}
  fs.sx=cw/bw; fs.sy=ch/bh; fs.ox=0; fs.oy=0;
  updFace(key);
}

// ===== TOP DEPTH: push top face vertices down =====
function applyTopDepth(geo){
  if(S.topDepth<=0)return;
  const pos=geo.attributes.position;
  // BoxGeometry face order: right(0-3), left(4-7), top(8-11), bottom(12-15), front(16-19), back(20-23)
  // Top face vertices: indices 8,9,10,11 → push Y down
  for(let i=8;i<=11;i++){
    pos.setY(i, S.h/2 - S.topDepth);
  }
  pos.needsUpdate=true;
}

// ===== BUILD =====
function rebuild(){
  // Clean old
  if(boxMesh){grp.remove(boxMesh);boxMesh.geometry.dispose();}
  if(edgeMesh){grp.remove(edgeMesh);edgeMesh.geometry.dispose();}
  FACES.forEach(f=>{const fs=S.faces[f.key];if(fs.mat)fs.mat.dispose();if(fs.tex)fs.tex.dispose();});

  const geo=new THREE.BoxGeometry(S.w,S.h,S.d);
  applyTopDepth(geo);
  const mats=[];
  FACES.forEach(f=>{
    const fs=S.faces[f.key],fw=S[f.wDim],fh=S[f.hDim];
    fs.tc=makeTC(fw,fh);
    drawCover(fs.tc.getContext('2d'),fs.tc.width,fs.tc.height,fs.img,fs.sx,fs.sy,fs.ox,fs.oy,false,f.key);
    fs.tex=new THREE.CanvasTexture(fs.tc);
    fs.tex.colorSpace=THREE.SRGBColorSpace;
    fs.mat=new THREE.MeshStandardMaterial({
      map:fs.tex, side:THREE.FrontSide,
      transparent:false, alphaTest:0.5,
      metalness:0, roughness:1
    });
    if(!fs.img && f.key!=='bottom')fs.mat.visible=false;
    mats[f.matIdx]=fs.mat;
    updPrvSize(f.key);
    updFace(f.key);
  });

  boxMesh=new THREE.Mesh(geo,mats);
  boxMesh.position.y=S.h/2;
  boxMesh.userData.isBox=true;
  grp.add(boxMesh);

  // Wireframe (after topDepth applied)
  const eGeo=new THREE.EdgesGeometry(geo);
  edgeMesh=new THREE.LineSegments(eGeo,new THREE.LineBasicMaterial({color:0x88aacc,transparent:true,opacity:0.5}));
  edgeMesh.position.y=S.h/2;
  grp.add(edgeMesh);

  posHandles();
  grp.position.set(S.px,0,S.pz);
  ctrl.target.set(S.px,S.h/2,S.pz);
  ctrl.update();
}

function rebuildGeo(){
  if(boxMesh){grp.remove(boxMesh);boxMesh.geometry.dispose();}
  if(edgeMesh){grp.remove(edgeMesh);edgeMesh.geometry.dispose();}
  const geo=new THREE.BoxGeometry(S.w,S.h,S.d);
  applyTopDepth(geo);
  const mats=[];
  FACES.forEach(f=>{
    const fs=S.faces[f.key],fw=S[f.wDim],fh=S[f.hDim];
    fs.tc=makeTC(fw,fh);
    drawCover(fs.tc.getContext('2d'),fs.tc.width,fs.tc.height,fs.img,fs.sx,fs.sy,fs.ox,fs.oy,false,f.key);
    fs.tex.image=fs.tc;fs.tex.needsUpdate=true;
    mats[f.matIdx]=fs.mat;
    updPrvSize(f.key);
    updFace(f.key);
  });
  boxMesh=new THREE.Mesh(geo,mats);
  boxMesh.position.y=S.h/2;boxMesh.userData.isBox=true;grp.add(boxMesh);
  const eGeo=new THREE.EdgesGeometry(geo);
  edgeMesh=new THREE.LineSegments(eGeo,new THREE.LineBasicMaterial({color:0x88aacc,transparent:true,opacity:0.5}));
  edgeMesh.position.y=S.h/2;grp.add(edgeMesh);
  posHandles();
}

// ===== INTERACTION =====
// Modes: handle(resize) | imgadj(image adjust on face) | move(shift+drag box) | null(orbit)
let dragMode=null;
let dragDim=null, dragPlane=null, dragStart3D=null, dragDimStart=0;
let moveStart3D=null, movePosStart={x:0,z:0};
let selectedFace=null; // currently selected face key
let lastMX=0,lastMY=0;
const modeInfo=document.getElementById('mode-info');
const faceGroupMap=['left','right','top','bottom','front','back'];

function showMode(txt,dur){modeInfo.textContent=txt;modeInfo.classList.add('show');clearTimeout(modeInfo._t);modeInfo._t=setTimeout(()=>modeInfo.classList.remove('show'),dur||1500);}
function getMouse(e){const r=cvs3.getBoundingClientRect();mv.x=((e.clientX-r.left)/r.width)*2-1;mv.y=-((e.clientY-r.top)/r.height)*2+1;}

function selectFace(key){
  // Deselect previous
  if(selectedFace&&S.faces[selectedFace].mat){
    S.faces[selectedFace].mat.emissive&&S.faces[selectedFace].mat.emissive.setHex(0x000000);
  }
  selectedFace=key;
  if(key&&S.faces[key].mat){
    S.faces[key].mat.emissive.setHex(0x333300);
    showMode('[ '+FACES.find(f=>f.key===key).name+' ] 이미지 조절중 (드래그:이동 / 휠:크기 / Esc:해제)',3000);
  }
}

cvs3.addEventListener('pointerdown',e=>{
  if(e.button!==0)return;
  getMouse(e);lastMX=e.clientX;lastMY=e.clientY;
  raycaster.setFromCamera(mv,camera);

  // 1) Handles → resize
  const hHits=raycaster.intersectObjects(handleArr);
  if(hHits.length>0){
    const dim=hHits[0].object.userData.dim;
    dragMode='handle';dragDim=dim;dragDimStart=S[dim];
    ctrl.enabled=false;
    const ax=axes[dim];
    const camDir=camera.getWorldDirection(new THREE.Vector3());
    let pn=new THREE.Vector3().crossVectors(ax,camDir).cross(ax);
    if(pn.length()<0.001)pn.crossVectors(ax,camera.up).cross(ax);
    pn.normalize();
    dragPlane=new THREE.Plane().setFromNormalAndCoplanarPoint(pn,hHits[0].point);
    dragStart3D=hHits[0].point.clone();
    showMode({w:'가로(W) 조절',h:'높이(H) 조절',d:'깊이(D) 조절'}[dim]);
    e.stopImmediatePropagation();e.preventDefault();return;
  }

  // 2) Box face hit?
  if(boxMesh){
    const bHits=raycaster.intersectObject(boxMesh);
    if(bHits.length>0){
      const fi=bHits[0].faceIndex;
      const groupIdx=Math.floor(fi/2);
      const faceKey=faceGroupMap[groupIdx];

      if(e.shiftKey){
        // Shift+click → move box
        dragMode='move';ctrl.enabled=false;
        const gp=new THREE.Plane(new THREE.Vector3(0,1,0),0);
        const pt=new THREE.Vector3();raycaster.ray.intersectPlane(gp,pt);
        moveStart3D=pt.clone();movePosStart={x:S.px,z:S.pz};
        showMode('건물 이동 (Shift+드래그)');
      } else {
        // Normal click → select face for image adjustment
        selectFace(faceKey);
        dragMode='imgadj';ctrl.enabled=false;
      }
      e.stopImmediatePropagation();e.preventDefault();return;
    }
  }

  // 3) Click empty space → deselect face
  if(selectedFace){selectFace(null);}
},true);

window.addEventListener('pointermove',e=>{
  getMouse(e);
  raycaster.setFromCamera(mv,camera);

  if(dragMode==='handle'&&dragDim){
    const pt=new THREE.Vector3();
    if(!raycaster.ray.intersectPlane(dragPlane,pt))return;
    const diff=pt.clone().sub(dragStart3D);
    const dist=diff.dot(axes[dragDim]);
    const nv=Math.max(0.5,Math.round((dragDimStart+2*dist)*10)/10);
    if(Math.abs(nv-S[dragDim])>0.01){
      S[dragDim]=nv;
      document.getElementById('dim'+dragDim.toUpperCase()).value=nv.toFixed(1);
      rebuildGeo();
    }
    return;
  }

  if(dragMode==='imgadj'&&selectedFace){
    const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
    lastMX=e.clientX;lastMY=e.clientY;
    const fs=S.faces[selectedFace];
    if(!fs.img)return;
    // Screen pixel → proportional offset (sensitivity based on camera distance)
    const camDist=camera.position.distanceTo(ctrl.target);
    const sens=camDist*0.0003; // fine sensitivity
    fs.ox+=dx*sens;
    fs.oy+=dy*sens;
    updFace(selectedFace);
    return;
  }

  if(dragMode==='move'){
    const gp=new THREE.Plane(new THREE.Vector3(0,1,0),0);
    const pt=new THREE.Vector3();
    raycaster.ray.intersectPlane(gp,pt);
    if(pt&&moveStart3D){
      S.px=movePosStart.x+(pt.x-moveStart3D.x);
      S.pz=movePosStart.z+(pt.z-moveStart3D.z);
      grp.position.set(S.px,0,S.pz);
    }
    return;
  }

  // Hover effect on handles
  if(!dragMode){
    const hHits=raycaster.intersectObjects(handleArr);
    handleArr.forEach(h=>{
      const dim=h.userData.dim;
      const hov=hHits.length>0&&hHits[0].object===h;
      h.material.color.setHex(hov?hColorsHov[dim]:hColors[dim]);
      h.material.emissiveIntensity=hov?0.6:0.3;
      h.scale.setScalar(hov?1.3:1);
    });
    // Show face hover cursor
    if(boxMesh){
      const bHits=raycaster.intersectObject(boxMesh);
      cvs3.style.cursor=hHits.length>0?'pointer':bHits.length>0?'crosshair':'';
    }
  }
});

window.addEventListener('pointerup',()=>{
  if(dragMode){
    const wasDrag=dragMode;
    dragMode=null;dragDim=null;
    ctrl.enabled=true;
    // Keep selectedFace active after imgadj drag ends
    return;
  }
});

// Wheel on viewport: if face selected → scale image, else → camera zoom
cvs3.addEventListener('wheel',e=>{
  if(selectedFace&&S.faces[selectedFace]&&S.faces[selectedFace].img){
    e.preventDefault();e.stopPropagation();
    const fs=S.faces[selectedFace];
    const f=e.deltaY<0?1.03:0.97; // fine control
    if(e.shiftKey){fs.sy=Math.max(0.1,Math.min(10,fs.sy*f));}
    else{fs.sx=Math.max(0.1,Math.min(10,fs.sx*f));}
    updFace(selectedFace);
    const nm=FACES.find(fc=>fc.key===selectedFace).name;
    showMode(nm+' W:'+(fs.sx*100).toFixed(0)+'% H:'+(fs.sy*100).toFixed(0)+'%');
  }
},{capture:true,passive:false});

// Keyboard controls
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&selectedFace){selectFace(null);showMode('면 선택 해제');return;}
  if(document.activeElement&&document.activeElement.tagName==='INPUT')return;
  // Arrow keys: 선택된 면의 이미지 위치 이동
  if(selectedFace&&S.faces[selectedFace].img&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    e.preventDefault();
    const fs=S.faces[selectedFace];
    const step=e.shiftKey?0.1:0.02;
    if(e.key==='ArrowLeft') fs.ox-=step;
    if(e.key==='ArrowRight') fs.ox+=step;
    if(e.key==='ArrowUp') fs.oy-=step;
    if(e.key==='ArrowDown') fs.oy+=step;
    updFace(selectedFace);
    const nm=FACES.find(fc=>fc.key===selectedFace).name;
    showMode(nm+' 이미지 이동중');
  }
});

// ===== UI =====
function createUI(){
  const box=document.getElementById('faces');
  FACES.forEach(f=>{
    const card=document.createElement('div');card.className='face-card';card.dataset.key=f.key;
    const hdr=document.createElement('div');hdr.className='face-header';
    const h3=document.createElement('h3');h3.textContent=f.name;hdr.appendChild(h3);
    const acts=document.createElement('div');acts.className='face-actions';
    const ul=document.createElement('label');ul.className='upload-label';ul.textContent='선택';
    const fi=document.createElement('input');fi.type='file';fi.accept='image/*';
    fi.addEventListener('change',e=>{loadImg(f.key,e.target.files[0]);fi.value='';});
    ul.appendChild(fi);acts.appendChild(ul);
    const cb=document.createElement('button');cb.className='btn btn-sm btn-outline';cb.textContent='✕';cb.title='제거';
    cb.addEventListener('click',()=>{S.faces[f.key].img=null;S.faces[f.key].sx=1;S.faces[f.key].sy=1;S.faces[f.key].ox=0;S.faces[f.key].oy=0;fi.value='';updFace(f.key);
    });
    acts.appendChild(cb);
    const rb=document.createElement('button');rb.className='btn btn-sm btn-outline';rb.textContent='↺';rb.title='초기화';
    rb.addEventListener('click',()=>{S.faces[f.key].sx=1;S.faces[f.key].sy=1;S.faces[f.key].ox=0;S.faces[f.key].oy=0;updFace(f.key);});
    acts.appendChild(rb);
    const fb=document.createElement('button');fb.className='btn btn-sm';fb.textContent='꽉';fb.title='이미지를 면에 꽉 채우기';
    fb.style.cssText='background:#2980b9;padding:2px 6px';
    fb.addEventListener('click',()=>{fillFace(f.key);});
    acts.appendChild(fb);
    hdr.appendChild(acts);card.appendChild(hdr);
    const cvs=document.createElement('canvas');cvs.className='face-preview';
    S.faces[f.key].pc=cvs;card.appendChild(cvs);
    setupPrvDrag(cvs,f.key);
    // Arrow + size buttons
    const cb2=document.createElement('div');cb2.style.cssText='display:flex;gap:2px;justify-content:center;flex-wrap:wrap';
    const mb=(t,tip,fn)=>{const b=document.createElement('button');b.className='btn btn-sm btn-outline';b.textContent=t;b.title=tip;b.style.cssText='padding:1px 4px;font-size:9px;min-width:20px';b.addEventListener('click',e=>{fn(e.shiftKey?0.15:0.05);});return b;};
    // Click: 0.05 step, Shift+Click: 0.15 big step
    cb2.appendChild(mb('←','좌 (Shift:크게)',s=>{S.faces[f.key].ox-=s;updFace(f.key);}));
    cb2.appendChild(mb('→','우 (Shift:크게)',s=>{S.faces[f.key].ox+=s;updFace(f.key);}));
    cb2.appendChild(mb('↑','위 (Shift:크게)',s=>{S.faces[f.key].oy-=s;updFace(f.key);}));
    cb2.appendChild(mb('↓','아래 (Shift:크게)',s=>{S.faces[f.key].oy+=s;updFace(f.key);}));
    cb2.appendChild(mb('W+','가로 확대',s=>{S.faces[f.key].sx=Math.min(10,S.faces[f.key].sx*(1+s));updFace(f.key);}));
    cb2.appendChild(mb('W-','가로 축소',s=>{S.faces[f.key].sx=Math.max(0.1,S.faces[f.key].sx*(1-s));updFace(f.key);}));
    cb2.appendChild(mb('H+','세로 확대',s=>{S.faces[f.key].sy=Math.min(10,S.faces[f.key].sy*(1+s));updFace(f.key);}));
    cb2.appendChild(mb('H-','세로 축소',s=>{S.faces[f.key].sy=Math.max(0.1,S.faces[f.key].sy*(1-s));updFace(f.key);}));
    card.appendChild(cb2);
    const info=document.createElement('div');info.className='face-info';info.textContent='';card.appendChild(info);

    // Chroma key (배경색 제거)
    const ckRow=document.createElement('div');ckRow.style.cssText='display:flex;gap:3px;align-items:center;font-size:9px';
    const ckBtn=document.createElement('button');ckBtn.className='btn btn-sm btn-outline';ckBtn.textContent='배경제거';
    ckBtn.style.cssText='padding:1px 5px;font-size:9px';
    ckBtn.addEventListener('click',()=>{
      const fs=S.faces[f.key];fs.chromaOn=!fs.chromaOn;
      ckBtn.style.background=fs.chromaOn?'#e94560':'transparent';
      updFace(f.key);
    });
    ckRow.appendChild(ckBtn);
    const ckColor=document.createElement('input');ckColor.type='color';ckColor.value='#ffffff';
    ckColor.style.cssText='width:20px;height:18px;border:none;padding:0;cursor:pointer';
    ckColor.title='제거할 색상';
    ckColor.addEventListener('input',e=>{S.faces[f.key].chromaColor=e.target.value;if(S.faces[f.key].chromaOn)updFace(f.key);});
    ckRow.appendChild(ckColor);
    const ckLbl=document.createElement('span');ckLbl.textContent='허용:';ckLbl.style.color='#888';
    ckRow.appendChild(ckLbl);
    const ckRange=document.createElement('input');ckRange.type='range';ckRange.min='5';ckRange.max='150';ckRange.value='40';
    ckRange.style.cssText='width:60px;height:12px;cursor:pointer';
    ckRange.title='색상 허용 범위 (클수록 넓게 제거)';
    ckRange.addEventListener('input',e=>{S.faces[f.key].chromaTol=parseInt(e.target.value);if(S.faces[f.key].chromaOn)updFace(f.key);});
    ckRow.appendChild(ckRange);
    card.appendChild(ckRow);

    // Drop
    card.addEventListener('dragover',e=>{e.preventDefault();card.style.outline='2px solid #e94560';});
    card.addEventListener('dragleave',()=>{card.style.outline='none';});
    card.addEventListener('drop',e=>{e.preventDefault();card.style.outline='none';const file=e.dataTransfer.files[0];if(file&&file.type.startsWith('image/'))loadImg(f.key,file);});
    box.appendChild(card);
  });
}

function loadImg(key,file){
  if(!file)return;
  const img=new Image();
  img.onload=()=>{S.faces[key].img=img;S.faces[key].sx=1;S.faces[key].sy=1;S.faces[key].ox=0;S.faces[key].oy=0;fillFace(key);};
  img.src=URL.createObjectURL(file);
}

function setupPrvDrag(cvs,key){
  let drag=false,lx,ly;
  cvs.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;e.preventDefault();});
  window.addEventListener('mousemove',e=>{
    if(!drag)return;
    const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;
    const fs=S.faces[key];if(!fs.img)return;
    // Free move: fine sensitivity
    fs.ox+=dx/cvs.width*0.3;
    fs.oy+=dy/cvs.height*0.3;
    updFace(key);
  });
  window.addEventListener('mouseup',()=>{drag=false;});
  cvs.addEventListener('wheel',e=>{e.preventDefault();const fs=S.faces[key];if(!fs.img)return;
    const f=e.deltaY<0?1.03:0.97; // fine control
    if(e.shiftKey){fs.sy=Math.max(0.1,Math.min(10,fs.sy*f));}
    else{fs.sx=Math.max(0.1,Math.min(10,fs.sx*f));}
    updFace(key);},{passive:false});
}

// ===== DIM INPUTS =====
['dimW','dimH','dimD'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{
    const v=parseFloat(e.target.value);if(isNaN(v)||v<=0)return;
    S[id==='dimW'?'w':id==='dimH'?'h':'d']=v;rebuild();
  });
});
document.getElementById('dimTopDepth').addEventListener('input',e=>{
  const v=parseFloat(e.target.value);if(isNaN(v)||v<0)return;
  S.topDepth=Math.min(v,S.h-0.5);
  rebuildGeo();
});
function nudgeTopDepth(delta){
  S.topDepth=Math.max(0,Math.min(S.h-0.5, Math.round((S.topDepth+delta)*10)/10));
  document.getElementById('dimTopDepth').value=S.topDepth.toFixed(1);
  rebuildGeo();
}
document.getElementById('topUp').addEventListener('click',e=>{nudgeTopDepth(e.shiftKey?-1:-0.2);});
document.getElementById('topDown').addEventListener('click',e=>{nudgeTopDepth(e.shiftKey?1:0.2);});
// ===== BACKGROUND COLOR =====
function applyBg(color){
  S.bgColor=color;
  // Update button borders
  document.querySelectorAll('.bg-sel').forEach(b=>{
    b.style.borderColor=b.dataset.bg===color?'#e94560':'transparent';
  });
  if(color==='none'){
    scene.background=null;
    renderer.setClearColor(0x000000,0);
  } else {
    scene.background=new THREE.Color(color);
    renderer.setClearColor(new THREE.Color(color),1);
  }
}
document.querySelectorAll('.bg-sel').forEach(b=>{
  b.addEventListener('click',()=>applyBg(b.dataset.bg));
});
document.getElementById('bgCustomColor').addEventListener('input',e=>{
  applyBg(e.target.value);
});

document.getElementById('autoSizeBtn').addEventListener('click',()=>{
  const fr=S.faces.front.img;if(!fr){alert('정면 이미지를 먼저 업로드해주세요.');return;}
  let w=fr.width,h=fr.height;
  let d=S.faces.right.img?S.faces.right.img.width:(S.faces.left.img?S.faces.left.img.width:Math.round(w*0.6));
  const mx=Math.max(w,h,d),sc=10/mx;
  S.w=Math.round(w*sc*10)/10;S.h=Math.round(h*sc*10)/10;S.d=Math.round(d*sc*10)/10;
  document.getElementById('dimW').value=S.w;document.getElementById('dimH').value=S.h;document.getElementById('dimD').value=S.d;
  rebuild();
});
document.getElementById('allUploadBtn').addEventListener('click',()=>{
  const fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.multiple=true;
  fi.addEventListener('change',()=>{
    const files=Array.from(fi.files);
    const nm={front:'front',back:'back',right:'right',left:'left',top:'top',bottom:'bottom'};
    files.forEach(file=>{const fn=file.name.toLowerCase();for(const[kw,k]of Object.entries(nm)){if(fn.includes(kw)){loadImg(k,file);return;}}});
    const un=files.filter(file=>{const fn=file.name.toLowerCase();return!Object.keys(nm).some(k=>fn.includes(k));});
    const ef=FACES.map(f=>f.key).filter(k=>!S.faces[k].img);
    un.forEach((file,i)=>{if(i<ef.length)loadImg(ef[i],file);});
  });fi.click();
});
document.getElementById('resetPosBtn').addEventListener('click',()=>{
  S.px=0;S.pz=0;grp.position.set(0,0,0);
  ctrl.target.set(0,S.h/2,0);ctrl.update();
});

// ===== EXPORT =====
document.getElementById('exportBtn').addEventListener('click',()=>{
  if(!boxMesh)return;
  // Export mesh with world position
  const clone=boxMesh.clone();
  clone.position.set(S.px,S.h/2,S.pz);
  // Deep clone materials — alphaTest:0.5 → GLB alphaMode:MASK
  // Faces with images: image area opaque, rest transparent (invisible)
  // Faces without images: fully transparent (invisible)
  if(Array.isArray(clone.material)){
    clone.material=clone.material.map(m=>{
      if(!m)return m;
      const cm=m.clone();
      cm.transparent=false;
      cm.alphaTest=0.5;   // → GLTFExporter outputs alphaMode:"MASK", alphaCutoff:0.5
      cm.opacity=1;
      cm.visible=true;
      cm.metalness=0;
      cm.roughness=1;
      return cm;
    });
  }
  const exporter=new GLTFExporter();
  exporter.parse(clone,glb=>{
    const blob=new Blob([glb],{type:'application/octet-stream'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='building.glb';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
    // Cleanup
    if(Array.isArray(clone.material))clone.material.forEach(m=>m.dispose());
    clone.geometry.dispose();
  },err=>{alert('Export failed: '+err.message);},{binary:true});
});

// ===== LABELS =====
function updLabels(){
  const vp=document.getElementById('viewport');
  const rect=cvs3.getBoundingClientRect();
  [['w',handleMeshes.w],['h',handleMeshes.h],['d',handleMeshes.d]].forEach(([dim,hm])=>{
    const wp=new THREE.Vector3();hm.getWorldPosition(wp);
    const sp=wp.clone().project(camera);
    const x=(sp.x+1)/2*rect.width;
    const y=(-sp.y+1)/2*rect.height;
    const el=document.getElementById('label-'+dim);
    el.style.left=(x+12)+'px';el.style.top=(y-8)+'px';
    const label={w:'W',h:'H',d:'D'}[dim];
    el.textContent=`${label}: ${S[dim].toFixed(1)}m`;
    el.style.display=sp.z>1?'none':'block';
  });
}

// ===== RENDER =====
function onResize(){
  const vp=document.getElementById('viewport');
  camera.aspect=vp.clientWidth/vp.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(vp.clientWidth,vp.clientHeight);
}
window.addEventListener('resize',onResize);

function animate(){
  requestAnimationFrame(animate);
  ctrl.update();
  renderer.render(scene,camera);
  updLabels();
}

// ===== GLB LOAD =====
const matIdxToKey={};
FACES.forEach(f=>{matIdxToKey[f.matIdx]=f.key;});

const glbToast=document.getElementById('glb-toast');
function showGlbToast(msg,dur){
  glbToast.innerHTML=msg;glbToast.classList.add('show');
  clearTimeout(glbToast._t);glbToast._t=setTimeout(()=>glbToast.classList.remove('show'),dur||2500);
}

function extractTexToImg(texImage){
  return new Promise(resolve=>{
    const c=document.createElement('canvas');
    c.width=texImage.width||256;c.height=texImage.height||256;
    c.getContext('2d').drawImage(texImage,0,0);
    const img=new Image();
    img.onload=()=>resolve(img);
    img.src=c.toDataURL();
  });
}

document.getElementById('glbLoadBtn').addEventListener('click',()=>{
  document.getElementById('glbFileInput').click();
});
document.getElementById('glbFileInput').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  e.target.value='';
  showGlbToast('⏳ GLB 불러오는 중…',99999);
  const url=URL.createObjectURL(file);
  const loader=new GLTFLoader();
  loader.load(url,async gltf=>{
    URL.revokeObjectURL(url);
    let found=false;
    // collect all meshes first, pick the one with most materials
    const allMeshes=[];
    gltf.scene.traverse(obj=>{if(obj.isMesh)allMeshes.push(obj);});
    if(allMeshes.length===0){showGlbToast('⚠️ 메시를 찾을 수 없습니다',3000);return;}
    // prefer mesh with most material slots
    const obj=allMeshes.reduce((a,b)=>{
      const am=Array.isArray(a.material)?a.material.length:1;
      const bm=Array.isArray(b.material)?b.material.length:1;
      return bm>am?b:a;
    });
    {
      found=true;
      const mats=Array.isArray(obj.material)?obj.material:[obj.material];

      // --- dimensions from bounding box ---
      obj.geometry.computeBoundingBox();
      const bb=obj.geometry.boundingBox;
      const nw=Math.round((bb.max.x-bb.min.x)*10)/10;
      const nh=Math.round((bb.max.y-bb.min.y)*10)/10;
      const nd=Math.round((bb.max.z-bb.min.z)*10)/10;
      if(nw>0&&nh>0&&nd>0){
        S.w=nw;S.h=nh;S.d=nd;
        document.getElementById('dimW').value=S.w;
        document.getElementById('dimH').value=S.h;
        document.getElementById('dimD').value=S.d;
      }

      // --- clear existing images ---
      FACES.forEach(f=>{S.faces[f.key].img=null;S.faces[f.key].sx=1;S.faces[f.key].sy=1;S.faces[f.key].ox=0;S.faces[f.key].oy=0;});

      // --- extract textures async ---
      const promises=mats.map(async(mat,idx)=>{
        const key=matIdxToKey[idx];
        if(!key||!mat||!mat.map||!mat.map.image)return;
        try{
          const img=await extractTexToImg(mat.map.image);
          S.faces[key].img=img;
        }catch(err){console.warn('tex extract failed',key,err);}
      });

      Promise.all(promises).then(()=>{
        rebuild();
        // Fill each face after rebuild (tc exists now)
        FACES.forEach(f=>{if(S.faces[f.key].img)fillFace(f.key);});
        const loaded=FACES.filter(f=>S.faces[f.key].img).length;
        showGlbToast(`✅ GLB 로드 완료 (${loaded}/6면 텍스처)`,3000);
      });
    }
    if(!found){showGlbToast('⚠️ 메시를 찾을 수 없습니다',3000);}
  },undefined,err=>{URL.revokeObjectURL(url);showGlbToast('❌ 로드 실패: '+err.message,4000);});
});

// ===== INIT =====
createUI();onResize();rebuild();animate();
