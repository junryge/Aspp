<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AGV MAP Viewer - I3AV0BMap</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
#toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: #16213e; padding: 8px 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid #0f3460; font-size: 13px;
}
#toolbar h1 { font-size: 16px; color: #e94560; margin-right: 16px; }
#toolbar label { color: #aaa; }
#toolbar input[type=checkbox] { margin-right: 4px; }
#toolbar select, #toolbar input[type=text] {
  background: #0f3460; color: #eee; border: 1px solid #555; padding: 3px 8px; border-radius: 3px;
}
#toolbar button {
  background: #e94560; color: #fff; border: none; padding: 5px 12px; border-radius: 3px; cursor: pointer;
}
#toolbar button:hover { background: #c73652; }
#info {
  position: fixed; bottom: 10px; left: 10px; z-index: 10;
  background: rgba(22,33,62,0.9); padding: 8px 14px; border-radius: 5px;
  font-size: 12px; color: #aaa; border: 1px solid #0f3460;
}
#tooltip {
  position: fixed; display: none; z-index: 20;
  background: rgba(15,52,96,0.95); padding: 10px 14px; border-radius: 6px;
  font-size: 12px; color: #eee; border: 1px solid #e94560; pointer-events: none;
  max-width: 280px;
}
#tooltip .eq-name { color: #e94560; font-weight: bold; font-size: 14px; }
#tooltip .eq-type { color: #53d8fb; }
#legend {
  position: fixed; top: 50px; right: 10px; z-index: 10;
  background: rgba(22,33,62,0.9); padding: 10px 14px; border-radius: 5px;
  font-size: 12px; border: 1px solid #0f3460;
}
#legend div { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
#legend span.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
canvas { display: block; cursor: grab; }
canvas:active { cursor: grabbing; }
#loading {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 20px; color: #e94560; z-index: 100;
}
</style>
</head>
<body>

<div id="toolbar">
  <h1>AGV MAP Viewer</h1>
  <label><input type="checkbox" id="showEdges" checked> Edges</label>
  <label><input type="checkbox" id="showNodes" checked> Nodes</label>
  <label><input type="checkbox" id="showEquip" checked> Equipment</label>
  <label><input type="checkbox" id="showLabels"> Labels</label>
  <select id="filterType">
    <option value="ALL">All Types</option>
    <option value="Sorter">Sorter</option>
    <option value="Chamber">Chamber</option>
    <option value="Buffer">Buffer</option>
    <option value="CHARGER">CHARGER</option>
    <option value="LIFT">LIFT</option>
  </select>
  <input type="text" id="searchEq" placeholder="Search EQ_NAME..." style="width:140px;">
  <button id="btnSearch">Search</button>
  <button id="btnReset">Reset View</button>
  <span style="margin-left:auto; color:#666;">Scroll=Zoom | Drag=Pan | Click=Info</span>
</div>

<div id="legend">
  <div><span class="dot" style="background:#e94560;"></span> Sorter</div>
  <div><span class="dot" style="background:#53d8fb;"></span> Chamber</div>
  <div><span class="dot" style="background:#4ecca3;"></span> Buffer</div>
  <div><span class="dot" style="background:#ffd700;"></span> CHARGER</div>
  <div><span class="dot" style="background:#ff6b6b;"></span> LIFT</div>
  <div><span class="dot" style="background:#555;"></span> Node (no equip)</div>
</div>

<div id="tooltip"></div>
<div id="info">Loading...</div>
<div id="loading">Loading AGV MAP...</div>

<canvas id="canvas"></canvas>

<script>
const EQ_COLORS = {
  'Sorter':  '#e94560',
  'Chamber': '#53d8fb',
  'Buffer':  '#4ecca3',
  'CHARGER': '#ffd700',
  'LIFT':    '#ff6b6b'
};

let nodes = [];
let edges = [];
let nodesById = {};
let equipNodes = [];

// Transform state
let offsetX = 0, offsetY = 0, scale = 1;
let dragging = false, dragStartX = 0, dragStartY = 0;
let hoveredNode = null;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); draw(); });
resizeCanvas();

// Parse XML
fetch('I3AV0BMap.xml')
  .then(r => r.text())
  .then(xml => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');

    // Parse nodes
    const nodeEls = doc.querySelectorAll('NODES > NODE');
    nodeEls.forEach(n => {
      const id = parseInt(n.querySelector('ID').textContent);
      const x = parseInt(n.querySelector('Position > X').textContent);
      const y = parseInt(n.querySelector('Position > Y').textContent);
      const node = { id, x, y, eq: null };

      const eqEl = n.querySelector('Equipment');
      if (eqEl) {
        node.eq = {
          name: eqEl.querySelector('EQ_NAME')?.textContent || '',
          type: eqEl.querySelector('EQ_TYPE')?.textContent || '',
          slot: eqEl.querySelector('EQ_SLOT')?.textContent || '',
          deg: eqEl.querySelector('EQ_DEG')?.textContent || '',
          alias: eqEl.querySelector('EQ_ALIAS')?.textContent || ''
        };
        equipNodes.push(node);
      }
      nodes.push(node);
      nodesById[id] = node;
    });

    // Parse edges
    const edgeEls = doc.querySelectorAll('EDGES > EDGE');
    edgeEls.forEach(e => {
      const from = parseInt(e.querySelector('ND_FROM').textContent);
      const to = parseInt(e.querySelector('ND_TO').textContent);
      edges.push({ from, to });
    });

    document.getElementById('loading').style.display = 'none';
    resetView();
    draw();
    updateInfo();
  })
  .catch(err => {
    document.getElementById('loading').textContent = 'Error loading XML: ' + err.message;
  });

function resetView() {
  if (nodes.length === 0) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    if (n.x < minX) minX = n.x;
    if (n.x > maxX) maxX = n.x;
    if (n.y < minY) minY = n.y;
    if (n.y > maxY) maxY = n.y;
  });
  const pad = 80;
  const w = canvas.width - pad * 2;
  const h = canvas.height - pad * 2;
  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;
  scale = Math.min(w / rangeX, h / rangeY);
  offsetX = pad - minX * scale + (w - rangeX * scale) / 2;
  offsetY = pad - minY * scale + (h - rangeY * scale) / 2;
}

function worldToScreen(wx, wy) {
  return [wx * scale + offsetX, wy * scale + offsetY];
}

function screenToWorld(sx, sy) {
  return [(sx - offsetX) / scale, (sy - offsetY) / scale];
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const showEdges = document.getElementById('showEdges').checked;
  const showNodes = document.getElementById('showNodes').checked;
  const showEquip = document.getElementById('showEquip').checked;
  const showLabels = document.getElementById('showLabels').checked;
  const filter = document.getElementById('filterType').value;

  // Draw edges
  if (showEdges) {
    ctx.strokeStyle = 'rgba(80,80,120,0.35)';
    ctx.lineWidth = Math.max(0.5, scale * 80);
    if (ctx.lineWidth > 2) ctx.lineWidth = 2;
    ctx.beginPath();
    edges.forEach(e => {
      const nf = nodesById[e.from];
      const nt = nodesById[e.to];
      if (!nf || !nt) return;
      const [x1, y1] = worldToScreen(nf.x, nf.y);
      const [x2, y2] = worldToScreen(nt.x, nt.y);
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
    });
    ctx.stroke();
  }

  // Draw nodes
  if (showNodes) {
    const r = Math.max(1.5, Math.min(4, scale * 300));
    nodes.forEach(n => {
      if (n.eq) return; // draw equip nodes separately
      const [sx, sy] = worldToScreen(n.x, n.y);
      if (sx < -20 || sx > canvas.width + 20 || sy < -20 || sy > canvas.height + 20) return;
      ctx.fillStyle = '#444';
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // Draw equipment nodes
  if (showEquip) {
    const r = Math.max(3, Math.min(10, scale * 600));
    equipNodes.forEach(n => {
      if (filter !== 'ALL' && n.eq.type !== filter) return;
      const [sx, sy] = worldToScreen(n.x, n.y);
      if (sx < -20 || sx > canvas.width + 20 || sy < -20 || sy > canvas.height + 20) return;
      const color = EQ_COLORS[n.eq.type] || '#888';
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fill();

      // Highlight border
      if (n === hoveredNode) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // Labels
      if (showLabels && scale > 0.008) {
        ctx.fillStyle = '#fff';
        ctx.font = `${Math.max(8, Math.min(12, scale * 800))}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(n.eq.name, sx, sy - r - 3);
      }
    });
  }

  // Search highlight
  const searchVal = document.getElementById('searchEq').value.trim().toUpperCase();
  if (searchVal) {
    equipNodes.forEach(n => {
      if (n.eq.name.toUpperCase().includes(searchVal)) {
        const [sx, sy] = worldToScreen(n.x, n.y);
        const r = Math.max(8, Math.min(18, scale * 1200));
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(n.eq.name, sx, sy - r - 5);
      }
    });
  }
}

function updateInfo() {
  document.getElementById('info').innerHTML =
    `Nodes: <b>${nodes.length}</b> | Edges: <b>${edges.length}</b> | ` +
    `Equipment: <b>${equipNodes.length}</b> | ` +
    `Zoom: <b>${(scale * 100).toFixed(1)}%</b>`;
}

// Mouse events
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const mx = e.clientX, my = e.clientY;
  const [wx, wy] = screenToWorld(mx, my);
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  scale *= factor;
  offsetX = mx - wx * scale;
  offsetY = my - wy * scale;
  draw();
  updateInfo();
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStartX = e.clientX - offsetX;
  dragStartY = e.clientY - offsetY;
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    offsetX = e.clientX - dragStartX;
    offsetY = e.clientY - dragStartY;
    draw();
    updateInfo();
    return;
  }

  // Hover detection
  const mx = e.clientX, my = e.clientY;
  const [wx, wy] = screenToWorld(mx, my);
  const threshold = Math.max(500, 8 / scale);
  let closest = null, closestDist = Infinity;

  equipNodes.forEach(n => {
    const dx = n.x - wx, dy = n.y - wy;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < threshold && d < closestDist) {
      closestDist = d;
      closest = n;
    }
  });

  hoveredNode = closest;
  const tooltip = document.getElementById('tooltip');
  if (closest) {
    tooltip.style.display = 'block';
    tooltip.style.left = (mx + 15) + 'px';
    tooltip.style.top = (my - 10) + 'px';
    tooltip.innerHTML =
      `<div class="eq-name">${closest.eq.name}</div>` +
      `<div class="eq-type">${closest.eq.type}</div>` +
      `<div>Alias: ${closest.eq.alias}</div>` +
      `<div>Slot: ${closest.eq.slot}</div>` +
      `<div>Degree: ${closest.eq.deg}°</div>` +
      `<div>Node ID: ${closest.id}</div>` +
      `<div>Position: (${closest.x}, ${closest.y})</div>`;
  } else {
    tooltip.style.display = 'none';
  }
  draw();
});

canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mouseleave', () => {
  dragging = false;
  hoveredNode = null;
  document.getElementById('tooltip').style.display = 'none';
  draw();
});

// Controls
['showEdges', 'showNodes', 'showEquip', 'showLabels', 'filterType'].forEach(id => {
  document.getElementById(id).addEventListener('change', draw);
});

document.getElementById('btnSearch').addEventListener('click', draw);
document.getElementById('searchEq').addEventListener('keyup', e => { if (e.key === 'Enter') draw(); });
document.getElementById('btnReset').addEventListener('click', () => { resetView(); draw(); updateInfo(); });
</script>
</body>
</html>
