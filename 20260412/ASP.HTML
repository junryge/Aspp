<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그 XML 태그 분석기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, "Segoe UI", "Noto Sans KR", sans-serif; background: #f1f5f9; color: #0f172a; font-size: 13px; }
  body { display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  header { background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  h1 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .actions { display: flex; gap: 6px; }
  .btn { padding: 6px 12px; font-size: 12px; border: 1px solid #cbd5e1; background: white; border-radius: 4px; cursor: pointer; }
  .btn:hover { background: #f8fafc; }
  .btn-primary { background: #2563eb; color: white; border-color: #2563eb; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-danger { background: white; color: #dc2626; border-color: #fca5a5; }
  .btn-danger:hover { background: #fef2f2; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* DropZone */
  .dropzone-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
  .dropzone { width: 100%; max-width: 700px; border: 2px dashed #cbd5e1; border-radius: 12px; padding: 80px 20px; text-align: center; background: white; cursor: pointer; transition: all 0.15s; }
  .dropzone:hover { border-color: #94a3b8; background: #f8fafc; }
  .dropzone.dragging { border-color: #2563eb; background: #eff6ff; transform: scale(1.005); }
  .dz-icon { font-size: 48px; color: #cbd5e1; margin-bottom: 12px; }
  .dz-title { font-size: 18px; font-weight: 600; color: #334155; margin-bottom: 6px; }
  .dz-sub { font-size: 13px; color: #64748b; }

  /* Main Grid */
  .main { flex: 1; display: grid; grid-template-columns: 320px 1fr; gap: 12px; padding: 12px; overflow: hidden; }

  /* Sidebar */
  .sidebar { background: white; border: 1px solid #e2e8f0; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; }
  .sidebar-title { font-size: 12px; font-weight: 700; color: #334155; text-transform: uppercase; letter-spacing: 0.05em; }
  .sidebar-stats { margin-top: 4px; font-size: 11px; color: #64748b; }
  .selected-tag-info { padding: 10px 16px; border-bottom: 1px solid #e2e8f0; background: #eff6ff; font-size: 12px; color: #1e40af; display: flex; justify-content: space-between; align-items: center; }
  .selected-tag-info .clear-btn { font-size: 11px; color: #2563eb; cursor: pointer; background: none; border: none; }
  .selected-tag-info .clear-btn:hover { text-decoration: underline; }
  .tag-list { flex: 1; overflow-y: auto; padding: 8px; }
  .tag-row { padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; transition: background 0.1s; }
  .tag-row:hover { background: #f1f5f9; }
  .tag-row.active { background: #dbeafe; }
  .tag-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .tag-name { font-weight: 600; font-size: 12px; color: #1e293b; word-break: break-all; }
  .tag-count { font-family: ui-monospace, monospace; font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 3px; background: #e2e8f0; color: #334155; }
  .tag-row.active .tag-count { background: #2563eb; color: white; }
  .tag-bar-track { height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden; }
  .tag-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

  /* Content */
  .content { display: flex; flex-direction: column; gap: 12px; overflow: hidden; }

  /* Log Table */
  .log-table-wrap { flex: 1; background: white; border: 1px solid #e2e8f0; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .toolbar { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; background: #f8fafc; }
  .input { padding: 5px 10px; font-size: 12px; border: 1px solid #cbd5e1; border-radius: 4px; outline: none; background: white; }
  .input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px #dbeafe; }
  .input-search { flex: 1; min-width: 200px; }
  .table-scroll { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead { position: sticky; top: 0; background: #f8fafc; z-index: 1; }
  th { padding: 8px 10px; text-align: left; font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: 700; border-bottom: 1px solid #e2e8f0; }
  tbody tr { border-bottom: 1px solid #f1f5f9; cursor: pointer; }
  tbody tr:hover { background: #eff6ff; }
  tbody tr.selected { background: #dbeafe; }
  td { padding: 6px 10px; font-size: 12px; vertical-align: top; }
  .mono { font-family: ui-monospace, monospace; font-size: 11px; }
  .level-chip { display: inline-block; padding: 1px 6px; font-size: 10px; font-weight: 700; border-radius: 3px; font-family: ui-monospace, monospace; }
  .level-INFO { background: #dbeafe; color: #1e40af; }
  .level-WARN { background: #fef3c7; color: #92400e; }
  .level-ERROR { background: #fee2e2; color: #991b1b; }
  .level-DEBUG { background: #e0e7ff; color: #3730a3; }
  .level-TRACE { background: #f1f5f9; color: #475569; }
  .tag-chip { display: inline-block; padding: 1px 6px; font-size: 10px; font-weight: 600; border-radius: 3px; font-family: ui-monospace, monospace; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; }
  .preview { color: #64748b; font-size: 11px; max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Viewer */
  .viewer-wrap { height: 38%; background: white; border: 1px solid #e2e8f0; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; min-height: 200px; }
  .viewer-tabs { display: flex; border-bottom: 1px solid #e2e8f0; background: #f8fafc; }
  .viewer-tab { padding: 8px 14px; font-size: 12px; font-weight: 500; color: #64748b; background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
  .viewer-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: white; }
  .viewer-tab:hover:not(.active) { color: #0f172a; }
  .viewer-content { flex: 1; overflow: auto; padding: 12px 16px; font-family: ui-monospace, monospace; font-size: 11px; white-space: pre; color: #334155; }
  .viewer-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 13px; }

  /* JSON syntax highlight */
  .j-key { color: #2563eb; }
  .j-str { color: #059669; }
  .j-num { color: #7c3aed; }
  .j-bool { color: #db2777; }
  .j-null { color: #64748b; }

  /* XML syntax highlight */
  .x-tag { color: #2563eb; }
  .x-tagname { color: #dc2626; font-weight: 600; }
  .x-attr { color: #7c3aed; }
  .x-val { color: #059669; }
  .x-text { color: #334155; }

  /* Pagination */
  .pagination { padding: 8px 12px; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; font-size: 12px; background: #f8fafc; }
  .page-btn { padding: 3px 10px; font-size: 11px; border: 1px solid #cbd5e1; background: white; border-radius: 3px; cursor: pointer; margin: 0 2px; }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .page-btn:not(:disabled):hover { background: #f8fafc; }

  .empty-msg { padding: 40px; text-align: center; color: #94a3b8; font-size: 13px; }
  .hidden { display: none !important; }
  .loading { padding: 40px; text-align: center; color: #64748b; }

  /* Stat badge */
  .mini-stats { display: flex; gap: 12px; font-size: 11px; color: #64748b; padding: 8px 16px; border-bottom: 1px solid #e2e8f0; }
  .mini-stats b { color: #0f172a; font-weight: 700; font-family: ui-monospace, monospace; }
</style>
</head>
<body>

<header>
  <h1>📊 로그 XML 태그 분석기</h1>
  <div class="actions">
    <button class="btn btn-primary" onclick="document.getElementById('fileInput2').click()">📁 파일 선택</button>
    <button class="btn" id="btn-dl-json" onclick="downloadJSON()" disabled>⬇ JSON</button>
    <button class="btn" id="btn-dl-csv" onclick="downloadCSV()" disabled>⬇ CSV</button>
    <button class="btn btn-danger" id="btn-clear" onclick="clearAll()" disabled>🗑 초기화</button>
    <input type="file" id="fileInput2" multiple accept=".log,.txt" style="display:none" onchange="handleFiles(this.files)">
  </div>
</header>

<!-- Dropzone (초기) -->
<div class="dropzone-wrap" id="dropzoneWrap">
  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" multiple accept=".log,.txt" style="display:none">
    <div class="dz-icon">📄</div>
    <div class="dz-title">로그 파일을 여기에 드래그</div>

  </div>
</div>

<div class="loading hidden" id="loading">파싱 중...</div>

<!-- Main -->
<div class="main hidden" id="main">
  <!-- 좌측: 태그 통계 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">📑 태그 통계</div>

  </aside>

  <!-- 우측 -->
  <section class="content">
    <!-- 상단: 로그 테이블 -->

      <div class="mini-stats">
        <div>전체 <b id="ms-total">0</b></div>
        <div>XML 포함 <b id="ms-xml">0</b></div>
        <div>태그 종류 <b id="ms-tagcount">0</b></div>
      </div>
      <div class="toolbar">
        <input type="text" class="input input-search" id="search" placeholder="🔍 검색 (전체 로그 · 타임스탬프 · 클래스 · XML 내용)" oninput="setPage(0); render()">
        <select class="input" id="filter-level" onchange="setPage(0); render()">
          <option value="">전체 레벨</option>
          <option value="INFO">INFO</option>
          <option value="WARN">WARN</option>
          <option value="ERROR">ERROR</option>

          <option value="TRACE">TRACE</option>

          <option value="">XML 유무 전체</option>

        </select>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:160px">시간</th>
              <th style="width:60px">레벨</th>
              <th style="width:60px">Thread</th>
              <th style="width:180px">XML 태그</th>
              <th>미리보기</th>
            </tr>
          </thead>
          <tbody id="log-tbody"></tbody>
        </table>
        <div class="empty-msg hidden" id="log-empty">조건에 맞는 로그 없음</div>
      </div>
      <div class="pagination">
        <div id="page-info" style="color:#475569"></div>
        <div>
          <button class="page-btn" id="page-prev" onclick="prevPage()">이전</button>

          <button class="page-btn" id="page-next" onclick="nextPage()">다음</button>

    </div>

    <!-- 하단: 뷰어 -->
    <div class="viewer-wrap">
      <div class="viewer-tabs">
        <button class="viewer-tab active" data-view="json" onclick="switchView('json')">JSON</button>
        <button class="viewer-tab" data-view="xml" onclick="switchView('xml')">XML 원본</button>
        <button class="viewer-tab" data-view="raw" onclick="switchView('raw')">전체 로그</button>
        <button class="viewer-tab" data-view="meta" onclick="switchView('meta')">메타정보</button>
      </div>
      <div class="viewer-content hidden" id="viewer-content"></div>
      <div class="viewer-empty" id="viewer-empty">로그 행을 클릭하면 상세 내용이 표시됩니다</div>
    </div>
  </section>
</div>

<script>
// ============================================================
// 1. 로그 파싱
// ============================================================

// [timestamp] [ level] [threadId] [class] - message
// 레벨/threadId 좌측 공백 패딩 허용 ([ INFO], [            main])
const LOG_LINE_RE = /^\[([^\]]+)\]\s*\[\s*(\w+)\s*\]\s*\[\s*([^\]]*?)\s*\]\s*\[([^\]]+)\]\s*-\s*(.*)$/;

function parseLogText(text, filename) {
  const lines = text.split(/\r?\n/);
  const entries = [];
  let current = null;

  for (let idx = 0; idx < lines.length; idx++) {
    const line = lines[idx];
    const m = line.match(LOG_LINE_RE);
    if (m) {
      if (current) {
        finalizeEntry(current);
        entries.push(current);
      }
      current = {
        timestamp: m[1].trim(),
        level: m[2].toUpperCase(),
        threadId: m[3].trim(),
        class: m[4].trim(),
        message: m[5] || '',
        rawLog: line,
        xmlTag: null,
        xmlContent: null,
        jsonContent: null,
        srcFile: filename,
        lineNo: idx + 1,
      };
    } else if (current) {
      current.message += '\n' + line;
      current.rawLog += '\n' + line;
    }
  }
  if (current) { finalizeEntry(current); entries.push(current); }
  return entries;
}

function finalizeEntry(entry) {
  const xml = extractXml(entry.message);
  if (xml) {
    entry.xmlTag = xml.tag;
    entry.xmlContent = xml.content;
    try {
      entry.jsonContent = xmlToJson(xml.content);
    } catch (e) {
      entry.jsonContent = { _parseError: e.message };
    }
  }
}

// 메시지에서 최상단 XML 블록 추출
function extractXml(message) {
  let text = message.replace(/<\?xml[^?]*\?>/g, '');
  const m = text.match(/<([A-Za-z][A-Za-z0-9_\-]*)(\s|>|\/)/);
  if (!m) return null;
  const tagName = m[1];
  const tagStart = text.indexOf(m[0]);

  // self-closing 확인
  const selfClosingRe = new RegExp(`<${escRe(tagName)}[^>]*\\/>`);
  const scMatch = text.slice(tagStart).match(selfClosingRe);
  if (scMatch && scMatch.index === 0) {
    return { tag: tagName, content: scMatch[0] };
  }

  // 닫는 태그 매칭 (같은 이름 nested 고려 → 카운트)
  const openRe = new RegExp(`<${escRe(tagName)}(\\s[^>]*)?>`, 'g');
  const closeRe = new RegExp(`</${escRe(tagName)}\\s*>`, 'g');
  let depth = 0;
  let pos = tagStart;
  let scanPos = tagStart;
  while (scanPos < text.length) {
    openRe.lastIndex = scanPos;
    closeRe.lastIndex = scanPos;
    const oM = openRe.exec(text);
    const cM = closeRe.exec(text);
    if (!cM) return null;
    if (oM && oM.index < cM.index) {
      depth++;
      scanPos = oM.index + oM[0].length;
    } else {
      depth--;
      scanPos = cM.index + cM[0].length;
      if (depth === 0) {
        return { tag: tagName, content: text.slice(tagStart, cM.index + cM[0].length) };
      }
    }
  }
  return null;
}

function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ============================================================
// 2. XML → JSON 변환 (자체 구현)
// ============================================================

class XMLParser {
  constructor(text) { this.text = text; this.pos = 0; this.n = text.length; }
  skipWs() { while (this.pos < this.n && /\s/.test(this.text[this.pos])) this.pos++; }

  parse() {
    // <?xml?> skip
    while (true) {
      this.skipWs();
      if (this.text.startsWith('<?', this.pos)) {
        const e = this.text.indexOf('?>', this.pos);
        this.pos = e === -1 ? this.n : e + 2;
      } else if (this.text.startsWith('<!--', this.pos)) {
        const e = this.text.indexOf('-->', this.pos);
        this.pos = e === -1 ? this.n : e + 3;
      } else break;
    }
    return this.parseElement();
  }

  parseElement() {
    this.skipWs();
    if (this.text[this.pos] !== '<') return null;
    this.pos++;

    // name
    const ns = this.pos;
    while (this.pos < this.n && /[A-Za-z0-9_\-:.]/.test(this.text[this.pos])) this.pos++;
    const name = this.text.slice(ns, this.pos);
    if (!name) return null;

    // attrs
    const attrs = {};
    while (true) {
      this.skipWs();
      if (this.pos >= this.n) break;
      const c = this.text[this.pos];
      if (c === '>' || c === '/') break;
      const as = this.pos;
      while (this.pos < this.n && /[A-Za-z0-9_\-:.]/.test(this.text[this.pos])) this.pos++;
      const aName = this.text.slice(as, this.pos);
      if (!aName) { this.pos++; continue; }
      this.skipWs();
      if (this.text[this.pos] === '=') {
        this.pos++;
        this.skipWs();
        const q = this.text[this.pos];
        if (q === '"' || q === "'") {
          this.pos++;
          const vs = this.pos;
          while (this.pos < this.n && this.text[this.pos] !== q) this.pos++;
          attrs[aName] = decodeEntities(this.text.slice(vs, this.pos));
          if (this.pos < this.n) this.pos++;
        }
      } else {
        attrs[aName] = true;
      }
    }

    // self-closing
    if (this.text[this.pos] === '/') {
      this.pos++;
      if (this.text[this.pos] === '>') this.pos++;
      return { name, attrs, text: '', children: [] };
    }
    if (this.text[this.pos] === '>') this.pos++;

    // content
    const children = [];
    let textBuf = '';
    while (this.pos < this.n) {
      if (this.text.startsWith('</', this.pos)) {
        const e = this.text.indexOf('>', this.pos);
        this.pos = e === -1 ? this.n : e + 1;
        break;
      }
      if (this.text.startsWith('<!--', this.pos)) {
        const e = this.text.indexOf('-->', this.pos);
        this.pos = e === -1 ? this.n : e + 3;
        continue;
      }
      if (this.text.startsWith('<![CDATA[', this.pos)) {
        const e = this.text.indexOf(']]>', this.pos);
        textBuf += this.text.slice(this.pos + 9, e === -1 ? this.n : e);
        this.pos = e === -1 ? this.n : e + 3;
        continue;
      }
      if (this.text[this.pos] === '<') {
        const child = this.parseElement();
        if (child) children.push(child);
        else this.pos++;
      } else {
        textBuf += this.text[this.pos];
        this.pos++;
      }
    }
    return { name, attrs, text: decodeEntities(textBuf.trim()), children };
  }
}

function decodeEntities(s) {
  return s.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&')
          .replace(/&quot;/g, '"').replace(/&apos;/g, "'")
          .replace(/&#(\d+);/g, (_, n) => String.fromCharCode(parseInt(n, 10)))
          .replace(/&#x([0-9a-fA-F]+);/g, (_, n) => String.fromCharCode(parseInt(n, 16)));
}

function nodeToValue(node) {
  const hasAttrs = Object.keys(node.attrs).length > 0;
  const hasChildren = node.children.length > 0;
  const hasText = node.text && node.text.length > 0;

  if (!hasAttrs && !hasChildren) return hasText ? coerceScalar(node.text) : '';

  const result = {};
  if (hasAttrs) result._attrs = node.attrs;

  if (hasChildren) {
    const byName = {};
    for (const child of node.children) {
      if (!(child.name in byName)) byName[child.name] = [];
      byName[child.name].push(nodeToValue(child));
    }
    for (const [n, arr] of Object.entries(byName)) {
      result[n] = arr.length === 1 ? arr[0] : arr;
    }
  }

  if (hasText) result._text = coerceScalar(node.text);
  return result;
}

function coerceScalar(s) {
  if (s === 'true') return true;
  if (s === 'false') return false;
  // 15자리 이상 정수는 JS number 정밀도 한계 → 문자열 유지 (transactionId 등)
  if (/^-?\d+$/.test(s)) {
    if (s.length > 15) return s;
    return parseInt(s, 10);
  }
  if (/^-?\d+\.\d+$/.test(s)) return parseFloat(s);
  return s;
}

function xmlToJson(xmlStr) {
  const parser = new XMLParser(xmlStr);
  const root = parser.parse();
  if (!root) return {};
  return { [root.name]: nodeToValue(root) };
}

// ============================================================
// 3. 상태 및 UI
// ============================================================

const state = {
  entries: [],
  files: [],
  selectedTag: null,
  selectedIdx: null,
  view: 'json',
  page: 0,
  PAGE_SIZE: 100,
};

const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const TAG_COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16','#06b6d4','#d946ef'];
function tagColor(tag) {
  if (!tag) return '#94a3b8';
  let h = 0;
  for (let i = 0; i < tag.length; i++) h = (h * 31 + tag.charCodeAt(i)) >>> 0;
  return TAG_COLORS[h % TAG_COLORS.length];
}

async function handleFiles(fileList) {
  if (!fileList || fileList.length === 0) return;
  $('dropzoneWrap').classList.add('hidden');
  $('loading').classList.remove('hidden');
  await new Promise(r => setTimeout(r, 10));

  for (const f of Array.from(fileList)) {
    if (!/\.(log|txt)$/i.test(f.name)) continue;
    state.files.push(f.name);
    try {
      const text = await f.text();
      const entries = parseLogText(text, f.name);
      state.entries.push(...entries);
    } catch (e) { console.error('파싱 실패', f.name, e); }
  }

  state.entries.sort((a, b) => a.timestamp < b.timestamp ? -1 : a.timestamp > b.timestamp ? 1 : 0);
  // 정렬 후 인덱스 부여 (indexOf O(n) 회피, 10만행 대응)
  for (let i = 0; i < state.entries.length; i++) state.entries[i]._idx = i;

  $('loading').classList.add('hidden');
  $('main').classList.remove('hidden');
  ['btn-dl-json', 'btn-dl-csv', 'btn-clear'].forEach(id => $(id).disabled = false);
  render();
}

function clearAll() {
  state.entries = []; state.files = []; state.selectedTag = null; state.selectedIdx = null;
  state.page = 0; state.view = 'json';
  $('main').classList.add('hidden');
  $('dropzoneWrap').classList.remove('hidden');
  ['btn-dl-json', 'btn-dl-csv', 'btn-clear'].forEach(id => $(id).disabled = true);
  $('search').value = ''; $('filter-level').value = ''; $('filter-xml').value = '';
  $('viewer-empty').classList.remove('hidden');
  $('viewer-content').classList.add('hidden');
}

function selectTag(tag) {
  state.selectedTag = tag;
  state.page = 0;
  render();
}

function setPage(p) { state.page = p; }
function prevPage() { if (state.page > 0) { state.page--; render(); } }
function nextPage() {
  const filtered = getFiltered();
  const maxP = Math.max(0, Math.ceil(filtered.length / state.PAGE_SIZE) - 1);
  if (state.page < maxP) { state.page++; render(); }
}

function getFiltered() {
  const q = ($('search')?.value || '').toLowerCase();
  const lvl = $('filter-level')?.value || '';
  const xml = $('filter-xml')?.value || '';
  let out = state.entries;
  if (state.selectedTag) out = out.filter(e => e.xmlTag === state.selectedTag);
  if (lvl) out = out.filter(e => e.level === lvl);
  if (xml === 'has') out = out.filter(e => !!e.xmlTag);
  else if (xml === 'none') out = out.filter(e => !e.xmlTag);
  if (q) {
    out = out.filter(e =>
      (e.rawLog || '').toLowerCase().includes(q) ||
      (e.class || '').toLowerCase().includes(q) ||
      (e.xmlContent || '').toLowerCase().includes(q) ||
      (e.timestamp || '').toLowerCase().includes(q) ||
      (e.xmlTag || '').toLowerCase().includes(q)
    );
  }
  return out;
}

function render() {
  // 태그 카운트
  const tagCounts = {};
  let xmlCount = 0;
  for (const e of state.entries) {
    if (e.xmlTag) {
      tagCounts[e.xmlTag] = (tagCounts[e.xmlTag] || 0) + 1;
      xmlCount++;
    }
  }
  const tagEntries = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
  const maxCount = tagEntries.length ? tagEntries[0][1] : 1;

  // Sidebar
  $('sidebar-stats').textContent = `총 ${state.entries.length.toLocaleString()}건 · XML ${xmlCount.toLocaleString()}건`;
  $('selected-tag-label').textContent = state.selectedTag || '전체';
  $('clear-tag-btn').style.visibility = state.selectedTag ? 'visible' : 'hidden';

  // 전체 항목
  const allRow = `
    <div class="tag-row ${!state.selectedTag ? 'active' : ''}" onclick="selectTag(null)">
      <div class="tag-name-row">
        <div class="tag-name">🔘 전체</div>
        <div class="tag-count">${state.entries.length.toLocaleString()}</div>
      </div>
      <div class="tag-bar-track"><div class="tag-bar-fill" style="width:100%;background:#94a3b8"></div></div>
    </div>`;
  const xmlRows = tagEntries.map(([tag, cnt]) => {
    const color = tagColor(tag);
    const pct = (cnt / maxCount) * 100;
    const active = state.selectedTag === tag ? 'active' : '';
    return `<div class="tag-row ${active}" onclick="selectTag('${esc(tag)}')">
      <div class="tag-name-row">
        <div class="tag-name" style="color:${color}">● ${esc(tag)}</div>
        <div class="tag-count">${cnt.toLocaleString()}</div>
      </div>
      <div class="tag-bar-track"><div class="tag-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');
  $('tag-list').innerHTML = allRow + xmlRows;

  // Mini stats
  $('ms-total').textContent = state.entries.length.toLocaleString();
  $('ms-xml').textContent = xmlCount.toLocaleString();
  $('ms-tagcount').textContent = tagEntries.length.toLocaleString();

  // 테이블
  const filtered = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filtered.length / state.PAGE_SIZE));
  if (state.page >= totalPages) state.page = totalPages - 1;
  if (state.page < 0) state.page = 0;
  const rows = filtered.slice(state.page * state.PAGE_SIZE, (state.page + 1) * state.PAGE_SIZE);

  $('log-tbody').innerHTML = rows.map(e => {
    const globalIdx = e._idx;
    const selected = state.selectedIdx === globalIdx ? 'selected' : '';
    const tagBadge = e.xmlTag
      ? `<span class="tag-chip" style="background:${tagColor(e.xmlTag)}22;color:${tagColor(e.xmlTag)};border:1px solid ${tagColor(e.xmlTag)}55" title="${esc(e.xmlTag)}">${esc(e.xmlTag)}</span>`
      : `<span style="color:#cbd5e1;font-size:11px">—</span>`;
    const preview = (e.message || '').replace(/\s+/g, ' ').slice(0, 200);
    return `<tr class="${selected}" onclick="selectEntry(${globalIdx})">
      <td class="mono">${esc(e.timestamp)}</td>
      <td><span class="level-chip level-${e.level}">${esc(e.level)}</span></td>
      <td class="mono">${esc(e.threadId)}</td>
      <td>${tagBadge}</td>
      <td class="preview">${esc(preview)}</td>
    </tr>`;
  }).join('');

  $('log-empty').classList.toggle('hidden', filtered.length > 0);
  $('page-info').textContent = filtered.length === 0 ? '0 건'
    : `${filtered.length.toLocaleString()} 건 중 ${state.page * state.PAGE_SIZE + 1}-${Math.min((state.page + 1) * state.PAGE_SIZE, filtered.length)}`;
  $('page-num').textContent = `${state.page + 1} / ${totalPages}`;
  $('page-prev').disabled = state.page === 0;
  $('page-next').disabled = state.page >= totalPages - 1;

  renderViewer();
}

function selectEntry(idx) {
  state.selectedIdx = idx;
  render();
}

// ============================================================
// 4. 뷰어
// ============================================================

function switchView(v) {
  state.view = v;
  document.querySelectorAll('.viewer-tab').forEach(el => el.classList.toggle('active', el.dataset.view === v));
  renderViewer();
}

function renderViewer() {
  const e = state.entries[state.selectedIdx];
  if (!e) {
    $('viewer-empty').classList.remove('hidden');
    $('viewer-content').classList.add('hidden');
    return;
  }
  $('viewer-empty').classList.add('hidden');
  $('viewer-content').classList.remove('hidden');

  const c = $('viewer-content');
  if (state.view === 'json') {
    if (e.jsonContent) {
      c.innerHTML = highlightJson(e.jsonContent);
    } else {
      c.innerHTML = `<span style="color:#94a3b8">이 로그에는 XML이 없습니다</span>`;
    }
  } else if (state.view === 'xml') {
    if (e.xmlContent) {
      c.innerHTML = highlightXml(e.xmlContent);
    } else {
      c.innerHTML = `<span style="color:#94a3b8">이 로그에는 XML이 없습니다</span>`;
    }
  } else if (state.view === 'raw') {
    c.innerHTML = `<span style="color:#334155">${esc(e.rawLog)}</span>`;
  } else if (state.view === 'meta') {
    const meta = {
      timestamp: e.timestamp, level: e.level, threadId: e.threadId,
      class: e.class, xmlTag: e.xmlTag, srcFile: e.srcFile, lineNo: e.lineNo,
    };
    c.innerHTML = highlightJson(meta);
  }
}

function highlightJson(obj) {
  let s = JSON.stringify(obj, null, 2);
  s = s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  s = s.replace(/(&quot;(?:\\.|(?!&quot;).)*&quot;)(\s*:)/g, '<span class="j-key">$1</span>$2');
  s = s.replace(/:\s*(&quot;(?:\\.|(?!&quot;).)*&quot;)/g, ': <span class="j-str">$1</span>');
  s = s.replace(/:\s*(-?\d+\.?\d*)/g, ': <span class="j-num">$1</span>');
  s = s.replace(/:\s*(true|false)/g, ': <span class="j-bool">$1</span>');
  s = s.replace(/:\s*(null)/g, ': <span class="j-null">$1</span>');
  return s;
}

function highlightXml(xml) {
  // 포맷팅
  let formatted = formatXml(xml);
  let s = formatted.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  // 태그/속성 하이라이트
  s = s.replace(/(&lt;\/?)([A-Za-z][A-Za-z0-9_\-:.]*)([^&]*?)(\/?&gt;)/g,
    (match, open, name, attrs, close) => {
      const attrsH = attrs.replace(/([A-Za-z_][A-Za-z0-9_\-:.]*)=(&quot;[^&]*?&quot;)/g,
        '<span class="x-attr">$1</span>=<span class="x-val">$2</span>');
      return `<span class="x-tag">${open}</span><span class="x-tagname">${name}</span>${attrsH}<span class="x-tag">${close}</span>`;
    });
  return s;
}

function formatXml(xml) {
  // 태그 사이에 개행 넣어 들여쓰기
  let s = xml.trim();
  // 기존 공백 정규화
  s = s.replace(/>\s+</g, '><');
  // 태그 사이 개행
  s = s.replace(/(<[^\/][^>]*[^\/]>)(?=[^<])/g, '$1');
  s = s.replace(/>(<\/)/g, '>\n$1');
  s = s.replace(/(<[^\/!?][^>]*[^\/]>)(<)/g, '$1\n$2');
  s = s.replace(/(>)(<[^\/])/g, '$1\n$2');
  // 들여쓰기
  const lines = s.split('\n');
  let depth = 0;
  return lines.map(ln => {
    const trimmed = ln.trim();
    if (trimmed.startsWith('</')) depth = Math.max(0, depth - 1);
    const out = '  '.repeat(depth) + trimmed;
    if (trimmed.startsWith('<') && !trimmed.startsWith('</') && !trimmed.startsWith('<?') && !trimmed.startsWith('<!')
        && !trimmed.endsWith('/>') && !trimmed.includes('</')) depth++;
    return out;
  }).join('\n');
}

// ============================================================
// 5. 다운로드
// ============================================================

function downloadJSON() {
  const data = state.entries.map(e => ({
    timestamp: e.timestamp, level: e.level, threadId: e.threadId, class: e.class,
    xmlTag: e.xmlTag, xmlContent: e.xmlContent, jsonContent: e.jsonContent,
    message: e.message, srcFile: e.srcFile, lineNo: e.lineNo,
  }));
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'log_analysis.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadCSV() {
  const header = 'timestamp,level,threadId,class,xmlTag,srcFile,lineNo,preview\n';
  const rows = state.entries.map(e => {
    const prev = (e.message || '').replace(/\s+/g, ' ').slice(0, 300).replace(/"/g, '""');
    return `"${e.timestamp}",${e.level},"${e.threadId}","${e.class}","${e.xmlTag || ''}","${e.srcFile}",${e.lineNo},"${prev}"`;
  }).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'log_entries.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ============================================================
// 6. DropZone 이벤트
// ============================================================

const dropzone = $('dropzone');
const fileInput = $('fileInput');
dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => handleFiles(e.target.files));
dropzone.addEventListener('dragenter', e => { e.preventDefault(); dropzone.classList.add('dragging'); });
dropzone.addEventListener('dragover', e => e.preventDefault());
dropzone.addEventListener('dragleave', e => { e.preventDefault(); dropzone.classList.remove('dragging'); });
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragging');
  handleFiles(e.dataTransfer.files);
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  if ($('main').classList.contains('hidden')) return;
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});
</script>
