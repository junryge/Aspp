<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK hynix 이천캠퍼스 TOON</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050510;
    color: #ccc;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #canvas-container {
    width: 100%;
    height: 100%;
    position: relative;
  }

  canvas { display: block; }

  .title-overlay {
    position: fixed;
    top: 20px;
    left: 24px;
    text-align: left;
    z-index: 100;
    pointer-events: none;
  }
  .title-overlay h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    text-shadow: 0 0 12px rgba(255,221,100,0.5), 0 2px 6px rgba(0,0,0,0.8);
    margin-bottom: 2px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .title-overlay p {
    font-size: 13px;
    color: #ff00ff;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .info-panel {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: rgba(5,5,15,0.95);
    border: 2px solid rgba(255,100,200,0.4);
    border-radius: 12px;
    padding: 0;
    z-index: 100;
    min-width: 280px;
    max-width: 340px;
    max-height: 70vh;
    overflow-y: auto;
    transition: all 0.3s ease;
    font-family: 'Noto Sans KR', sans-serif;
    box-shadow: 0 0 20px rgba(255,100,200,0.2);
  }
  .info-panel::-webkit-scrollbar { width: 4px; }
  .info-panel::-webkit-scrollbar-thumb { background: rgba(255,100,200,0.4); border-radius: 2px; }
  .info-panel .panel-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid rgba(255,100,200,0.3);
    position: sticky; top: 0;
    background: rgba(5,5,15,0.98);
    z-index: 2;
  }
  .info-panel .building-name {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    text-shadow: 0 0 8px rgba(255,200,0,0.3);
  }
  .info-panel .building-name .color-badge {
    display: inline-block; width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }
  .info-panel .building-type {
    font-size: 11px;
    color: #ff00ff;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 0;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .info-panel .panel-body { padding: 14px 18px 16px; }
  .info-panel .building-detail {
    font-size: 13px;
    color: #aaa;
    line-height: 1.6;
    margin-bottom: 12px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .info-panel .spec-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;
  }
  .info-panel .spec-item {
    background: rgba(255,100,200,0.08); border: 1px solid rgba(255,100,200,0.3); border-radius: 6px; padding: 8px 10px;
  }
  .info-panel .spec-label { font-size: 10px; color: #ff00ff; letter-spacing: 0.5px; font-family: 'Noto Sans KR', sans-serif; }
  .info-panel .spec-value { font-size: 13px; font-weight: 600; color: #ffdd00; margin-top: 2px; font-family: 'Noto Sans KR', sans-serif; }
  .info-panel .section-label {
    font-size: 10px; color: #ff00ff; letter-spacing: 1px; margin-bottom: 8px;
    padding-bottom: 4px; border-bottom: 1px solid rgba(255,100,200,0.2);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .info-panel .process-flow {
    display: flex; flex-wrap: wrap; align-items: center; gap: 0; margin-bottom: 12px;
  }
  .info-panel .pf-step {
    font-size: 11px; color: #ffdd00; background: rgba(255,221,0,0.1);
    padding: 4px 9px; border-radius: 4px; white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .info-panel .pf-arrow {
    font-size: 11px; color: #ffdd00; margin: 0 2px;
    animation: arrowPulse 1.5s ease-in-out infinite;
  }
  @keyframes arrowPulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  .info-panel .route-info {
    background: rgba(255,100,200,0.08); border: 1px solid rgba(255,100,200,0.3);
    border-radius: 6px; padding: 9px 10px; margin-bottom: 9px;
  }
  .info-panel .route-title {
    font-size: 11px; font-weight: 600; color: #ffdd00; margin-bottom: 4px;
    display: flex; align-items: center; gap: 5px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .info-panel .route-title .dot { width: 6px; height: 6px; background: #ffdd00; border-radius: 50%; animation: dotBlink 1s ease infinite; }
  @keyframes dotBlink { 0%,100%{opacity:0.3} 50%{opacity:1} }
  .info-panel .route-desc { font-size: 11px; color: #daa; line-height: 1.5; font-family: 'Noto Sans KR', sans-serif; }

  .controls-hint {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(5,5,15,0.95);
    border: 1px solid rgba(255,100,200,0.3);
    border-radius: 8px;
    padding: 12px 14px;
    z-index: 100;
    font-size: 11px;
    color: #aaa;
    line-height: 1.8;
    font-family: 'Noto Sans KR', sans-serif;
    box-shadow: 0 0 15px rgba(255,100,200,0.2);
  }
  .controls-hint kbd {
    background: rgba(255,100,200,0.12);
    border: 1px solid rgba(255,100,200,0.3);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #ffdd00;
  }

  .loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a0a1e 0%, #1a1a3e 100%); z-index: 999; transition: opacity 1.2s ease;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .loading.hidden { opacity: 0; pointer-events: none; }
  .load-logo {
    font-size: 42px; font-weight: 900; color: #fff; letter-spacing: 4px; margin-bottom: 2px;
    text-shadow: 0 0 30px rgba(231,76,60,0.3), 0 4px 20px rgba(0,0,0,0.6);
    animation: ldIn 1.2s ease both;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .load-logo span { color: #e74c3c; }
  .load-campus {
    font-size: 14px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
    animation: ldIn 1s ease 0.4s both;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .load-amhs {
    font-size: 11px; color: #ffdd00; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px;
    animation: ldIn 1s ease 0.7s both;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .load-bar-bg { width: 240px; height: 2px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-bottom: 16px; animation: ldIn 0.8s ease 0.9s both; }
  .load-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #e74c3c, #4af, #3a7); border-radius: 2px; animation: barGo 4s ease-in-out 1s forwards; }
  .load-msg { font-size: 11px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; animation: ldPulse 1.5s ease-in-out 1s infinite; font-family: 'Noto Sans KR', sans-serif; }
  .load-bottom {
    position: absolute; bottom: 40px; text-align: center;
    text-shadow: none;
    animation: ldIn 1s ease 1.2s both;
  }
  .load-bottom div { font-size: 10px; color: #666; letter-spacing: 1px; line-height: 2; font-family: 'Noto Sans KR', sans-serif; }
  @keyframes ldIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes ldPulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
  @keyframes barGo { 0%{width:0%} 20%{width:22%} 45%{width:50%} 70%{width:75%} 90%{width:92%} 100%{width:100%} }

  /* ============================================================ */
  /* CHIP JUN 캐릭터 (TOON / 만화 스타일) */
  /* ============================================================ */
  #chipGuide {
    position: fixed;
    bottom: -300px;
    right: 40px;
    z-index: 200;
    transition: bottom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: auto;
    cursor: grab;
    /* 만화 스타일: 두꺼운 검정 아웃라인 + 컬러 그림자 */
    filter: drop-shadow(3px 3px 0 #000) drop-shadow(-1px -1px 0 #000) drop-shadow(0 8px 25px rgba(255,100,200,0.4));
  }
  #chipGuide.dragging { cursor: grabbing; transition: none; }
  #chipGuide.show { bottom: 20px; }
  #chipGuide.entrance {
    animation: chipEntrance 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes chipEntrance {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    40% { transform: scale(1.4) rotate(10deg); opacity: 1; filter: drop-shadow(3px 3px 0 #000) drop-shadow(-1px -1px 0 #000) drop-shadow(0 0 60px rgba(255,100,200,0.9)) brightness(1.8); }
    60% { transform: scale(0.85) rotate(-5deg); }
    80% { transform: scale(1.15) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); filter: drop-shadow(3px 3px 0 #000) drop-shadow(-1px -1px 0 #000) drop-shadow(0 8px 25px rgba(255,100,200,0.4)); }
  }
  #chipGuide.exit { animation: chipExit 0.6s ease-in forwards; }
  @keyframes chipExit {
    0% { transform: scale(1) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.3) rotate(15deg); opacity: 0.7; }
    100% { transform: scale(0) rotate(180deg); opacity: 0; }
  }
  #chipGuide .chip-body {
    width: 80px; height: 80px;
    /* 만화풍: 플랫한 2톤 그라데이션 + 두꺼운 보더 */
    background: #2e1240;
    background-image:
      linear-gradient(135deg, rgba(255,100,200,0.15) 0%, transparent 50%),
      linear-gradient(315deg, rgba(0,0,0,0.3) 0%, transparent 50%);
    border: 3px solid #111;
    border-radius: 16px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    /* 카툰 하이라이트: 좌상단 밝게, 우하단 어둡게 */
    box-shadow:
      inset 3px 3px 0 rgba(255,200,255,0.25),
      inset -2px -2px 0 rgba(0,0,0,0.3),
      0 4px 0 #111;
    animation: chipFloat 3s ease-in-out infinite;
  }
  @keyframes chipFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }
  /* 칩 핀들 - 굵고 뚜렷한 카툰 핀 */
  .chip-pins-top, .chip-pins-bottom, .chip-pins-left, .chip-pins-right {
    position: absolute; display: flex; gap: 5px;
  }
  .chip-pins-top, .chip-pins-bottom { left: 50%; transform: translateX(-50%); flex-direction: row; }
  .chip-pins-left, .chip-pins-right { top: 50%; transform: translateY(-50%); flex-direction: column; }
  .chip-pins-top { top: -8px; }
  .chip-pins-bottom { bottom: -8px; }
  .chip-pins-left { left: -8px; }
  .chip-pins-right { right: -8px; }
  .chip-pin {
    width: 5px; height: 8px;
    background: #ffaadd;
    border: 1.5px solid #111;
    border-radius: 1px;
  }
  .chip-pins-left .chip-pin, .chip-pins-right .chip-pin { width: 8px; height: 5px; }

  /* 칩 얼굴 - 카툰 과장 표정 */
  .chip-face { text-align: center; position: relative; }
  .chip-eyes { display: flex; gap: 14px; justify-content: center; margin-bottom: 7px; }
  .chip-eye {
    width: 16px; height: 19px;
    background: #fff;
    border: 3px solid #111;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    animation: chipBlink 4s ease-in-out infinite;
  }
  @keyframes chipBlink {
    0%, 42%, 48%, 100% { transform: scaleY(1); }
    45% { transform: scaleY(0.08); }
  }
  /* 눈동자 (가운데 정렬, 깔끔한 원형) */
  .chip-eye::before {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    background: #ff22aa;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border: 1.5px solid #111;
    animation: chipLookAround 5s ease-in-out infinite;
  }
  /* 눈 반짝이 하이라이트 (고정) */
  .chip-eye::after {
    content: '';
    position: absolute;
    width: 4px; height: 4px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    z-index: 2;
    box-shadow: 0 0 2px #fff;
  }
  @keyframes chipLookAround {
    0%, 100% { transform: translate(-50%, -50%); }
    25% { transform: translate(-30%, -60%); }
    50% { transform: translate(-60%, -40%); }
    75% { transform: translate(-40%, -50%); }
  }
  /* 입 - 카툰 스마일 */
  .chip-mouth {
    width: 18px; height: 7px;
    background: #111;
    border: 2px solid #111; border-top: none;
    border-radius: 0 0 10px 10px;
    margin: 0 auto;
    position: relative;
    transition: all 0.3s;
    overflow: hidden;
  }
  /* 혀 (입 안쪽 빨간색) */
  .chip-mouth::after {
    content: '';
    position: absolute;
    width: 8px; height: 6px;
    background: #ff6688;
    border-radius: 50%;
    bottom: -2px; left: 50%; transform: translateX(-50%);
  }
  .chip-mouth.talking { animation: chipTalk 0.25s ease-in-out infinite alternate; }
  @keyframes chipTalk {
    0% { height: 5px; width: 14px; }
    100% { height: 11px; width: 20px; border-radius: 0 0 10px 10px; }
  }

  /* 칩 회로 패턴 - 굵은 라인 */
  .chip-circuit {
    position: absolute; width: 100%; height: 100%; top: 0; left: 0;
    pointer-events: none; opacity: 0.25;
  }
  .chip-circuit::before, .chip-circuit::after { content: ''; position: absolute; background: #ff66cc; border-radius: 1px; }
  .chip-circuit::before {
    width: 16px; height: 2px; top: 12px; left: 8px;
    box-shadow: 0 12px 0 #ff66cc, 24px 16px 0 #ff66cc, 10px 26px 0 #ff66cc;
  }
  .chip-circuit::after {
    width: 2px; height: 12px; top: 10px; right: 12px;
    box-shadow: -10px 16px 0 #ff66cc, -20px 10px 0 #ff66cc;
  }

  /* ── 말풍선 (만화 스타일) ── */
  #chipSpeech {
    position: fixed; bottom: 140px; right: 30px; z-index: 201;
    max-width: 310px; min-width: 220px;
    opacity: 0; transform: scale(0.8) translateY(20px);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    /* 만화 아웃라인 */
    filter: drop-shadow(2px 2px 0 #000) drop-shadow(-1px -1px 0 #000);
  }
  #chipSpeech.show { opacity: 1; transform: scale(1) translateY(0); }
  .chip-speech-inner {
    background: #fff;
    border: 4px solid #111;
    border-radius: 20px;
    padding: 14px 16px;
    color: #222;
    font-size: 12px; line-height: 1.7;
    font-weight: 500;
    position: relative;
    /* 만화 입체감 */
    box-shadow: 4px 4px 0 #111;
  }
  /* 말풍선 꼬리 - 삼각형 + 아웃라인 */
  .chip-speech-inner::before {
    content: '';
    position: absolute; bottom: -18px; right: 50px;
    border-left: 12px solid transparent; border-right: 12px solid transparent;
    border-top: 18px solid #111;
  }
  .chip-speech-inner::after {
    content: '';
    position: absolute; bottom: -12px; right: 53px;
    border-left: 9px solid transparent; border-right: 9px solid transparent;
    border-top: 14px solid #fff;
  }
  .chip-speech-name {
    font-size: 11px; font-weight: 900; color: #ff00aa;
    letter-spacing: 2px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
    text-shadow: 1px 1px 0 rgba(255,0,170,0.15);
  }
  .chip-speech-name .typing-dot {
    display: inline-block; width: 6px; height: 6px;
    background: #ff00aa; border: 1px solid #111; border-radius: 50%;
    animation: typingDot 1.4s ease-in-out infinite;
  }
  .chip-speech-name .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .chip-speech-name .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-4px); }
  }
  #chipSpeechText { min-height: 16px; color: #333; }
  #chipSpeechText b { color: #cc0066; }
  .chip-speech-close {
    position: absolute; top: 4px; right: 8px;
    background: none; border: none; color: #999; font-size: 14px; font-weight: 900;
    cursor: pointer; pointer-events: auto; padding: 4px; transition: color 0.2s;
  }
  .chip-speech-close:hover { color: #ff0066; }

  /* ── 자동 투어 버튼 (만화 스타일) ── */
  #chipAutoTour {
    position: fixed; bottom: 125px; right: 40px; z-index: 199;
    background: #fff;
    border: 3px solid #111;
    color: #ff00aa; font-size: 12px; font-weight: 900;
    padding: 8px 16px; border-radius: 25px; cursor: pointer;
    pointer-events: auto; letter-spacing: 1px; transition: all 0.2s; display: none;
    box-shadow: 3px 3px 0 #111;
    text-shadow: none;
  }
  #chipAutoTour:hover { background: #fff0f8; transform: translate(-1px, -1px); box-shadow: 4px 4px 0 #111; }
  #chipAutoTour:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #111; }
  #chipAutoTour.show { display: block; animation: fadeInUp 0.5s ease; }
  @keyframes fadeInUp {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ── 병목 모드 - 빨간 카툰 펄스 ── */
  #chipGuide.bottleneck .chip-body {
    border-color: #cc0000;
    background: #3e1a1a;
    animation: chipFloat 3s ease-in-out infinite, chipRedPulse 1.2s ease-in-out infinite;
    box-shadow: inset 4px 4px 0 rgba(255,100,100,0.3), inset -3px -3px 0 rgba(0,0,0,0.3), 0 6px 0 #880000;
  }
  @keyframes chipRedPulse {
    0%, 100% { background: #3e1a1a; }
    50% { background: #5a1010; }
  }
  #chipGuide.bottleneck .chip-eye::before { background: #ff2222; }
  #chipGuide.bottleneck .chip-mouth { background: #ff2222; border-color: #880000; }
  #chipGuide.bottleneck .chip-pin { background: #ff6666; border-color: #880000; }
  #chipSpeech.bottleneck .chip-speech-inner { border-color: #cc0000; box-shadow: 4px 4px 0 #cc0000; }
  #chipSpeech.bottleneck .chip-speech-name { color: #cc0000; }
  #chipSpeech.bottleneck .chip-speech-name .typing-dot { background: #cc0000; border-color: #880000; }

  /* ── 짜증남 모드 - 노란 카툰 흔들림 ── */
  #chipGuide.annoyed .chip-body {
    border-color: #aa8800;
    background: #4a4010;
    animation: chipFloat 3s ease-in-out infinite, chipYellowShake 0.25s ease-in-out infinite;
    box-shadow: inset 4px 4px 0 rgba(255,230,100,0.3), inset -3px -3px 0 rgba(0,0,0,0.3), 0 6px 0 #aa8800;
  }
  @keyframes chipYellowShake {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-3px) rotate(-4deg); }
    75% { transform: translateY(-3px) rotate(4deg); }
  }
  #chipGuide.annoyed .chip-eye { transform: scaleY(0.5); }
  #chipGuide.annoyed .chip-eye::before { background: #eec900; }
  #chipGuide.annoyed .chip-mouth {
    background: #eec900; border-color: #aa8800;
    border-radius: 14px 14px 0 0; border-top: 3px solid #aa8800; border-bottom: none;
    height: 8px;
  }
  #chipGuide.annoyed .chip-mouth::after { background: #cc0000; }
  #chipGuide.annoyed .chip-pin { background: #eedd66; border-color: #aa8800; }

  /* ── 잠옷 모드 (21시~06시) - 카툰 졸림 ── */
  #chipGuide.pajama .chip-body {
    background: #2a1a3e;
    background-image: linear-gradient(135deg, rgba(176,136,221,0.15) 0%, transparent 50%);
    border-color: #6644aa;
    box-shadow: inset 4px 4px 0 rgba(200,170,255,0.2), inset -3px -3px 0 rgba(0,0,0,0.3), 0 6px 0 #4a2d6b;
  }
  #chipGuide.pajama .chip-eye { transform: scaleY(0.4); animation: chipSleepyBlink 5s ease-in-out infinite; }
  #chipGuide.pajama .chip-eye::before { background: #b088dd; }
  @keyframes chipSleepyBlink {
    0%, 30%, 40%, 100% { transform: scaleY(0.4); }
    35% { transform: scaleY(0.08); }
  }
  #chipGuide.pajama .chip-mouth {
    background: #6644aa; border-color: #4a2d6b;
    width: 16px; height: 6px; border-radius: 50%;
  }
  #chipGuide.pajama .chip-mouth::after { display: none; }
  #chipGuide.pajama .chip-pin { background: #b088dd; border-color: #6644aa; }
  .chip-pajama-hat {
    display: none; position: absolute; top: -28px; right: -8px;

<script>
function toggleTimePanel() {
  const body = document.getElementById('timeToggleBody');
  const btn = document.getElementById('btnCollapse');
  if (body.style.display === 'none') {
    body.style.display = 'flex';
    btn.textContent = '▲';
  } else {
    body.style.display = 'none';
    btn.textContent = '▼';
  }
}
(function() {
  const panel = document.getElementById('timeToggle');
  const header = document.getElementById('timeToggleHeader');
  let dragging = false, offX = 0, offY = 0;
  header.addEventListener('mousedown', function(e) {
    if (e.target.id === 'btnCollapse') return;
    dragging = true;
    const rect = panel.getBoundingClientRect();
    offX = e.clientX - rect.left;
    offY = e.clientY - rect.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    panel.style.left = (e.clientX - offX) + 'px';
    panel.style.top = (e.clientY - offY) + 'px';
    panel.style.right = 'auto';
  });
  document.addEventListener('mouseup', function() { dragging = false; });
})();
</script>

  tex.minFilter = THREE.NearestFilter;

function updateSky() {
  let hours;
  if (timeMode === 'morning') {
    hours = 10;
  } else if (timeMode === 'night') {
    hours = 0;
  } else {
    const now = new Date();
    hours = now.getHours() + now.getMinutes() / 60;
  }

  const sunAngle = ((hours - 6) / 12) * Math.PI;
  const sunUp = (hours >= 5.5 && hours <= 18.5);

  if (sunUp) {
    const sx = skyCenter.x + skyRadius * Math.cos(sunAngle);
    const sy = skyRadius * Math.sin(sunAngle) * 0.7;
    const sz = skyCenter.z - 200;
    sunMesh.position.set(sx, Math.max(sy, -20), sz);
    sunMesh.visible = true;
  } else {
    sunMesh.visible = false;
  }

  const moonAngle = ((hours - 18 + 24) % 24 / 12) * Math.PI;
  const moonUp = (hours >= 17.5 || hours <= 6.5);

  if (moonUp) {
    const mx = skyCenter.x - skyRadius * Math.cos(moonAngle);
    const my = skyRadius * Math.sin(moonAngle) * 0.6;
    const mz = skyCenter.z + 150;
    moonMesh.position.set(mx, Math.max(my, -20), mz);
    moonMesh.visible = true;
    const moonAlt = Math.max(0, my) / (skyRadius * 0.6);
    moonLight.intensity = 2.0 * moonAlt;
    moonGlow1Mat.opacity = 0.1 + 0.15 * moonAlt;
  } else {
    moonMesh.visible = false;
    moonLight.intensity = 0;
  }

  let skyProgress;
  if (hours >= 6 && hours <= 18) {
    skyProgress = 1 - Math.abs(hours - 12) / 6;
  } else {
    skyProgress = 0;
  }
  if (hours >= 5 && hours < 6) skyProgress = (hours - 5) * 0.3;
  if (hours > 18 && hours <= 19) skyProgress = (19 - hours) * 0.3;

  const nightColor = new THREE.Color(0x0a0a1e);
  const dayColor = new THREE.Color(0x4488cc);
  const dawnColor = new THREE.Color(0xff9966);

  let bgColor;
  if (skyProgress > 0.3) {
    const t = (skyProgress - 0.3) / 0.7;
    bgColor = new THREE.Color().lerpColors(nightColor, dayColor, t);
  } else if (skyProgress > 0) {
    const t = skyProgress / 0.3;
    bgColor = new THREE.Color().lerpColors(nightColor, dawnColor, t);
  } else {
    bgColor = new THREE.Color(nightColor);
  }
  scene.background.copy(bgColor);
  scene.fog.color.copy(bgColor);

  const dayAmbient = 0.6, nightAmbient = 0.4;
  const dayDir = 2.2, nightDir = 0.6;
  ambientLight.intensity = nightAmbient + (dayAmbient - nightAmbient) * skyProgress;
  dirLight.intensity = nightDir + (dayDir - nightDir) * skyProgress;

  if (sunUp) {
    dirLight.position.copy(sunMesh.position);
    dirLight.color.setHex(skyProgress > 0.3 ? 0xffffff : 0xff9966);
  } else {
    dirLight.position.set(100, 350, 100);
    dirLight.color.setHex(0x5588aa);
  }

  const isNight = skyProgress < 0.15;

  // 모든 창문 밤/낮 전환 (메인 건물 + 외곽 건물 + 아파트)
  scene.traverse(child => {
    if (child.userData && child.userData.isWindow && child.isMesh) {
      if (isNight) {
        child.material.color.setHex(0xffcc44);
        child.material.opacity = 0.95;
      } else {
        child.material.color.setHex(0x88ddff);
        child.material.opacity = 0.7;
      }
    }
  });
}

function addRoad(x1, z1, x2, z2, width) {
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.sqrt(dx*dx + dz*dz);
  const segX = Math.ceil(len / 5);
  for (let i = 0; i < segX; i++) {
    const sx1 = x1 + (dx / segX) * i;
    const sz1 = z1 + (dz / segX) * i;
    const sx2 = x1 + (dx / segX) * (i + 1);
    const sz2 = z1 + (dz / segX) * (i + 1);
    const sGeo = new THREE.PlaneGeometry(5, width);
    const sMat = new THREE.MeshLambertMaterial({ color: 0x3a3f4a, flatShading: true });
    const sMesh = new THREE.Mesh(sGeo, sMat);
    sMesh.rotation.x = -Math.PI / 2;
    sMesh.position.set((sx1+sx2)/2, 0.35, (sz1+sz2)/2);
    const angle = Math.atan2(dz, dx);
    sMesh.rotation.z = -angle;
    sMesh.receiveShadow = true;
    scene.add(sMesh);
  }
}

  function addVoxelTree(x, z) {
    const s = 2 + Math.random() * 2.5;

    const trunk = new THREE.Mesh(new THREE.BoxGeometry(s*0.8, s*trunkH, s*0.8), new THREE.MeshLambertMaterial({ color: 0x664422, flatShading: true }));
    trunk.position.y = s*trunkH/2;

    const lc = leafColors[Math.floor(Math.random()*leafColors.length)];

    const crowns = [
      { size: s * 2.2, y: s*trunkH + s*1.1, offset: 0 },
      { size: s * 1.8, y: s*trunkH + s*2.2, offset: 0.3 },
      { size: s * 1.4, y: s*trunkH + s*3.2, offset: 0 }

      const sphere = new THREE.Mesh(new THREE.SphereGeometry(crown.size/2, 6, 4), leafMat);
      sphere.position.y = crown.y;
      sphere.position.x = crown.offset;

      outline.scale.multiplyScalar(1.08);

let isDragging = false;
let isRightDrag = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 1.57, phi: 0.85, radius: 420 };
let target = new THREE.Vector3(35, 0, 170);

function updateCamera() {
  const x = target.x + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  const y = target.y + spherical.radius * Math.cos(spherical.phi);
  const z = target.z + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.set(x, y, z);
  camera.lookAt(target);
}

renderer.domElement.addEventListener('mousedown', e => {
  if (e.button === 2) isRightDrag = true;
  else isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mousemove', e => {
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;

  if (isDragging) {
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.2, Math.min(1.5, spherical.phi - dy * 0.005));
    updateCamera();
  }
  if (isRightDrag) {
    const right = new THREE.Vector3();
    camera.getWorldDirection(right);
    right.cross(camera.up).normalize();
    const up = new THREE.Vector3(0, 1, 0);
    target.add(right.multiplyScalar(-dx * 0.5));
    target.add(up.multiplyScalar(dy * 0.3));
    updateCamera();
  }

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const tooltip = document.getElementById('tooltip');

  let hit = false;
  for (const group of buildingMeshes) {
    const intersects = raycaster.intersectObjects(group.children, true);
    if (intersects.length > 0) {
      tooltip.style.display = 'block';
      tooltip.style.left = e.clientX + 'px';
      tooltip.style.top = e.clientY + 'px';
      tooltip.textContent = group.userData.name;
      document.body.style.cursor = 'pointer';
      hit = true;
      break;
    }
  }
  if (!hit) {
    tooltip.style.display = 'none';
    document.body.style.cursor = 'default';
  }

  prevMouse = { x: e.clientX, y: e.clientY };
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  isRightDrag = false;
});

function setupMinimap() {

const MM = { minX: 50, maxX: 1000, minZ: 100, maxZ: 870, padX: 10, padY: 14 };

function drawMinimap() {
  const el = document.getElementById('minimap');
  const cw = el.clientWidth;
  const ch = el.clientHeight;
  mCtx.clearRect(0, 0, cw, ch);

  mCtx.fillStyle = '#0a0a1e';
  mCtx.fillRect(0, 0, cw, ch);

  const dw = cw - MM.padX*2;
  const dh = ch - MM.padY*2;

  function M(bx, bz) {
    return [MM.padX + ((bx-MM.minX)/(MM.maxX-MM.minX))*dw,
            MM.padY + ((bz-MM.minZ)/(MM.maxZ-MM.minZ))*dh];
  }

  mCtx.fillStyle = 'rgba(100,150,255,0.15)';
  mCtx.fillRect(MM.padX, MM.padY, dw, dh);

  buildings.forEach(b => {
    const [mx,my] = M(b.x, b.z);
    const bw = Math.max((b.w/(MM.maxX-MM.minX))*dw, 3);
    const bh = Math.max((b.d/(MM.maxZ-MM.minZ))*dh, 2);
    const c = '#'+b.color.toString(16).padStart(6,'0');
    mCtx.fillStyle = c;
    mCtx.globalAlpha = 0.9;
    mCtx.fillRect(mx, my, bw, bh);
    mCtx.globalAlpha = 1;
    if (b.h > 40) {
      mCtx.fillStyle = '#fff';
      mCtx.font = '500 4.5px Noto Sans KR';
      mCtx.textAlign = 'center';
      mCtx.fillText(b.name, mx+bw/2, my+bh/2+1.5);
    }
  });

  const [cx,cy] = M(camera.position.x/SCALE+480, 820-camera.position.z/SCALE);
  const [tx,ty] = M(target.x/SCALE+480, 820-target.z/SCALE);
  const a = Math.atan2(ty-cy,tx-cx);
  mCtx.beginPath(); mCtx.moveTo(cx,cy);
  mCtx.lineTo(cx+Math.cos(a-0.35)*12, cy+Math.sin(a-0.35)*12);
  mCtx.lineTo(cx+Math.cos(a+0.35)*12, cy+Math.sin(a+0.35)*12);
  mCtx.closePath();
  mCtx.fillStyle = 'rgba(255,221,0,0.15)';
  mCtx.fill();
  mCtx.beginPath(); mCtx.moveTo(cx,cy); mCtx.lineTo(tx,ty);
  mCtx.strokeStyle='rgba(255,221,0,0.3)'; mCtx.lineWidth=0.5; mCtx.stroke();
  mCtx.beginPath(); mCtx.arc(cx,cy,2,0,Math.PI*2);
  mCtx.fillStyle='#ffdd00'; mCtx.fill();
  mCtx.beginPath(); mCtx.arc(tx,ty,1.2,0,Math.PI*2);
  mCtx.fillStyle='rgba(255,100,200,0.6)'; mCtx.fill();
}

function createVoxelBuilding(b) {
  const cx = (b.x + b.w/2 - 480) * SCALE;
  const cz = (820 - (b.z + b.d/2)) * SCALE;
  const w = b.w * SCALE;
  const d = b.d * SCALE;
  const h = b.h * SCALE;

  const group = new THREE.Group();
  group.userData = { ...b };

  // ── 단일 건물 본체 ──
  const boxGeo = new THREE.BoxGeometry(w, h, d);
  const boxMat = createToonMaterial(b.color);
  const box = new THREE.Mesh(boxGeo, boxMat);
  box.position.y = h / 2;
  box.castShadow = true;
  box.receiveShadow = true;
  group.add(box);

  // 엣지 라인 (아웃라인 대신 깔끔한 엣지만)
  const edges = new THREE.EdgesGeometry(boxGeo);
  const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
  line.position.y = h / 2;
  group.add(line);

  // ── 창문 ──
  const floorHeightUnit = 3;
  const numFloors = Math.max(1, Math.floor(h / floorHeightUnit));
  const winSpacing = 6;
  const winW = 3.0;
  const winH = 2.0;
  const winDepth = 0.5;
  const winOffset = 0.6;
  const winColsF = Math.max(1, Math.floor((w - 4) / winSpacing));
  const winColsS = Math.max(1, Math.floor((d - 4) / winSpacing));

  for (let f = 0; f < numFloors; f++) {
    const floorY = (f + 0.5) * floorHeightUnit;
    if (floorY > h - 1) break;

    // 앞·뒷면
    for (let col = 0; col < winColsF; col++) {
      const wx = -w/2 + 3 + col * winSpacing;
      const wGeo = new THREE.BoxGeometry(winW, winH, winDepth);
      const wMat = new THREE.MeshBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 0.7 });
      const winF = new THREE.Mesh(wGeo, wMat);
      winF.userData.isWindow = true;
      winF.position.set(wx, floorY, d/2 + winOffset);
      group.add(winF);
      const winFEdge = new THREE.LineSegments(new THREE.EdgesGeometry(wGeo), new THREE.LineBasicMaterial({ color: 0x222244 }));
      winFEdge.position.copy(winF.position);
      group.add(winFEdge);

      const winB = new THREE.Mesh(wGeo, wMat.clone());
      winB.userData.isWindow = true;
      winB.position.set(wx, floorY, -d/2 - winOffset);
      group.add(winB);
      const winBEdge = new THREE.LineSegments(new THREE.EdgesGeometry(wGeo), new THREE.LineBasicMaterial({ color: 0x222244 }));
      winBEdge.position.copy(winB.position);
      group.add(winBEdge);
    }

    // 좌·우 옆면
    for (let col = 0; col < winColsS; col++) {
      const wz = -d/2 + 3 + col * winSpacing;
      const wGeo = new THREE.BoxGeometry(winDepth, winH, winW);
      const wMat = new THREE.MeshBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 0.7 });
      const winR = new THREE.Mesh(wGeo, wMat);
      winR.userData.isWindow = true;
      winR.position.set(w/2 + winOffset, floorY, wz);
      group.add(winR);
      const winREdge = new THREE.LineSegments(new THREE.EdgesGeometry(wGeo), new THREE.LineBasicMaterial({ color: 0x222244 }));
      winREdge.position.copy(winR.position);
      group.add(winREdge);

      const winL = new THREE.Mesh(wGeo, wMat.clone());
      winL.userData.isWindow = true;
      winL.position.set(-w/2 - winOffset, floorY, wz);
      group.add(winL);
      const winLEdge = new THREE.LineSegments(new THREE.EdgesGeometry(wGeo), new THREE.LineBasicMaterial({ color: 0x222244 }));
      winLEdge.position.copy(winL.position);
      group.add(winLEdge);
    }
  }

  // 라벨은 아래에서 별도로 추가

  // ── 굴뚝 ──
  if (b.chimneys) {
    const chim = b.chimneys;
    const chimRadius = (chim.radius || 8) * SCALE * 0.5;
    const chimH = (chim.height || 50) * SCALE;
    const roofY = h + 2;
    const chimX = w / 2 - chimRadius * 3;
    const chimZ = 0;

    const chimGeo = new THREE.BoxGeometry(chimRadius * 2, chimH, chimRadius * 2);
    const chimMat = new THREE.MeshLambertMaterial({ color: 0x999999 });
    const chim3d = new THREE.Mesh(chimGeo, chimMat);
    chim3d.position.set(chimX, roofY + chimH / 2, chimZ);
    chim3d.castShadow = true;
    group.add(chim3d);

    for (let i = 0; i < 3; i++) {
      const sy = roofY + chimH * 0.2 + i * chimH * 0.25;
      const stripeGeo = new THREE.BoxGeometry(chimRadius * 2.4, 2, chimRadius * 2.4);
      const stripeMat = new THREE.MeshLambertMaterial({
        color: i % 2 === 0 ? 0xff0000 : 0xffffff,
        emissive: i % 2 === 0 ? 0xcc0000 : 0x333333
      });
      const stripe = new THREE.Mesh(stripeGeo, stripeMat);
      stripe.position.set(chimX, sy, chimZ);
      group.add(stripe);
    }

    const topGeo = new THREE.BoxGeometry(chimRadius * 1.2, 3, chimRadius * 1.2);
    const topMat = new THREE.MeshLambertMaterial({ color: 0xdd0000 });
    const topMesh = new THREE.Mesh(topGeo, topMat);
    topMesh.position.set(chimX, roofY + chimH + 2, chimZ);
    topMesh.userData.isChimneyWarning = true;
    group.add(topMesh);

    const smokePts = createSmokeParticles(chimX, roofY + chimH + 3, chimZ, chimRadius);
    group.add(smokePts);
    if (!window._chimneySmokes) window._chimneySmokes = [];
    window._chimneySmokes.push(smokePts);
  }

  group.position.set(cx, 0, cz);
  scene.add(group);
  buildingMeshes.push(group);
  return group;
}

function createSmokeParticles(bx, by, bz, radius) {
  const smokeN = 20;
  const smokePos = new Float32Array(smokeN * 3);
  for (let i = 0; i < smokeN; i++) {
    smokePos[i * 3] = bx + (Math.random() - 0.5) * radius * 1.5;
    smokePos[i * 3 + 1] = by + Math.random() * 15;
    smokePos[i * 3 + 2] = bz + (Math.random() - 0.5) * radius * 1.5;
  }
  const smokeGeo = new THREE.BufferGeometry();
  smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePos, 3));
  const smokeMat = new THREE.PointsMaterial({
    color: 0xcccccc,
    size: 3,
    transparent: true,
    opacity: 0.4,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const smokePts = new THREE.Points(smokeGeo, smokeMat);
  smokePts.userData.smokeData = { baseX: bx, baseY: by, baseZ: bz, count: smokeN, topRadius: radius };
  return smokePts;
}

function createOHTBridge(startX, startZ, endX, endZ, bridgeHeight, bridgeLabel) {
  const bridgeGroup = new THREE.Group();
  const dx = endX - startX, dz = endZ - startZ;
  const length = Math.sqrt(dx*dx + dz*dz);
  const angle = Math.atan2(dz, dx);
  const bW = 3.0, bH = 2.8;

  const floorGeo = new THREE.BoxGeometry(length, 0.4, bW);
  const floorMat = new THREE.MeshLambertMaterial({ color: 0x556677 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.position.y = -bH/2; floor.castShadow = true;
  bridgeGroup.add(floor);

  const ceilGeo = new THREE.BoxGeometry(length, 0.3, bW + 0.4);
  const ceil = new THREE.Mesh(ceilGeo, floorMat.clone());
  ceil.position.y = bH/2;
  bridgeGroup.add(ceil);

  const segments = Math.max(1, Math.floor(length / 6));
  for (let i = 0; i <= segments; i++) {
    const sx = -length/2 + i*(length/segments);
    const fGeo = new THREE.BoxGeometry(0.3, bH, 0.3);
    const fMat = new THREE.MeshLambertMaterial({ color: 0x88999a });
    const fL = new THREE.Mesh(fGeo, fMat); fL.position.set(sx, 0, bW/2);
    bridgeGroup.add(fL);
    const fR = fL.clone(); fR.position.z = -bW/2;
    bridgeGroup.add(fR);
  }
  for (let i = 0; i < segments; i++) {
    const sx = -length/2 + (i+0.5)*(length/segments);
    const pw = (length/segments) - 0.5;
    const gGeo = new THREE.PlaneGeometry(pw, bH - 0.6);
    const gMat = new THREE.MeshBasicMaterial({ color: 0x88ccee, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
    const gL = new THREE.Mesh(gGeo, gMat); gL.position.set(sx, 0, bW/2 + 0.05);
    bridgeGroup.add(gL);
    const gR = new THREE.Mesh(gGeo, gMat.clone()); gR.position.set(sx, 0, -bW/2 - 0.05);
    bridgeGroup.add(gR);
  }

  const rGeo = new THREE.BoxGeometry(length - 1, 0.25, 0.35);
  const rMat = new THREE.MeshBasicMaterial({ color: 0xddaa22 });
  bridgeGroup.add(new THREE.Mesh(rGeo, rMat).translateY(bH/2 - 0.3).translateZ(-0.5));
  bridgeGroup.add(new THREE.Mesh(rGeo, rMat.clone()).translateY(bH/2 - 0.3).translateZ(0.5));

  const pCnt = Math.max(1, Math.floor(length / 35));
  for (let i = 0; i <= pCnt; i++) {
    const px = -length/2 + 5 + i * ((length - 10) / Math.max(1, pCnt));
    const pGeo = new THREE.BoxGeometry(1.4, bridgeHeight, 1.4);
    const p = new THREE.Mesh(pGeo, new THREE.MeshLambertMaterial({ color: 0x667788 }));
    p.castShadow = true; p.position.set(px, -bH/2 - bridgeHeight/2, 0);
    bridgeGroup.add(p);
    const pEdge = new THREE.LineSegments(new THREE.EdgesGeometry(pGeo), new THREE.LineBasicMaterial({ color: 0x000000 }));
    pEdge.position.copy(p.position); bridgeGroup.add(pEdge);
  }

  const glGeo = new THREE.BoxGeometry(length, 0.2, 0.6);
  const gl = new THREE.Mesh(glGeo, new THREE.MeshBasicMaterial({ color: 0x44aaee, transparent: true, opacity: 0.6 }));
  gl.position.y = -bH/2 - 0.2; bridgeGroup.add(gl);

  const bEdge = new THREE.LineSegments(new THREE.EdgesGeometry(floorGeo), new THREE.LineBasicMaterial({ color: 0x000000 }));
  bEdge.position.copy(floor.position); bridgeGroup.add(bEdge);

  if (bridgeLabel) {
    const lc = document.createElement('canvas'); lc.width = 256; lc.height = 40;
    const lx2 = lc.getContext('2d');
    lx2.fillStyle = 'rgba(0,30,60,0.8)'; lx2.fillRect(0, 0, 256, 40);
    lx2.fillStyle = 'rgba(0,150,220,0.9)'; lx2.fillRect(0, 36, 256, 4);
    lx2.font = 'bold 22px Arial, sans-serif'; lx2.fillStyle = '#ddeeff';
    lx2.textAlign = 'center'; lx2.textBaseline = 'middle';
    lx2.fillText(bridgeLabel, 128, 18);
    const tex = new THREE.CanvasTexture(lc); tex.minFilter = THREE.LinearFilter;
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
    sp.scale.set(14, 14 * (40/256), 1); sp.position.set(0, bH/2 + 4, 0);
    sp.renderOrder = 998; bridgeGroup.add(sp);
  }

  bridgeGroup.position.set((startX + endX) / 2, bridgeHeight, (startZ + endZ) / 2);
  bridgeGroup.rotation.y = -angle;
  scene.add(bridgeGroup);
  return bridgeGroup;
}

const weatherStates = ['clear', 'cloudy', 'rain'];

function createCloud(x, y, z) {
  const g = new THREE.Group();
  const cloudMat = new THREE.MeshBasicMaterial({ color: 0xddeeff, transparent: true, opacity: 0.7 });
  const darkCloudMat = new THREE.MeshBasicMaterial({ color: 0x99aabb, transparent: true, opacity: 0.6 });

  const blobCount = 4 + Math.floor(Math.random() * 4);
  for (let i = 0; i < blobCount; i++) {
    const r = 12 + Math.random() * 18;
    const geo = new THREE.SphereGeometry(r, 8, 6);
    const mat = Math.random() > 0.4 ? cloudMat.clone() : darkCloudMat.clone();
    const blob = new THREE.Mesh(geo, mat);
    blob.position.set(
      (Math.random() - 0.5) * 40,
      (Math.random() - 0.3) * 12,
      (Math.random() - 0.5) * 20
    );
    blob.scale.y = 0.5 + Math.random() * 0.3;
    g.add(blob);
  }

  g.position.set(x, y, z);
  g.userData.speed = 0.03 + Math.random() * 0.05;
  g.userData.baseOpacity = 0.7;
  cloudGroup.add(g);
  return g;
}

// ── 날씨 업데이트 함수 ──
let targetCloudOpacity = 0;
let targetRainOpacity = 0;
let currentCloudOpacity = 0;
let currentRainOpacity = 0;

function updateWeather() {
  weatherTimer++;

  // 랜덤 날씨 변경
  if (weatherTimer >= weatherInterval) {
    weatherTimer = 0;
    weatherInterval = 600 + Math.random() * 600;
    currentWeather = weatherStates[Math.floor(Math.random() * weatherStates.length)];
    // 날씨 변경 (UI 표시 없음)
  }

  // 목표 값 설정
  if (currentWeather === 'clear') {
    targetCloudOpacity = 0.15;
    targetRainOpacity = 0;
  } else if (currentWeather === 'cloudy') {
    targetCloudOpacity = 0.7;
    targetRainOpacity = 0;
  } else if (currentWeather === 'rain') {
    targetCloudOpacity = 0.85;
    targetRainOpacity = 0.6;
  }

  // 부드러운 전환
  currentCloudOpacity += (targetCloudOpacity - currentCloudOpacity) * 0.02;
  currentRainOpacity += (targetRainOpacity - currentRainOpacity) * 0.02;

  // 구름 업데이트
  clouds.forEach(c => {
    c.position.x += c.userData.speed;
    if (c.position.x > 450) c.position.x = -450;
    c.children.forEach(blob => {
      blob.material.opacity = currentCloudOpacity * (0.5 + Math.random() * 0.1);
    });
  });

  // 비 업데이트
  rainMesh.visible = currentRainOpacity > 0.05;
  if (rainMesh.visible) {
    rainMat.opacity = currentRainOpacity;
    const pos = rainGeo.attributes.position.array;
    for (let i = 0; i < rainCount; i++) {
      pos[i * 3 + 1] -= 2.5 + Math.random() * 1.5; // 빗방울 낙하
      pos[i * 3] += (Math.random() - 0.5) * 0.3; // 약간의 바람

      if (pos[i * 3 + 1] < 0) {
        pos[i * 3] = (Math.random() - 0.5) * 800;
        pos[i * 3 + 1] = 200 + Math.random() * 50;
        pos[i * 3 + 2] = (Math.random() - 0.5) * 800;
      }
    }
    rainGeo.attributes.position.needsUpdate = true;
  }
}

function animate() {
  requestAnimationFrame(animate);
  const elapsed = Date.now() - startTime;

  buildingMeshes.forEach(group => {
    if (elapsed > group.userData.animDelay || !group.userData.animDelay) {
      if (!group.userData.animStarted) {
        group.userData.animStarted = true;
        group.userData.animTime = 0;
      }
      group.userData.animTime += 0.03;
      const t = Math.min(1, group.userData.animTime);
      const ease = 1 - Math.pow(1 - t, 3);
      group.position.y = -50 + 50 * ease;
    }
  });

  updateSky();
  updateWeather();

  if (Math.random() < 0.02) {
    const randomBuilding = buildingMeshes[Math.floor(Math.random() * buildingMeshes.length)];
    randomBuilding.children.forEach(child => {
      if (child.userData && child.userData.isWindow) {
        child.material.emissiveIntensity = 0.15 + Math.random() * 0.3;
      }
    });
  }

  allPeople.forEach(obj => {
    obj.userData.walkTimer += 1;
    if (obj.userData.walkTimer % 200 < 1) {
      obj.userData.walkDir += (Math.random() - 0.5) * 1.5;
    }
    const spd = obj.userData.walkSpeed;
    const dir = obj.userData.walkDir;
    obj.position.x += Math.cos(dir) * spd;
    obj.position.z += Math.sin(dir) * spd;
    obj.rotation.y = -dir + Math.PI/2;
    const z = obj.userData.zone;
    if (obj.position.x < z.xMin) { obj.position.x = z.xMin; obj.userData.walkDir = Math.random()*Math.PI; }
    if (obj.position.x > z.xMax) { obj.position.x = z.xMax; obj.userData.walkDir = Math.PI+Math.random()*Math.PI; }
    if (obj.position.z < z.zMin) { obj.position.z = z.zMin; obj.userData.walkDir = Math.PI*0.5*Math.random(); }
    if (obj.position.z > z.zMax) { obj.position.z = z.zMax; obj.userData.walkDir = -Math.PI*0.5+Math.random()*Math.PI; }
  });

  hwCars.forEach(car => {
    car.position.z += car.userData.speed * car.userData.dir;
    if (car.position.z > 530) car.position.z = -190;
    if (car.position.z < -190) car.position.z = 530;
  });

  busGroup.forEach(bus => {
    const r = bus.userData.route;
    const p0 = r[0], p1 = r[1];
    bus.userData.progress += bus.userData.speed * 0.002 * bus.userData.forward;
    if (bus.userData.progress >= 1) { bus.userData.progress = 1; bus.userData.forward = -1; }
    if (bus.userData.progress <= 0) { bus.userData.progress = 0; bus.userData.forward = 1; }
    const t = bus.userData.progress;
    bus.position.x = p0.x + (p1.x - p0.x) * t;
    bus.position.z = p0.z + (p1.z - p0.z) * t;
    const dx = (p1.x - p0.x) * bus.userData.forward;
    const dz = (p1.z - p0.z) * bus.userData.forward;
    bus.rotation.y = -Math.atan2(dz, dx) + Math.PI/2;
  });

  if (window._chimneySmokes) {
    window._chimneySmokes.forEach(smoke => {
      const pos = smoke.geometry.attributes.position.array;
      const sd = smoke.userData.smokeData;
      const tr = sd.topRadius || 2;
      for (let si = 0; si < sd.count; si++) {
        pos[si * 3] += (Math.random() - 0.5) * 0.1 + Math.sin(elapsed * 0.0008 + si) * 0.04;
        pos[si * 3 + 1] += 0.1 + Math.random() * 0.06;
        pos[si * 3 + 2] += (Math.random() - 0.5) * 0.08;

        if (pos[si * 3 + 1] > sd.baseY + 25) {
          pos[si * 3] = sd.baseX + (Math.random() - 0.5) * tr * 2;
          pos[si * 3 + 1] = sd.baseY;
          pos[si * 3 + 2] = sd.baseZ + (Math.random() - 0.5) * tr * 2;
        }
      }
      smoke.geometry.attributes.position.needsUpdate = true;
      smoke.material.opacity = 0.25 + Math.sin(elapsed * 0.003) * 0.1;
    });
  }

  buildingMeshes.forEach(group => {
    group.traverse(child => {
      if (child.userData && child.userData.isChimneyWarning) {
        const blink = Math.sin(elapsed * 0.006) > 0 ? 1.0 : 0.2;
        if (child.isMesh) {
          child.material.emissiveIntensity = blink * 0.9;
        }
      }
    });
  });

  updateTourBus();
  updateChipCostume();

  renderer.render(scene, camera);
  drawMinimap();
}

// 타이핑 효과로 텍스트 표시
function typeChipText(text, callback) {
  chipMouth.classList.add('talking');
  chipSpeechText.innerHTML = '';
  let htmlPos = 0;
  let displayed = '';
  if (chipTypingTimer) clearInterval(chipTypingTimer);
  chipTypingTimer = setInterval(() => {
    if (htmlPos >= text.length) {
      clearInterval(chipTypingTimer);
      chipTypingTimer = null;
      chipMouth.classList.remove('talking');
      if (callback) callback();
      return;
    }
    if (text[htmlPos] === '<') {
      const closeIdx = text.indexOf('>', htmlPos);
      if (closeIdx !== -1) {
        displayed += text.substring(htmlPos, closeIdx + 1);
        htmlPos = closeIdx + 1;
      } else { displayed += text[htmlPos]; htmlPos++; }
    } else { displayed += text[htmlPos]; htmlPos++; }
    chipSpeechText.innerHTML = displayed;
  }, 25);
}

function createTourBus() {

function tourResumeMoving() {
  if (!chipTourActive) return;
  tourPhase = 'moving';
  let nextStop = null;
  for (let i = tourWpIdx + 1; i < tourWaypoints.length; i++) {
    if (tourWaypoints[i].stop) { nextStop = tourWaypoints[i].stop; break; }
  }
  if (nextStop && nextStop !== 'END') {
    typeChipText('🚌 다음 목적지: <b style="color:#ff66cc">' + nextStop + '</b><br>이동 중...');
  }
}

function tourOnArrival(stopName) {
  if (stopName === 'END') {
    chipTourActive = false;
    tourPhase = 'idle';
    chipAutoTourBtn.textContent = '🤖 캠퍼스 자동 투어';
    if (tourBus) tourBus.visible = false;
    typeChipText('캠퍼스 투어가 끝났어요! 🎉<br><br>웨이퍼 → FAB → 테스트 → 패키지<br>전 과정을 둘러봤습니다!<br><br>궁금한 건물을 직접 클릭해 보세요! 👆');
    return;
  }
  tourPhase = 'explaining';
  showChipGuide(stopName);
  chipCurrentTimeout = setTimeout(() => { tourResumeMoving(); }, 7000);
}

function updateTourBus() {
  if (!chipTourActive || tourPhase !== 'moving' || !tourBus) return;
  if (tourWpIdx >= tourWaypoints.length - 1) return;
  const from = tourWaypoints[tourWpIdx];
  const to = tourWaypoints[tourWpIdx + 1];
  const dist = Math.sqrt((to.x - from.x) ** 2 + (to.z - from.z) ** 2);
  const speed = dist > 0 ? Math.min(0.025, Math.max(0.008, 3.0 / dist)) : 0.02;
  tourSegProgress += speed;
  const t = tourSegProgress < 0.5
    ? 2 * tourSegProgress * tourSegProgress
    : 1 - Math.pow(-2 * tourSegProgress + 2, 2) / 2;
  tourBus.position.x = from.x + (to.x - from.x) * t;
  tourBus.position.z = from.z + (to.z - from.z) * t;
  const dx = to.x - from.x;
  const dz = to.z - from.z;
  if (Math.abs(dx) > 0.1 || Math.abs(dz) > 0.1) {
    const targetRot = -Math.atan2(dz, dx) + Math.PI / 2;
    let diff = targetRot - tourBus.rotation.y;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    tourBus.rotation.y += diff * 0.1;
  }
  target.x += (tourBus.position.x - target.x) * 0.04;
  target.z += (tourBus.position.z - target.z) * 0.04;
  spherical.radius += (220 - spherical.radius) * 0.02;
  spherical.phi += (0.75 - spherical.phi) * 0.02;
  updateCamera();
  if (tourSegProgress >= 1) {
    tourSegProgress = 0;
    tourWpIdx++;
    if (tourWpIdx >= tourWaypoints.length - 1) {
      const lastWp = tourWaypoints[tourWaypoints.length - 1];
      if (lastWp.stop) tourOnArrival(lastWp.stop);
      return;
    }
    const arrivedWp = tourWaypoints[tourWpIdx];
    if (arrivedWp.stop) tourOnArrival(arrivedWp.stop);
  }
}

(function() {
  const chip = document.getElementById('chipGuide');

  let isDragging = false, offsetX = 0, offsetY = 0;
  let dragCount = 0;
  let dragResetTimer = null;

  function onDragStart() {
    dragCount++;
    if (dragResetTimer) clearTimeout(dragResetTimer);
    dragResetTimer = setTimeout(() => { dragCount = 0; chip.classList.remove('annoyed'); }, 10000);
    if (dragCount >= 5 && !chip.classList.contains('annoyed')) {
      chip.classList.add('annoyed');
      chipSpeechEl.classList.add('show');
      const msgs = [
        '😤 야!! 고만좀 옮겨라!!<br>어지러워 죽겠어!!',

        '🤢 멀미난다고!!<br>반도체한테 이러는 거 아니야!!'
      ];
      typeChipText(msgs[Math.floor(Math.random() * msgs.length)]);
      setTimeout(() => { chip.classList.remove('annoyed'); dragCount = 0; }, 5000);
    }
  }

  chip.addEventListener('mousedown', function(e) {
    isDragging = true;
    chip.classList.add('dragging');
    onDragStart();
    const rect = chip.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    chip.style.left = rect.left + 'px';
    chip.style.top = rect.top + 'px';
    chip.style.right = 'auto';
    chip.style.bottom = 'auto';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    const x = e.clientX - offsetX;
    const y = e.clientY - offsetY;
    chip.style.left = x + 'px';
    chip.style.top = y + 'px';
    speech.style.left = (x - 210) + 'px';
    speech.style.top = (y - speech.offsetHeight - 15) + 'px';
    speech.style.right = 'auto';
    speech.style.bottom = 'auto';
  });

  document.addEventListener('mouseup', function() {
    if (isDragging) { isDragging = false; chip.classList.remove('dragging'); }
  });

  chip.addEventListener('touchstart', function(e) {
    isDragging = true;
    chip.classList.add('dragging');
    onDragStart();
    const rect = chip.getBoundingClientRect();
    offsetX = e.touches[0].clientX - rect.left;
    offsetY = e.touches[0].clientY - rect.top;
    chip.style.left = rect.left + 'px';
    chip.style.top = rect.top + 'px';
    chip.style.right = 'auto';
    chip.style.bottom = 'auto';
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    const x = e.touches[0].clientX - offsetX;
    const y = e.touches[0].clientY - offsetY;
    chip.style.left = x + 'px';
    chip.style.top = y + 'px';
    speech.style.left = (x - 210) + 'px';
    speech.style.top = (y - speech.offsetHeight - 15) + 'px';
    speech.style.right = 'auto';
    speech.style.bottom = 'auto';
  }, { passive: true });

  document.addEventListener('touchend', function() {
    if (isDragging) { isDragging = false; chip.classList.remove('dragging'); }
  });
})();

</script>
</body>
</html>
